<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normal Protocol — Intakes</title>
  <link rel="icon" type="image/svg+xml" href="Logos/icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #F6F4EE;
      --teal:   #79BDB1;
      --ink:    #171A1C;
      --ink-60: rgba(23,26,28,0.6);
      --ink-12: rgba(23,26,28,0.12);
      --radius: 10px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 32px 20px;
      border-bottom: 1.5px solid var(--ink-12);
    }

    header img { width: 36px; height: 36px; }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 13px;
      color: var(--ink-60);
      margin-left: 2px;
    }

    main { padding: 28px 32px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
    }

    .search-wrap { position: relative; }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-60);
      pointer-events: none;
    }

    #search {
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: var(--radius);
      padding: 7px 12px 7px 32px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--teal); }
    #search::placeholder { color: var(--ink-60); }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1.5px solid var(--ink-12);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--cream);
      padding: 11px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
      border-bottom: 1.5px solid var(--ink-12);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    thead th:hover { color: var(--ink); }
    thead th.sorted { color: var(--teal); }

    thead th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.5;
    }

    thead th.sorted .sort-icon { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--ink-12);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--cream); }

    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    td.item { font-weight: 500; }

    td.qty {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      display: inline-block;
      background: rgba(121,189,177,0.15);
      color: var(--teal);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .listing-id {
      font-size: 12px;
      color: var(--ink-60);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .payment {
      font-size: 12px;
      color: var(--ink-60);
      max-width: 260px;
    }

    .empty, .loading, .error {
      text-align: center;
      padding: 48px 16px;
      color: var(--ink-60);
    }

    .error { color: #c0392b; }

    #count {
      font-size: 12px;
      color: var(--ink-60);
      margin-top: 12px;
    }

    /* ── Source dropdown ── */
    .source-cell { position: relative; }

    .source-trigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px 3px 10px;
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
      max-width: 180px;
    }

    .source-trigger:hover {
      border-color: var(--ink-12);
      background: white;
    }

    .source-trigger.open {
      border-color: var(--teal);
      background: white;
    }

    .source-trigger svg {
      flex-shrink: 0;
      color: var(--ink-60);
      transition: transform 0.15s;
    }

    .source-trigger.open svg { transform: rotate(180deg); }

    .source-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 100;
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(23,26,28,0.10);
      min-width: 160px;
      padding: 4px 0;
      overflow: hidden;
    }

    .source-menu.open { display: block; }

    .source-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
      transition: background 0.1s;
    }

    .source-option:hover { background: var(--cream); }

    .source-option.selected { font-weight: 600; }

    .source-option .check {
      width: 14px;
      flex-shrink: 0;
      color: var(--teal);
      visibility: hidden;
    }

    .source-option.selected .check { visibility: visible; }

    .source-saving {
      font-size: 11px;
      color: var(--ink-60);
      padding: 4px 10px 4px 34px;
      font-style: italic;
    }

    .source-error {
      font-size: 11px;
      color: #c0392b;
      padding: 4px 10px 4px 34px;
    }
  </style>
</head>
<body>

<header>
  <img src="Logos/icon.svg" alt="Normal Protocol" />
  <h1>Normal Protocol <span>/ Intakes</span></h1>
</header>

<main>
  <div class="toolbar">
    <span class="section-title">Daily Supplements</span>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="Search items…" />
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr id="header-row"></tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" class="loading">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div id="count"></div>
</main>

<script>
  const COLUMNS = [
    { key: "item",              label: "Item",       cls: "item" },
    { key: "brand",             label: "Brand",      cls: "" },
    { key: "daily_qty",         label: "Qty / day",  cls: "qty" },
    { key: "from",              label: "Source",     cls: "source-cell" },
    { key: "Price",             label: "Price",      cls: "qty" },
    { key: "payment_structure", label: "Payment",    cls: "payment" },
    { key: "listing_id",        label: "Listing ID", cls: "listing-id" },
  ];

  let allRows = [];
  let suppliers = [];
  let sortCol = "item";
  let sortAsc = true;
  let activeMenu = null;

  function fmtPrice(v) {
    const n = parseFloat(v);
    return isNaN(n) ? "" : `$${n.toFixed(2)}`;
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Close any open menu ──
  function closeMenu() {
    if (!activeMenu) return;
    const { trigger, menu } = activeMenu;
    trigger.classList.remove("open");
    menu.classList.remove("open");
    activeMenu = null;
  }

  document.addEventListener("click", (e) => {
    if (activeMenu && !activeMenu.trigger.contains(e.target) && !activeMenu.menu.contains(e.target)) {
      closeMenu();
    }
  });

  // ── Build a source dropdown cell ──
  function makeSourceCell(row) {
    const current = row["from"] ?? "";

    const trigger = document.createElement("button");
    trigger.className = "source-trigger";
    trigger.innerHTML = `
      <span class="source-label">${esc(current)}</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m6 9 6 6 6-6"/>
      </svg>`;

    const menu = document.createElement("div");
    menu.className = "source-menu";

    function buildOptions(selectedValue) {
      menu.innerHTML = "";
      suppliers.forEach(name => {
        const opt = document.createElement("div");
        opt.className = "source-option" + (name === selectedValue ? " selected" : "");
        opt.innerHTML = `
          <svg class="check" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          ${esc(name)}`;
        opt.addEventListener("click", () => selectSupplier(name));
        menu.appendChild(opt);
      });
    }

    async function selectSupplier(name) {
      if (name === row["from"]) { closeMenu(); return; }
      closeMenu();

      // Optimistic update
      trigger.querySelector(".source-label").textContent = name;
      const prevVal = row["from"];
      row["from"] = name;

      try {
        const res = await fetch(`/api/intakes/${row.ID}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ from: name }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (err) {
        // Rollback on failure
        row["from"] = prevVal;
        trigger.querySelector(".source-label").textContent = prevVal;
        const errNote = document.createElement("div");
        errNote.className = "source-error";
        errNote.textContent = "Save failed — try again";
        menu.appendChild(errNote);
        console.error("Source update failed:", err);
      }
    }

    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      if (activeMenu && activeMenu.trigger === trigger) {
        closeMenu();
        return;
      }
      closeMenu();
      buildOptions(row["from"]);
      trigger.classList.add("open");
      menu.classList.add("open");
      activeMenu = { trigger, menu };
    });

    buildOptions(current);

    const wrapper = document.createElement("div");
    wrapper.style.position = "relative";
    wrapper.style.display = "inline-block";
    wrapper.appendChild(trigger);
    wrapper.appendChild(menu);
    return wrapper;
  }

  // ── Render headers ──
  function renderHeaders() {
    const tr = document.getElementById("header-row");
    tr.innerHTML = "";
    COLUMNS.forEach(col => {
      const th = document.createElement("th");
      const isSorted = sortCol === col.key;
      if (isSorted) th.classList.add("sorted");
      th.innerHTML = `${col.label}<span class="sort-icon">${isSorted ? (sortAsc ? "▲" : "▼") : "⇅"}</span>`;
      th.addEventListener("click", () => {
        if (sortCol === col.key) sortAsc = !sortAsc;
        else { sortCol = col.key; sortAsc = true; }
        render(document.getElementById("search").value);
      });
      tr.appendChild(th);
    });
  }

  // ── Render table body ──
  function render(query = "") {
    renderHeaders();
    const tbody = document.getElementById("table-body");
    const q = query.toLowerCase();
    let rows = allRows.filter(r =>
      COLUMNS.some(c => String(r[c.key] ?? "").toLowerCase().includes(q))
    );
    rows.sort((a, b) => {
      const numeric = sortCol === "daily_qty" || sortCol === "Price";
      const n = numeric
        ? (parseFloat(a[sortCol]) || 0) - (parseFloat(b[sortCol]) || 0)
        : String(a[sortCol] ?? "").toLowerCase() < String(b[sortCol] ?? "").toLowerCase() ? -1
        : String(a[sortCol] ?? "").toLowerCase() > String(b[sortCol] ?? "").toLowerCase() ? 1 : 0;
      return sortAsc ? n : -n;
    });

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${COLUMNS.length}" class="empty">No results found.</td></tr>`;
      document.getElementById("count").textContent = "";
      return;
    }

    tbody.innerHTML = "";
    rows.forEach(r => {
      const tr = document.createElement("tr");

      const cells = [
        { cls: "item",       html: esc(r.item) },
        { cls: "",           html: `<span class="badge">${esc(r.brand)}</span>` },
        { cls: "qty",        html: esc(r.daily_qty) },
        { cls: "source-cell", node: makeSourceCell(r) },
        { cls: "qty",        html: fmtPrice(r.Price) },
        { cls: "payment",    html: esc(r.payment_structure) },
        { cls: "listing-id", html: esc(r.listing_id) },
      ];

      cells.forEach(({ cls, html, node }) => {
        const td = document.createElement("td");
        if (cls) td.className = cls;
        if (node) td.appendChild(node);
        else td.innerHTML = html;
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    document.getElementById("count").textContent =
      `${rows.length} item${rows.length !== 1 ? "s" : ""}`;
  }

  // ── Init: load intakes + suppliers in parallel ──
  async function init() {
    try {
      const [intakesRes, suppliersRes] = await Promise.all([
        fetch("/api/intakes"),
        fetch("/api/suppliers"),
      ]);
      if (!intakesRes.ok) throw new Error(`Intakes: HTTP ${intakesRes.status}`);
      if (!suppliersRes.ok) throw new Error(`Suppliers: HTTP ${suppliersRes.status}`);
      allRows = await intakesRes.json();
      suppliers = await suppliersRes.json();
      render();
    } catch (e) {
      document.getElementById("table-body").innerHTML =
        `<tr><td colspan="${COLUMNS.length}" class="error">Failed to load — ${e.message}</td></tr>`;
    }
  }

  document.getElementById("search").addEventListener("input", e => render(e.target.value));

  init();
</script>
</body>
</html>
