<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normal Protocol — Intakes</title>
  <link rel="icon" type="image/svg+xml" href="Logos/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Google Identity Services (OAuth token client) + gapi (Drive Picker) for the Inventory tab -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #F6F4EE;
      --teal:   #79BDB1;
      --ink:    #171A1C;
      --ink-60: rgba(23,26,28,0.6);
      --ink-12: rgba(23,26,28,0.12);
      --radius: 10px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    :root { --cream-dark: #ECE7DA; }

    header {
      display: flex;
      align-items: stretch;
      gap: 16px;
      padding: 0 24px;
      min-height: 46px;
      background: var(--cream-dark);
      border-bottom: 1.5px solid var(--ink-12);
    }

    .brand { display: flex; align-items: center; gap: 10px; flex: 1 1 0; min-width: 0; }
    .brand img { width: 26px; height: 26px; }
    .brand h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    main { padding: 28px 32px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
    }

    .search-wrap { position: relative; }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-60);
      pointer-events: none;
    }

    #search {
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: var(--radius);
      padding: 7px 12px 7px 32px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--teal); }
    #search::placeholder { color: var(--ink-60); }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1.5px solid var(--ink-12);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--cream);
      padding: 11px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
      border-bottom: 1.5px solid var(--ink-12);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    thead th:hover { color: var(--ink); }
    thead th.sorted { color: var(--teal); }

    thead th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.5;
    }

    thead th.sorted .sort-icon { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--ink-12);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--cream); }

    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    td.item { font-weight: 500; }

    td.qty {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      display: inline-block;
      background: rgba(121,189,177,0.15);
      color: var(--teal);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .listing-id {
      font-size: 12px;
      color: var(--ink-60);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .payment {
      font-size: 12px;
      color: var(--ink-60);
      max-width: 260px;
    }

    .empty, .loading, .error {
      text-align: center;
      padding: 48px 16px;
      color: var(--ink-60);
    }

    .error { color: #c0392b; }

    #count {
      font-size: 12px;
      color: var(--ink-60);
      margin-top: 12px;
    }

    /* ── Source dropdown ── */
    .source-cell { position: relative; }

    .source-trigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px 3px 10px;
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
      max-width: 180px;
    }

    .source-trigger:hover {
      border-color: var(--ink-12);
      background: white;
    }

    .source-trigger.open {
      border-color: var(--teal);
      background: white;
    }

    .source-trigger svg {
      flex-shrink: 0;
      color: var(--ink-60);
      transition: transform 0.15s;
    }

    .source-trigger.open svg { transform: rotate(180deg); }

    .source-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 100;
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(23,26,28,0.10);
      min-width: 160px;
      padding: 4px 0;
      overflow: hidden;
    }

    .source-menu.open { display: block; }

    .source-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
      transition: background 0.1s;
    }

    .source-option:hover { background: var(--cream); }

    .source-option.selected { font-weight: 600; }

    .source-option .check {
      width: 14px;
      flex-shrink: 0;
      color: var(--teal);
      visibility: hidden;
    }

    .source-option.selected .check { visibility: visible; }

    .source-saving {
      font-size: 11px;
      color: var(--ink-60);
      padding: 4px 10px 4px 34px;
      font-style: italic;
    }

    .source-error {
      font-size: 11px;
      color: #c0392b;
      padding: 4px 10px 4px 34px;
    }

    /* ── Tab navigation (centered in the top bar) ── */
    .tabs { display: flex; align-items: stretch; gap: 2px; }

    .tab-btn {
      appearance: none;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-60);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: var(--ink); }

    .tab-btn.active {
      color: #3f8f87;
      border-bottom-color: #3f8f87;
    }

    /* right side of the top bar — board-only Inventory controls */
    .header-right { flex: 1 1 0; display: flex; align-items: center; justify-content: flex-end; gap: 12px; min-width: 0; }
    .board-controls { display: none; align-items: center; gap: 10px; }
    .board-controls.show { display: flex; }
    .inv-status, .ynab-status { font-size: 11.5px; color: var(--ink-60); white-space: nowrap; max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
    .inv-status.ok, .ynab-status.ok { color: #3f8f87; }
    .inv-status.err, .ynab-status.err { color: #c0392b; }
    .board-controls-divider { width: 1px; height: 18px; background: var(--ink-12); flex-shrink: 0; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>

  <!-- ── Next Orders styles (compact layout, scoped to #tab-board) ── -->
  <style>
    #tab-board {
      --accent: #70c4bb;
      --accent-deep: #3f8f87;
      --accent-tint: #eaf6f4;
      --b-ink: #1c2426;
      --ink-2: #51606a;
      --ink-3: #8a979e;
      --line: #e4e9ea;
      --line-soft: #eef2f2;
      --b-bg: #eef1f2;
      --paper: #ffffff;
      --soon: #e08a3c;
      --soon-tint: #fdf3e8;
      --out: #d6504a;
      --out-tint: #fbecea;
      --shadow-card: 0 1px 2px rgba(28, 36, 38, .06), 0 1px 1px rgba(28, 36, 38, .04);
      --shadow-pop: 0 10px 28px rgba(28, 36, 38, .16);
      --font-ui: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
      --font-num: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;
      background: var(--cream);
      color: var(--b-ink);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      /* own scroll pane filling the viewport below the header, so the horizontal
         scrollbar is pinned to the bottom of the screen rather than mid-page */
      height: calc(100vh - 48px);
      overflow: auto;
    }

    @keyframes sb-pulse {
      0% { box-shadow: 0 0 0 0 rgba(112, 196, 187, .5); }
      70% { box-shadow: 0 0 0 7px rgba(112, 196, 187, 0); }
      100% { box-shadow: 0 0 0 0 rgba(112, 196, 187, 0); }
    }

    /* ── board scroller ── */
    #tab-board .board {
      display: flex; gap: 18px; align-items: flex-start;
      padding: 22px 24px 24px;
      min-height: 100%;
    }

    /* ── month column ── */
    #tab-board .month {
      flex: 0 0 590px; width: 590px;
      display: flex; flex-direction: column;
      background: #fff; border: 1px solid #dde3e4; border-radius: 14px;
    }
    #tab-board .month-head { padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
    #tab-board .month-title { display: flex; align-items: baseline; gap: 7px; flex: none; }
    #tab-board .month-title .mname { font-size: 16px; font-weight: 600; letter-spacing: -.01em; outline: none; }
    #tab-board .month-title .msub { font-family: var(--font-num); font-size: 11px; color: var(--ink-3); }
    #tab-board .month-title .mcount {
      font-family: var(--font-num); font-size: 10px;
      color: var(--ink-3); background: #dbe2e3; padding: 1px 7px; border-radius: 20px;
    }
    #tab-board .month-metrics { margin-left: auto; display: flex; align-items: center; }
    #tab-board .metric {
      display: flex; flex-direction: column; align-items: flex-end;
      padding: 0 9px; border-left: 1px solid #d7dedf; line-height: 1.15;
    }
    #tab-board .metric:first-child { border-left: 0; }
    #tab-board .metric:last-child { padding-right: 0; }
    #tab-board .metric .mk {
      font-size: 8.5px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--ink-3); white-space: nowrap;
    }
    #tab-board .metric .mv {
      font-family: var(--font-num); font-size: 14.5px; font-weight: 500;
      margin-top: 2px; letter-spacing: -.01em;
    }
    #tab-board .metric.is-total .mv { color: var(--accent-deep); font-weight: 600; }
    #tab-board .metric.is-max .mv { color: var(--ink-2); }
    #tab-board .metric.spent .mv { color: var(--b-ink); }
    #tab-board .field label .lbl-sub { color: var(--ink-3); font-weight: 500; }

    #tab-board .month-list {
      min-height: 40px; padding: 4px 11px 11px;
      display: flex; flex-direction: column; gap: 9px;
    }
    #tab-board .month-list > * { flex: 0 0 auto; }

    /* add buttons that live inline in the month / shipment header rows */
    #tab-board .month-head .add-btn, #tab-board .ship-head .add-btn {
      position: relative; /* anchor for the picker dropdown */
      flex: 0 0 auto; height: 26px; padding: 0 14px; gap: 5px;
      border: 1px solid #c4cdd0; border-radius: 8px; background: rgba(255, 255, 255, .7);
      font-size: 11.5px; color: var(--ink-2);
    }
    /* push the $ total to the far right; min-date sits between + Item and total */
    #tab-board .ship-min-date {
      font-family: var(--font-num); font-size: 12px; color: var(--accent-deep);
      white-space: nowrap; flex: 0 0 auto; margin-left: auto;
    }
    #tab-board .ship-head .ship-total { margin-left: 12px; }
    #tab-board .month-head .add-btn:hover, #tab-board .ship-head .add-btn:hover {
      border-color: var(--accent); color: var(--accent-deep); background: #fff;
    }

    /* ── shipment block ── */
    #tab-board .shipment {
      background: var(--accent-tint); border: 1px solid #cfe6e2; border-radius: 11px;
      box-shadow: var(--shadow-card); overflow: hidden;
    }
    #tab-board .ship-head {
      display: flex; align-items: center; gap: 8px; padding: 8px 9px;
      background: transparent;
    }
    #tab-board .ship-head .truck {
      width: 22px; height: 22px; border-radius: 6px; flex: none;
      background: #fff; border: 1px solid #cfe6e2; color: var(--accent-deep);
      display: grid; place-items: center;
    }
    #tab-board .ship-head .truck svg { width: 13px; height: 13px; }
    #tab-board .ship-id { min-width: 0; flex: 0 1 auto; display: flex; align-items: baseline; gap: 7px; margin-right: 0; }
    #tab-board .ship-name {
      font-size: 13px; font-weight: 600; letter-spacing: -.01em; outline: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    #tab-board .ship-name:focus { text-overflow: clip; overflow: visible; }
    #tab-board .ship-id .scount {
      flex: none; font-family: var(--font-num); font-size: 10px; color: var(--ink-3);
      background: #d6e6e2; padding: 1px 7px; border-radius: 20px;
    }
    #tab-board .ship-total {
      font-family: var(--font-num); font-size: 14px; font-weight: 600;
      color: var(--accent-deep); text-align: right; padding-left: 4px;
    }
    #tab-board .ship-body { padding: 9px; display: flex; flex-direction: column; gap: 9px; min-height: 30px; }
    #tab-board .ship-body > * { flex: 0 0 auto; }
    #tab-board .ship-body:empty::after {
      content: 'Drop a card here'; display: block; text-align: center; padding: 10px 0;
      font-size: 11px; color: var(--ink-3); font-family: var(--font-num);
      border: 1px dashed #bcd8d2; border-radius: 8px;
    }

    /* ── card ── */
    #tab-board .card {
      position: relative; background: var(--paper); border: 1px solid var(--line);
      border-radius: 10px; box-shadow: var(--shadow-card); padding: 10px 11px 11px;
    }
    #tab-board .month-list > .card { border-style: dashed; border-color: #cdd6d8; }
    #tab-board .card.tier-soon { border-left: 3px solid var(--soon); }
    #tab-board .card.tier-out { border-left: 3px solid var(--out); }
    #tab-board .card-top { display: flex; align-items: flex-start; gap: 7px; }
    #tab-board .grip {
      flex: none; width: 16px; align-self: stretch; cursor: grab;
      color: #c4cdd0; margin: -2px 0 -2px -3px;
      display: flex; align-items: flex-start; padding-top: 2px;
      opacity: 0; transition: opacity .12s;
    }
    #tab-board .grip svg { width: 11px; height: 16px; }
    #tab-board .card:hover .grip, #tab-board .shipment:hover > .ship-head .grip { opacity: 1; }
    #tab-board .grip:active { cursor: grabbing; }
    #tab-board .card-name {
      flex: 1; min-width: 0; font-size: 13.5px; font-weight: 600;
      letter-spacing: -.01em; line-height: 1.25; outline: none;
    }
    #tab-board .card-name:empty::before { content: 'Name'; color: var(--ink-3); }
    #tab-board .badge {
      flex: none; font-family: var(--font-num); font-size: 9.5px; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase; padding: 3px 6px;
      border-radius: 20px; line-height: 1; color: var(--ink-3); background: var(--line-soft);
    }
    #tab-board .tier-soon .badge { color: var(--soon); background: var(--soon-tint); }
    #tab-board .tier-out .badge { color: var(--out); background: var(--out-tint); }
    #tab-board .proj { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    #tab-board .proj .cell { min-width: 0; }
    #tab-board .proj .pk {
      font-size: 9px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--ink-3); text-align: center;
    }
    #tab-board .proj .pv { display: flex; align-items: baseline; gap: 5px; margin-top: 2px; justify-content: center; }
    #tab-board .proj .now {
      font-family: var(--font-num); font-weight: 500; color: var(--b-ink);
      font-size: 19px; line-height: 1; letter-spacing: -.02em;
    }
    #tab-board .proj .now .u { font-size: 11px; color: var(--ink-3); margin-left: 1px; }
    #tab-board .proj .runout .now { font-size: 15px; }
    #tab-board .tier-soon .proj .daysleft .now { color: var(--soon); }
    #tab-board .tier-out .proj .daysleft .now { color: var(--out); }
    #tab-board .proj .arrow { color: var(--ink-3); font-size: 12px; opacity: 0; width: 0; transition: opacity .15s; }
    #tab-board .proj .next { font-family: var(--font-num); font-weight: 500; color: var(--accent-deep); opacity: 0; width: 0; overflow: hidden; }
    #tab-board .proj .daysleft .next { font-size: 19px; line-height: 1; letter-spacing: -.02em; }
    #tab-board .proj .daysleft .next .u { font-size: 11px; color: var(--accent); }
    #tab-board .proj .runout .next { font-size: 15px; }
    #tab-board .card.has-order .proj .now {
      color: var(--ink-3); font-size: 13px;
    }
    #tab-board .card.has-order .proj .runout .now { font-size: 11px; }
    #tab-board .card.has-order .proj .arrow { opacity: 1; width: auto; }
    #tab-board .card.has-order .proj .next { opacity: 1; width: auto; overflow: visible; }
    #tab-board .order {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--line);
    }
    #tab-board .field { display: flex; flex-direction: column; gap: 3px; }
    #tab-board .field label {
      font-size: 9px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--ink-3);
    }
    #tab-board .input-wrap {
      display: flex; align-items: center; gap: 2px;
      background: #f7f9f9; border: 1px solid var(--line); border-radius: 7px;
      padding: 0 8px; height: 30px; transition: border-color .12s, background .12s;
    }
    #tab-board .input-wrap:focus-within { border-color: var(--accent); background: #fff; }
    #tab-board .input-wrap .pfx, #tab-board .input-wrap .sfx {
      font-family: var(--font-num); font-size: 11px; color: var(--ink-3); flex: none;
    }
    #tab-board .input-wrap input {
      width: 100%; min-width: 0; border: 0; background: transparent; outline: none;
      font-family: var(--font-num); font-size: 13px; color: var(--b-ink);
      -moz-appearance: textfield; text-align: right;
    }
    #tab-board .input-wrap input::-webkit-inner-spin-button,
    #tab-board .input-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    #tab-board .card-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    #tab-board .meta { font-family: var(--font-num); font-size: 10.5px; color: var(--ink-3); }
    #tab-board .meta b { color: var(--ink-2); font-weight: 500; }
    #tab-board .card-foot .ototal { margin-left: auto; font-family: var(--font-num); font-size: 14px; font-weight: 500; }
    #tab-board .card-foot .ototal small {
      font-size: 9px; color: var(--ink-3); letter-spacing: .05em;
      font-weight: 600; text-transform: uppercase; margin-right: 5px;
    }
    #tab-board .incl-toggle {
      flex: none; border: 0; background: transparent; padding: 0; cursor: pointer;
      display: inline-flex; align-items: center; margin-left: 2px;
    }
    #tab-board .incl-toggle .sw {
      width: 30px; height: 17px; border-radius: 20px; background: #d2d9da;
      position: relative; transition: background .15s;
    }
    #tab-board .incl-toggle .sw i {
      position: absolute; top: 2px; left: 2px; width: 13px; height: 13px;
      border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2);
      transition: transform .15s;
    }
    #tab-board .incl-toggle:hover .sw { background: #c3ccce; }
    #tab-board .card.counted .incl-toggle .sw { background: var(--accent); }
    #tab-board .card.counted .incl-toggle:hover .sw { background: var(--accent-deep); }
    #tab-board .card.counted .incl-toggle .sw i { transform: translateX(13px); }
    #tab-board .month-list > .card .badge.loose-tag { display: inline-block; }
    #tab-board .badge.loose-tag { display: none; background: #eef2f2; color: var(--ink-3); }
    #tab-board .del {
      position: absolute; top: 7px; right: 7px; width: 20px; height: 20px;
      border: 0; border-radius: 6px; background: transparent; color: var(--ink-3);
      cursor: pointer; opacity: 0; transition: opacity .12s, background .12s, color .12s;
      display: grid; place-items: center; font-size: 14px; line-height: 1;
    }
    #tab-board .card:hover .del, #tab-board .ship-head:hover .del { opacity: 1; }
    #tab-board .del:hover { background: var(--out-tint); color: var(--out); }
    #tab-board .ship-head .del { position: static; opacity: 0; }
    #tab-board .shipment:hover .ship-head .del { opacity: 1; }

<script>
  const COLUMNS = [
    { key: "item",              label: "Item",       cls: "item" },
    { key: "brand",             label: "Brand",      cls: "" },
    { key: "daily_qty",         label: "Qty / day",  cls: "qty" },
    { key: "from",              label: "Source",     cls: "source-cell" },
    { key: "Price",             label: "Price",      cls: "qty" },
    { key: "payment_structure", label: "Payment",    cls: "payment" },
    { key: "listing_id",        label: "Listing ID", cls: "listing-id" },
  ];

  let allRows = [];
  let suppliers = [];
  let sortCol = "item";
  let sortAsc = true;
  let activeMenu = null;

  function fmtPrice(v) {
    const n = parseFloat(v);
    return isNaN(n) ? "" : `$${n.toFixed(2)}`;
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Close any open menu ──
  function closeMenu() {
    if (!activeMenu) return;
    const { trigger, menu } = activeMenu;
    trigger.classList.remove("open");
    menu.classList.remove("open");
    activeMenu = null;
  }

  document.addEventListener("click", (e) => {
    if (activeMenu && !activeMenu.trigger.contains(e.target) && !activeMenu.menu.contains(e.target)) {
      closeMenu();
    }
  });

  // ── Build a source dropdown cell ──
  function makeSourceCell(row) {
    const current = row["from"] ?? "";

    const trigger = document.createElement("button");
    trigger.className = "source-trigger";
    trigger.innerHTML = `
      <span class="source-label">${esc(current)}</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m6 9 6 6 6-6"/>
      </svg>`;

    const menu = document.createElement("div");
    menu.className = "source-menu";

    function buildOptions(selectedValue) {
      menu.innerHTML = "";
      suppliers.forEach(name => {
        const opt = document.createElement("div");
        opt.className = "source-option" + (name === selectedValue ? " selected" : "");
        opt.innerHTML = `
          <svg class="check" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          ${esc(name)}`;
        opt.addEventListener("click", () => selectSupplier(name));
        menu.appendChild(opt);
      });
    }

    async function selectSupplier(name) {
      if (name === row["from"]) { closeMenu(); return; }
      closeMenu();

      // Optimistic update
      trigger.querySelector(".source-label").textContent = name;
      const prevVal = row["from"];
      row["from"] = name;

      try {
        const res = await fetch(`/api/intakes/${row.ID}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ from: name }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (err) {
        // Rollback on failure
        row["from"] = prevVal;
        trigger.querySelector(".source-label").textContent = prevVal;
        const errNote = document.createElement("div");
        errNote.className = "source-error";
        errNote.textContent = "Save failed — try again";
        menu.appendChild(errNote);
        console.error("Source update failed:", err);
      }
    }

    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      if (activeMenu && activeMenu.trigger === trigger) {
        closeMenu();
        return;
      }
      closeMenu();
      buildOptions(row["from"]);
      trigger.classList.add("open");
      menu.classList.add("open");
      activeMenu = { trigger, menu };
    });

    buildOptions(current);

    const wrapper = document.createElement("div");
    wrapper.style.position = "relative";
    wrapper.style.display = "inline-block";
    wrapper.appendChild(trigger);
    wrapper.appendChild(menu);
    return wrapper;
  }

  // ── Render headers ──
  function renderHeaders() {
    const tr = document.getElementById("header-row");
    tr.innerHTML = "";
    COLUMNS.forEach(col => {
      const th = document.createElement("th");
      const isSorted = sortCol === col.key;
      if (isSorted) th.classList.add("sorted");
      th.innerHTML = `${col.label}<span class="sort-icon">${isSorted ? (sortAsc ? "▲" : "▼") : "⇅"}</span>`;
      th.addEventListener("click", () => {
        if (sortCol === col.key) sortAsc = !sortAsc;
        else { sortCol = col.key; sortAsc = true; }
        render(document.getElementById("search").value);
      });
      tr.appendChild(th);
    });
  }

  // ── Render table body ──
  function render(query = "") {
    renderHeaders();
    const tbody = document.getElementById("table-body");
    const q = query.toLowerCase();
    let rows = allRows.filter(r =>
      COLUMNS.some(c => String(r[c.key] ?? "").toLowerCase().includes(q))
    );
    rows.sort((a, b) => {
      const numeric = sortCol === "daily_qty" || sortCol === "Price";
      const n = numeric
        ? (parseFloat(a[sortCol]) || 0) - (parseFloat(b[sortCol]) || 0)
        : String(a[sortCol] ?? "").toLowerCase() < String(b[sortCol] ?? "").toLowerCase() ? -1
        : String(a[sortCol] ?? "").toLowerCase() > String(b[sortCol] ?? "").toLowerCase() ? 1 : 0;
      return sortAsc ? n : -n;
    });

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${COLUMNS.length}" class="empty">No results found.</td></tr>`;
      document.getElementById("count").textContent = "";
      return;
    }

    tbody.innerHTML = "";
    rows.forEach(r => {
      const tr = document.createElement("tr");

      const cells = [
        { cls: "item",       html: esc(r.item) },
        { cls: "",           html: `<span class="badge">${esc(r.brand)}</span>` },
        { cls: "qty",        html: esc(r.daily_qty) },
        { cls: "source-cell", node: makeSourceCell(r) },
        { cls: "qty",        html: fmtPrice(r.Price) },
        { cls: "payment",    html: esc(r.payment_structure) },
        { cls: "listing-id", html: esc(r.listing_id) },
      ];

      cells.forEach(({ cls, html, node }) => {
        const td = document.createElement("td");
        if (cls) td.className = cls;
        if (node) td.appendChild(node);
        else td.innerHTML = html;
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    document.getElementById("count").textContent =
      `${rows.length} item${rows.length !== 1 ? "s" : ""}`;
  }

  // ── Init: load intakes + suppliers in parallel ──
  async function init() {
    try {
      const [intakesRes, suppliersRes] = await Promise.all([
        fetch("/api/intakes"),
        fetch("/api/suppliers"),
      ]);
      if (!intakesRes.ok) throw new Error(`Intakes: HTTP ${intakesRes.status}`);
      if (!suppliersRes.ok) throw new Error(`Suppliers: HTTP ${suppliersRes.status}`);
      allRows = await intakesRes.json();
      suppliers = await suppliersRes.json();
      render();
    } catch (e) {
      document.getElementById("table-body").innerHTML =
        `<tr><td colspan="${COLUMNS.length}" class="error">Failed to load — ${e.message}</td></tr>`;
    }
  }

  document.getElementById("search").addEventListener("input", e => render(e.target.value));

  init();

  // ── Tab switching (persisted across reloads) ──
  const TAB_KEY = "np_active_tab";
  let boardInitialized = false;
  function activateTab(tab) {
    document.querySelectorAll(".tab-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.tab === tab));
    document.querySelectorAll(".tab-panel").forEach(p =>
      p.classList.toggle("active", p.id === `tab-${tab}`));
    const bc = document.getElementById("board-controls");
    if (bc) bc.classList.toggle("show", tab === "board");
    if (tab === "board" && !boardInitialized) {
      boardInitialized = true;
      if (window.SupplementBoard) {
        window.SupplementBoard.init();
      } else {
        // SortableJS script still loading — retry once it has had time to settle
        setTimeout(() => window.SupplementBoard && window.SupplementBoard.init(), 500);
      }
    }
    try { localStorage.setItem(TAB_KEY, tab); } catch (e) {}
  }
  document.querySelectorAll(".tab-btn").forEach(btn =>
    btn.addEventListener("click", () => activateTab(btn.dataset.tab)));
  // restore the last-open tab once all scripts (incl. the board) have parsed
  document.addEventListener("DOMContentLoaded", () => {
    let saved = "intakes";
    try { saved = localStorage.getItem(TAB_KEY) || "intakes"; } catch (e) {}
    if (saved === "board") activateTab("board");
  });
</script>

<script>
(function () {
  const DAY = 86400000;

  function today() { return new Date(); }
  function parseDate(iso) { return new Date(iso + 'T00:00:00'); }
  function addDays(d, n) { return new Date(d.getTime() + n * DAY); }
  function daysBetween(a, b) { return (b - a) / DAY; }

  function calc(c) {
    const dose = Number(c.dose) || 1;                  // caps/day
    const bottle = Number(c.bottleSize) || 0;          // caps/bottle
    const t = today();
    const logged = parseDate(c.loggedOn);
    const elapsed = Math.max(0, daysBetween(logged, t));
    const onHand = c.amount - dose * elapsed;           // may be < 0 (overdue)

    const curDaysLeft = onHand / dose;
    const curRunOut = addDays(logged, c.amount / dose);

    const qty = Number(c.qty) || 0;                     // BOTTLES
    const added = qty * bottle;
    const newOnHand = onHand + added;
    const newDaysLeft = newOnHand / dose;
    const newRunOut = addDays(t, newDaysLeft);

    const price = Number(c.price) || 0;                 // per bottle
    const cost = price * qty;

    return {
      dose, bottle, onHand, curDaysLeft, curRunOut,
      qty, added, newOnHand, newDaysLeft, newRunOut, price, cost,
      hasOrder: qty > 0,
    };
  }

  const MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
    'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function fmtDate(d) {
    const now = today();
    const base = `${MON[d.getMonth()]} ${d.getDate()}`;
    return d.getFullYear() !== now.getFullYear()
      ? `${base}, ’${String(d.getFullYear()).slice(2)}` : base;
  }
  function fmtDateShort(d) {
    const now = today();
    const base = `${d.getMonth() + 1}/${d.getDate()}`;
    return d.getFullYear() !== now.getFullYear()
      ? `${base}/${String(d.getFullYear()).slice(2)}` : base;
  }
  function fmtMoney(n) {
    return '$' + (Number(n) || 0).toLocaleString('en-US',
      { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtMoney0(n) {
    return '$' + Math.round(Number(n) || 0).toLocaleString('en-US');
  }
  function fmtUnits(n) {
    const r = Math.round(n);
    return r < 0 ? '0' : `${r}`;
  }

  function tier(days, threshold) {
    if (days <= 0) return 'out';
    if (days < threshold) return 'soon';
    return 'ok';
  }

  const SEED = {
    cardData: {
      drainage:  { name: 'Drainage Activator', amount: 62,  dose: 6,  bottleSize: 120, loggedOn: '2026-06-04', price: 45, qty: 1, includeInMonthTotal: true },
      biotoxin1: { name: 'BioToxin',           amount: 53,  dose: 4,  bottleSize: 120, loggedOn: '2026-06-04', price: 48, qty: 1, includeInMonthTotal: true },
      atp:       { name: 'ATP',                amount: 110, dose: 11, bottleSize: 120, loggedOn: '2026-06-04', price: 63, qty: 1, includeInMonthTotal: true },
      para2:     { name: 'Para 2',             amount: 65,  dose: 8,  bottleSize: 120, loggedOn: '2026-06-04', price: 40, qty: 1, includeInMonthTotal: true },
      serratia:  { name: 'Serratia',           amount: 9,   dose: 1,  bottleSize: 180, loggedOn: '2026-06-04', price: 54, qty: 1, includeInMonthTotal: false },
      biotoxin2: { name: 'BioToxin',           amount: 66,  dose: 4,  bottleSize: 120, loggedOn: '2026-05-29', price: 48, qty: 1, includeInMonthTotal: true },
      lymph:     { name: 'LymphActiv',         amount: 40,  dose: 2,  bottleSize: 60,  loggedOn: '2026-06-04', price: 36, qty: 1, includeInMonthTotal: true },
      para1:     { name: 'Para 1',             amount: 151, dose: 4,  bottleSize: 120, loggedOn: '2026-06-04', price: 42, qty: 1, includeInMonthTotal: false },
      brain:     { name: 'Brain',              amount: 105, dose: 2,  bottleSize: 180, loggedOn: '2026-05-29', price: 58, qty: 1, includeInMonthTotal: true },
      thymus:    { name: 'Thymus',             amount: 249, dose: 3,  bottleSize: 180, loggedOn: '2026-05-29', price: 39, qty: 1, includeInMonthTotal: true },
    },
    shipmentData: {
      s_bluesky_jun: { name: 'Blue Sky Vitamin' },
      s_cellcore:    { name: 'CellCore Direct' },
      s_fullscript:  { name: 'Fullscript' },
      s_bluesky_aug: { name: 'Blue Sky Vitamin' },
    },
    structure: [
      {
        id: 'm_jun', name: 'Jun', sub: '2026',
        blocks: [
          { type: 'shipment', id: 's_bluesky_jun', cards: ['atp', 'drainage', 'para2', 'serratia'] },
          { type: 'card', id: 'lymph' },
          { type: 'shipment', id: 's_cellcore', cards: ['biotoxin1', 'biotoxin2'] },
        ],
      },
      {
        id: 'm_jul', name: 'Jul', sub: '2026',
        blocks: [
          { type: 'shipment', id: 's_fullscript', cards: ['para1', 'brain'] },
        ],
      },
      {
        id: 'm_aug', name: 'Aug', sub: '2026',
        blocks: [
          { type: 'shipment', id: 's_bluesky_aug', cards: ['thymus'] },
        ],
      },
    ],
  };

  window.SB = {
    DAY, today, parseDate, addDays, daysBetween,
    calc, fmtDate, fmtDateShort, fmtMoney, fmtMoney0, fmtUnits, tier,
    SEED,
  };
})();
</script>

  let structure;
  let INV_MAP = {};     // lowercased-name -> Inventory row (set by applyInventory)
  let SPENT_BY_MONTH = {}; // month name -> $ amount (set by YNAB sync)

  // ── data layer: load the board from /api/orders (Turso) ──
  async function load() {
    try {
      const res = await fetch('/api/orders');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      fromApi(await res.json());
    } catch (e) {
      if (e instanceof TypeError) {
        // Network error: server not running. Don't corrupt the visible state
        // with the seed — just show a clear message and leave the board empty.
        STATE = { cardData: {}, shipmentData: {} };
        structure = [];
        const bar = document.getElementById('board');
        if (bar) bar.innerHTML = `<div style="padding:40px 24px;font-family:var(--font-ui);color:var(--ink-3);font-size:13px;">⚠ Could not reach the board API — is the dev server running?<br><code style="font-size:11px;margin-top:8px;display:block;">npm run dev:local</code></div>`;
      } else {
        // HTTP error from the server itself — show what went wrong.
        STATE = { cardData: {}, shipmentData: {} };
        structure = [];
        console.error('Board: /api/orders load failed —', e.message);
        const bar = document.getElementById('board');
        if (bar) bar.innerHTML = `<div style="padding:40px 24px;font-family:var(--font-ui);color:var(--ink-3);font-size:13px;">⚠ Board load error: ${e.message}</div>`;
      }
    }
  }

  // map { months, orders, items } -> board STATE + structure.
  // Inventory-sourced fields (dose/amount/bottleSize/loggedOn) are absent for
  // now; the board renders run-out as "—" until the Inventory sheet is wired.
  function fromApi(data) {
    const months = (data.months || []).slice().sort((a, b) => a.position - b.position);
    const orders = data.orders || [];
    const items = data.items || [];
    const cardData = {}, shipmentData = {};
    items.forEach((it) => {
      cardData[it.order_item_id] = {
        name: it.supplement,
        price: it.price_per_bottle || 0,
        qty: it.order_qty_bottles || 0,
        includeInMonthTotal: !!it.include_in_total,
      };
    });
    orders.forEach((o) => { shipmentData[o.order_id] = { name: o.merchant || 'Order' }; });

    structure = months.map((m) => {
      const blocks = [];
      orders.filter((o) => o.month === m.month).forEach((o) => {
        const cards = items
          .filter((it) => it.order_id === o.order_id)
          .sort((a, b) => a.item_position - b.item_position)
          .map((it) => it.order_item_id);
        blocks.push({ _pos: o.position, type: 'shipment', id: o.order_id, cards });
      });
      items.filter((it) => it.month === m.month && (it.order_id == null || it.order_id === ''))
        .forEach((it) => blocks.push({ _pos: it.block_position, type: 'card', id: it.order_item_id }));
      blocks.sort((a, b) => (a._pos || 0) - (b._pos || 0));
      blocks.forEach((b) => delete b._pos);
      return { id: m.month, name: m.month, sub: String(m.year || ''), blocks };
    });
    STATE = { cardData, shipmentData };
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function isoToday() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  function uid(p) { return p + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
  function el(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  // ── builders ──
  function cardHTML(id) {
    const c = STATE.cardData[id];
    return `
    <div class="card" data-id="${id}" data-kind="card">
      <div class="card-body">
        <div class="card-top">
          <span class="grip block-grip card-grip" title="Drag">${ICON.grip}</span>
          <div class="card-name" contenteditable="true" spellcheck="false" data-field="name">${esc(c.name)}</div>
          <span class="badge loose-tag">Loose</span>
          <span class="badge status">OK</span>
        </div>
        <div class="proj">
          <div class="cell daysleft">
            <div class="pk">Days left</div>
            <div class="pv">
              <span class="now"><span class="n">0</span><span class="u">d</span></span>
              <span class="arrow">→</span>
              <span class="next"><span class="n">0</span><span class="u">d</span></span>
            </div>
          </div>
          <div class="cell runout">
            <div class="pk">Runs out</div>
            <div class="pv">
              <span class="now">—</span>
              <span class="arrow">→</span>
              <span class="next">—</span>
            </div>
          </div>
        </div>
        <div class="order">
          <div class="field">
            <label>Price <span class="lbl-sub">/ bottle</span></label>
            <div class="input-wrap"><span class="pfx">$</span><input type="number" step="0.01" min="0" inputmode="decimal" data-field="price" value="${c.price}"></div>
          </div>
          <div class="field">
            <label>Order <span class="lbl-sub">bottles</span></label>
            <div class="input-wrap"><input type="number" step="1" min="0" inputmode="numeric" data-field="qty" value="${c.qty}"><span class="sfx">btl</span></div>
          </div>
        </div>
        <div class="card-foot">
          <span class="meta">on hand <b class="onhand">0</b> · <b class="dose">0</b>/day · <b class="bsize">0</b>/btl</span>
          <span class="ototal"><small>Order</small><span class="amt">$0.00</span></span>
          <button class="incl-toggle" data-act="toggle-include" title="Count this item in the month’s Planned total" aria-label="Count in Planned total"><span class="sw"><i></i></span></button>
        </div>
        <button class="del" data-act="del-card" title="Remove item" aria-label="Remove item">×</button>
      </div>
    </div>`;
  }

  function shipmentHTML(block) {
    const s = STATE.shipmentData[block.id] || { name: 'Shipment' };
    const cards = block.cards.map(cardHTML).join('');
    return `
    <div class="shipment" data-id="${block.id}" data-kind="shipment">
      <div class="ship-head">
        <span class="grip block-grip" title="Drag shipment">${ICON.grip}</span>
        <span class="truck">${ICON.truck}</span>
        <div class="ship-id">
          <span class="ship-name" contenteditable="true" spellcheck="false" data-field="name">${esc(s.name)}</span>
          <span class="scount">0</span>
        </div>
        <button class="add-btn ship-add" data-act="add-card-ship">${ICON.plus} Item</button>
        <span class="ship-min-date"></span>
        <div class="ship-total"><span class="amt">$0.00</span></div>
        <button class="del" data-act="del-ship" title="Remove shipment">×</button>
      </div>
      <div class="ship-body" data-list="shipment">${cards}</div>
    </div>`;
  }

  function blockHTML(block) {
    return block.type === 'shipment' ? shipmentHTML(block) : cardHTML(block.id);
  }

  function monthHTML(m) {
    return `
    <div class="month" data-id="${m.id}">
      <div class="month-head">
        <div class="month-title">
          <span class="mname" contenteditable="true" spellcheck="false" data-field="name">${esc(m.name)}</span>
          <span class="msub">${esc(m.sub || '')}</span>
          <span class="mcount">0</span>
        </div>
        <button class="add-btn month-add" data-act="add-ship">${ICON.plus} Order</button>
        <button class="add-btn month-add" data-act="add-card-month">${ICON.plus} Item</button>
        <div class="month-metrics">
          <div class="metric spent">
            <span class="mk">Spent</span>
            <span class="mv spentv">$0.00</span>
          </div>
          <div class="metric">
            <span class="mk">Shipments</span>
            <span class="mv shipv">$0.00</span>
          </div>
          <div class="metric is-total">
            <span class="mk">Planned</span>
            <span class="mv plannedv">$0.00</span>
          </div>
          <div class="metric is-max">
            <span class="mk">Max</span>
            <span class="mv maxv">$0.00</span>
          </div>
        </div>
      </div>
      <div class="month-list" data-list="month">${m.blocks.map(blockHTML).join('')}</div>
    </div>`;
  }

  function render() {
    board.innerHTML = structure.map(monthHTML).join('');
    board.querySelectorAll('.month-list').forEach(makeMonthSortable);
    board.querySelectorAll('.ship-body').forEach(makeShipSortable);
    recalcAll();
  }

  // ── per-card update ──
  function setDays(span, val) {
    const n = span.querySelector('.n');
    n.textContent = Math.max(0, Math.round(val));
  }

  function updateCard(cardEl) {
    const id = cardEl.dataset.id;
    const c = STATE.cardData[id];
    if (!c) return 0;
    const r = SB.calc(c);
    // run-out needs Inventory (dose/amount/loggedOn); absent until the sheet is wired
    const hasInv = c.dose != null && c.amount != null && c.loggedOn != null;
    const tier = hasInv ? SB.tier(r.curDaysLeft, thr()) : 'ok';
    const compact = board.classList.contains('layout-compact');
    const df = compact ? SB.fmtDateShort : SB.fmtDate;

    cardEl.classList.toggle('tier-soon', tier === 'soon');
    cardEl.classList.toggle('tier-out', tier === 'out');
    cardEl.classList.toggle('has-order', hasInv && r.hasOrder);
    cardEl.classList.toggle('counted', !!c.includeInMonthTotal);

    cardEl.querySelector('.status').textContent =
      !hasInv ? '—' : tier === 'out' ? 'OUT' : tier === 'soon' ? 'SOON' : 'OK';

    const dl = cardEl.querySelector('.daysleft');
    const ro = cardEl.querySelector('.runout');
    const dash = (span) => {
      const n = span.querySelector('.n'), u = span.querySelector('.u');
      if (n) { n.textContent = '—'; if (u) u.textContent = ''; } else { span.textContent = '—'; }
    };
    if (hasInv) {
      setDays(dl.querySelector('.now'), r.curDaysLeft);
      setDays(dl.querySelector('.next'), r.newDaysLeft);
      ro.querySelector('.now').textContent = df(r.curRunOut);
      ro.querySelector('.next').textContent = df(r.newRunOut);
      cardEl.querySelector('.onhand').textContent = SB.fmtUnits(r.onHand);
      cardEl.querySelector('.dose').textContent = String(+r.dose.toFixed(1));
      cardEl.querySelector('.bsize').textContent = String(r.bottle);
    } else {
      [dl.querySelector('.now'), dl.querySelector('.next'), ro.querySelector('.now'), ro.querySelector('.next')].forEach(dash);
      cardEl.querySelector('.onhand').textContent = '—';
      cardEl.querySelector('.dose').textContent = '—';
      cardEl.querySelector('.bsize').textContent = '—';
    }
    cardEl.querySelector('.ototal .amt').textContent = SB.fmtMoney(r.cost);

    cardEl.querySelectorAll('input[data-field]').forEach((inp) => {
      if (compact) {
        const len = Math.max(1, String(inp.value).length);
        inp.style.width = (len + 1.2) + 'ch';
      } else if (inp.style.width) {
        inp.style.width = '';
      }
    });

    return r.cost;
  }

  // ── totals ──
  function monthSpent(monthEl) {
    const name = monthEl.querySelector('.mname')?.textContent.trim();
    return SPENT_BY_MONTH[name] || 0;
  }

  function recalcAll() {
    board.querySelectorAll('.month').forEach((monthEl) => {
      const list = monthEl.querySelector('.month-list');
      let shipSum = 0, plannedItems = 0, maxItems = 0, itemCount = 0;

      [...list.children].forEach((node) => {
        if (node.classList.contains('shipment')) {
          let sTot = 0, sCount = 0, minRunOut = null;
          node.querySelectorAll(':scope .ship-body > .card').forEach((cardEl) => {
            const cost = updateCard(cardEl);
            const c = STATE.cardData[cardEl.dataset.id];
            const inc = c && c.includeInMonthTotal;
            maxItems += cost;
            if (inc) { sTot += cost; plannedItems += cost; }
            sCount++;
            // track min new run-out across all ordered cards (needs Inventory data)
            if (c && c.dose && c.loggedOn) {
              const r = SB.calc(c);
              if (r.hasOrder && isFinite(r.newRunOut)) {
                if (!minRunOut || r.newRunOut < minRunOut) minRunOut = r.newRunOut;
              }
            }
          });
          node.querySelector('.ship-total .amt').textContent = SB.fmtMoney(sTot);
          node.querySelector('.scount').textContent = sCount;
          const md = node.querySelector('.ship-min-date');
          if (md) md.textContent = minRunOut ? SB.fmtDateShort(minRunOut) : '';
          shipSum += sTot;
          itemCount += sCount;
        } else if (node.classList.contains('card')) {
          const cost = updateCard(node);
          maxItems += cost;
          if (STATE.cardData[node.dataset.id] && STATE.cardData[node.dataset.id].includeInMonthTotal) plannedItems += cost;
          itemCount++;
        }
      });

      const spent = monthSpent(monthEl);
      const spentEl = monthEl.querySelector('.spentv');
      if (spentEl) spentEl.textContent = SB.fmtMoney(spent);
      monthEl.querySelector('.shipv').textContent = SB.fmtMoney(shipSum);
      monthEl.querySelector('.plannedv').textContent = SB.fmtMoney(spent + plannedItems);
      monthEl.querySelector('.maxv').textContent = SB.fmtMoney(spent + maxItems);
      monthEl.querySelector('.mcount').textContent = `${itemCount}`;
    });
  }
  window.SBoard.recalc = recalcAll;

  // ── persistence: serialize the DOM to the /api/orders shape and PUT it ──
  function pushItem(items, id, orderId, month, blockPos, itemPos) {
    const c = STATE.cardData[id] || {};
    items.push({
      order_item_id: id,
      order_id: orderId,
      month,
      block_position: blockPos,
      item_position: itemPos,
      supplement: c.name || '',
      price_per_bottle: Number(c.price) || 0,
      order_qty_bottles: Number(c.qty) || 0,
      include_in_total: c.includeInMonthTotal ? 1 : 0,
    });
  }
  function toApi() {
    const months = [], orders = [], items = [];
    [...board.querySelectorAll('.month')].forEach((m, mi) => {
      const month = m.querySelector('.mname').textContent.trim();
      months.push({
        month,
        year: parseInt(m.querySelector('.msub').textContent.trim(), 10) || null,
        position: mi + 1,
      });
      const blocks = [...m.querySelector('.month-list').children]
        .filter((n) => n.classList.contains('shipment') || n.classList.contains('card'));
      blocks.forEach((n, bi) => {
        const blockPos = bi + 1;
        if (n.classList.contains('shipment')) {
          const oid = n.dataset.id;
          const s = STATE.shipmentData[oid] || {};
          orders.push({ order_id: oid, month, merchant: s.name || '', position: blockPos, status: 'Staged' });
          [...n.querySelectorAll(':scope .ship-body > .card')].forEach((cardEl, ci) => {
            pushItem(items, cardEl.dataset.id, oid, month, blockPos, ci + 1);
          });
        } else {
          pushItem(items, n.dataset.id, null, month, blockPos, 1);
        }
      });
    });
    return { months, orders, items };
  }

  let saveTimer = null;
  async function persist() {
    // Never wipe Turso data if the board failed to load (structure would be empty).
    if (!structure || structure.length === 0) return;
    try {
      const res = await fetch('/api/orders', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(toApi()),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch (e) {
      console.error('Board: save to /api/orders failed —', e.message);
    }
  }
  function persistSoon() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(persist, 400);
  }

  // ── drag and drop (SortableJS, nested) ──
  const afterDrag = () => { recalcAll(); persist(); };
  const COMMON = {
    animation: 160, easing: 'cubic-bezier(.2,.7,.3,1)',
    filter: 'input,[contenteditable],button',
    preventOnFilter: false,
    ghostClass: 'sb-ghost', chosenClass: 'sb-chosen', dragClass: 'sb-drag',
    // forceFallback: use SortableJS's own pointer-driven drag clone instead of
    // native HTML5 DnD — renders the designed rotate/pop-shadow on the dragged
    // card, escapes the overflow:hidden clipping on shipments/compact cards, and
    // behaves consistently across browsers.
    forceFallback: true, fallbackOnBody: true, swapThreshold: 0.65,
  };
  function makeMonthSortable(listEl) {
    new Sortable(listEl, Object.assign({}, COMMON, {
      group: { name: 'sb', pull: true, put: true },
      draggable: '.card, .shipment',
      handle: '.block-grip',
      onEnd: afterDrag,
    }));
  }
  function makeShipSortable(bodyEl) {
    new Sortable(bodyEl, Object.assign({}, COMMON, {
      group: { name: 'sb', pull: true, put: (to, from, drag) => drag.classList.contains('card') },
      draggable: '.card',
      handle: '.card-grip',
      onEnd: afterDrag,
    }));
  }

  // ── editing ──
  board.addEventListener('input', (e) => {
    const t = e.target;
    if (t.matches('input[data-field]')) {
      const cardEl = t.closest('.card');
      const c = STATE.cardData[cardEl.dataset.id];
      c[t.dataset.field] = t.value === '' ? 0 : Number(t.value);
      updateCard(cardEl);
      recalcTotalsFor(cardEl);
      persistSoon();
    } else if (t.matches('.card-name')) {
      STATE.cardData[t.closest('.card').dataset.id].name = t.textContent;
      persistSoon();
    } else if (t.matches('.ship-name')) {
      const ship = t.closest('.shipment');
      (STATE.shipmentData[ship.dataset.id] || (STATE.shipmentData[ship.dataset.id] = {})).name = t.textContent;
      persistSoon();
    } else if (t.matches('.mname')) {
      persistSoon();
    }
  });

  function recalcTotalsFor(node) {
    const monthEl = node.closest('.month');
    if (!monthEl) return;
    const list = monthEl.querySelector('.month-list');
    let shipSum = 0, plannedItems = 0, maxItems = 0;
    [...list.children].forEach((n) => {
      if (n.classList.contains('shipment')) {
        let sTot = 0, minRunOut = null;
        n.querySelectorAll(':scope .ship-body > .card').forEach((cardEl) => {
          const c = STATE.cardData[cardEl.dataset.id];
          const r = c ? SB.calc(c) : null;
          const cost = r ? r.cost : 0;
          maxItems += cost;
          if (c && c.includeInMonthTotal) { sTot += cost; plannedItems += cost; }
          if (c && c.dose && c.loggedOn && r && r.hasOrder && isFinite(r.newRunOut)) {
            if (!minRunOut || r.newRunOut < minRunOut) minRunOut = r.newRunOut;
          }
        });
        n.querySelector('.ship-total .amt').textContent = SB.fmtMoney(sTot);
        const md = n.querySelector('.ship-min-date');
        if (md) md.textContent = minRunOut ? SB.fmtDateShort(minRunOut) : '';
        shipSum += sTot;
      } else if (n.classList.contains('card')) {
        const c = STATE.cardData[n.dataset.id];
        const cost = c ? SB.calc(c).cost : 0;
        maxItems += cost;
        if (c && c.includeInMonthTotal) plannedItems += cost;
      }
    });
    const spent = monthSpent(monthEl);
    const spentEl = monthEl.querySelector('.spentv');
    if (spentEl) spentEl.textContent = SB.fmtMoney(spent);
    monthEl.querySelector('.shipv').textContent = SB.fmtMoney(shipSum);
    monthEl.querySelector('.plannedv').textContent = SB.fmtMoney(spent + plannedItems);
    monthEl.querySelector('.maxv').textContent = SB.fmtMoney(spent + maxItems);
  }

  // ── actions (add / delete / toggle) ──
  board.addEventListener('click', (e) => {
    const act = e.target.closest('[data-act]');
    if (!act) return;
    const a = act.dataset.act;

    if (a === 'toggle-include') {
      e.preventDefault();
      const cardEl = act.closest('.card');
      const c = STATE.cardData[cardEl.dataset.id];
      c.includeInMonthTotal = !c.includeInMonthTotal;
      cardEl.classList.toggle('counted', c.includeInMonthTotal);
      recalcTotalsFor(cardEl);
      persist();
      return;
    }
    if (a === 'del-card') {
      const cardEl = act.closest('.card');
      cardEl.remove();
      recalcAll(); persist();
      return;
    }
    if (a === 'del-ship') {
      act.closest('.shipment').remove();
      recalcAll(); persist();
      return;
    }
    if (a === 'add-card-ship') {
      const body = act.closest('.shipment').querySelector('.ship-body');
      showItemPicker(act, (id) => { body.appendChild(el(cardHTML(id))); finishAdd(body.lastElementChild); });
      return;
    }
    if (a === 'add-card-month') {
      const list = act.closest('.month').querySelector('.month-list');
      showItemPicker(act, (id) => { list.appendChild(el(cardHTML(id))); finishAdd(list.lastElementChild); });
      return;
    }
    if (a === 'add-ship') {
      const list = act.closest('.month').querySelector('.month-list');
      const sid = uid('s_');
      STATE.shipmentData[sid] = { name: 'New merchant' };
      const node = el(shipmentHTML({ type: 'shipment', id: sid, cards: [] }));
      list.appendChild(node);
      makeShipSortable(node.querySelector('.ship-body'));
      recalcAll(); persist();
      const nm = node.querySelector('.ship-name');
      nm.focus(); selectAll(nm);
      return;
    }
  });

  function newCard(name) {
    const id = uid('c_');
    const inv = INV_MAP[(name || '').trim().toLowerCase()];
    STATE.cardData[id] = {
      name: name || 'New supplement',
      amount: inv ? inv.amount : 0,
      dose: inv ? inv.dose : 0,
      bottleSize: inv ? inv.bottleSize : 0,
      loggedOn: inv ? inv.loggedOn : isoToday(),
      price: 0, qty: 0, includeInMonthTotal: true,
    };
    return id;
  }
  function finishAdd(node) {
    recalcAll(); persist();
    // focus the name only when Inventory didn't provide one (free-text fallback)
    const nm = node.querySelector('.card-name');
    if (nm) nm.focus();
  }

  // ── Inventory picklist shown when "+ Item" is clicked ──────────────────
  let activePicker = null;
  function showItemPicker(anchor, onSelect) {
    closeItemPicker();
    const names = Object.values(INV_MAP).map((v) => v.name).sort((a, b) => a.localeCompare(b));
    const picker = document.createElement('div');
    picker.className = 'inv-picker';
    picker.innerHTML = `
      <input class="inv-picker-search" type="text" placeholder="Search or type a name…" autocomplete="off" />
      <ul class="inv-picker-list"></ul>`;

    const input = picker.querySelector('.inv-picker-search');
    const list = picker.querySelector('.inv-picker-list');

    function renderList(q) {
      const matches = q ? names.filter((n) => n.toLowerCase().includes(q.toLowerCase())) : names;
      list.innerHTML = '';
      // "Use as typed" option when the query doesn't exactly match an Inventory item
      if (q && !names.some((n) => n.toLowerCase() === q.toLowerCase())) {
        const li = document.createElement('li');
        li.className = 'inv-picker-opt inv-picker-free';
        li.tabIndex = 0;
        li.textContent = `+ Add "${q}"`;
        li.dataset.name = q;
        list.appendChild(li);
      }
      matches.slice(0, 50).forEach((n) => {
        const li = document.createElement('li');
        li.className = 'inv-picker-opt';
        li.tabIndex = 0;
        li.textContent = n;
        li.dataset.name = n;
        list.appendChild(li);
      });
      if (!matches.length && !q) {
        const li = document.createElement('li');
        li.className = 'inv-picker-empty';
        li.textContent = 'No Inventory connected — type a name';
        list.appendChild(li);
      }
    }

    function commit(name) {
      closeItemPicker();
      const id = newCard(name);
      onSelect(id);
    }

    input.addEventListener('input', () => renderList(input.value));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeItemPicker(); return; }
      if (e.key === 'Enter') {
        const first = list.querySelector('.inv-picker-opt');
        if (first) commit(first.dataset.name);
        else if (input.value.trim()) commit(input.value.trim());
      }
      if (e.key === 'ArrowDown') { e.preventDefault(); list.querySelector('.inv-picker-opt')?.focus(); }
    });
    list.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.target.closest('.inv-picker-opt')?.click(); }
      if (e.key === 'ArrowDown') { e.preventDefault(); e.target.nextElementSibling?.focus(); }
      if (e.key === 'ArrowUp') { e.preventDefault(); const p = e.target.previousElementSibling; if (p) p.focus(); else input.focus(); }
      if (e.key === 'Escape') closeItemPicker();
    });
    list.addEventListener('click', (e) => {
      const opt = e.target.closest('.inv-picker-opt');
      if (opt) commit(opt.dataset.name);
    });

    // position below the anchor button
    anchor.style.position = 'relative';
    anchor.appendChild(picker);
    activePicker = picker;
    renderList('');
    input.focus();

    setTimeout(() => {
      document.addEventListener('click', outsideClick, true);
    }, 0);
    function outsideClick(e) {
      if (!picker.contains(e.target) && e.target !== anchor) closeItemPicker();
    }
    picker._outsideClick = outsideClick;
  }

  function closeItemPicker() {
    if (!activePicker) return;
    document.removeEventListener('click', activePicker._outsideClick, true);
    activePicker.remove();
    activePicker = null;
  }
  function selectAll(node) {
    const r = document.createRange();
    r.selectNodeContents(node);
    const s = window.getSelection();
    s.removeAllRanges(); s.addRange(r);
  }

  board.addEventListener('blur', (e) => {
    if (e.target.matches('[contenteditable]')) persist();
  }, true);
  board.addEventListener('paste', (e) => {
    if (e.target.matches('[contenteditable]')) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    }
  });
  board.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.matches('[contenteditable]')) {
      e.preventDefault(); e.target.blur();
    }
  });

  // ── public API (lazy init from the tab switcher) ──
  let booted = false;
  window.SupplementBoard = {
    async init() {
      if (booted) return;
      booted = true;
      await load();
      render();
      const asof = document.getElementById('board-asof');
      if (asof) asof.textContent = SB.fmtDate(SB.today());

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(recalcAll);
      }
      // keep the live countdown honest across midnight
      setInterval(recalcAll, 60 * 60 * 1000);
      // notify other modules (e.g. YNAB) that the board is ready
      document.dispatchEvent(new CustomEvent('boardReady'));
    },
    reset() {
      localStorage.removeItem(KEY);
      location.reload();
    },
    // apply YNAB-derived "Spent" values per month name (e.g. { Jun: 480.50 })
    applyYnabSpent(spentByMonth) {
      if (!board) return;
      Object.assign(SPENT_BY_MONTH, spentByMonth);
      board.querySelectorAll('.month').forEach((monthEl) => {
        const name = monthEl.querySelector('.mname').textContent.trim();
        if (!(name in spentByMonth)) return;
        const el = monthEl.querySelector('.spentv');
        if (el) el.textContent = SB.fmtMoney(spentByMonth[name]);
      });
      recalcAll();
      persist();
    },
    // merge Inventory (by supplement name) into the cards so run-out computes.
    // invMap: { "<name lowercased>": { amount, bottleSize, dose, loggedOn(ISO) } }
    // These are exactly calc()'s inputs, so the board's native run-out math runs.
    // Not persisted — Orders stays staging-only.
    applyInventory(invMap) {
      if (!STATE || !STATE.cardData) return 0;
      INV_MAP = invMap; // keep for the add-item picker
      let matched = 0;
      Object.values(STATE.cardData).forEach((c) => {
        const inv = invMap[String(c.name || '').trim().toLowerCase()];
        if (inv && inv.dose > 0 && inv.loggedOn) {
          c.amount = inv.amount;
          c.bottleSize = inv.bottleSize;
          c.dose = inv.dose;
          c.loggedOn = inv.loggedOn;
          matched++;
        }
      });
      recalcAll();
      return matched;
    },
  };

  const resetBtn = document.getElementById('board-reset');
  if (resetBtn) resetBtn.addEventListener('click', () => window.SupplementBoard.reset());
})();
</script>

<!-- ── YNAB: Personal Access Token + category-group sum for "Spent" ──
     The user pastes their YNAB PAT once; it's cached in localStorage.
     On sync (manual or on board open), we fetch each visible month from
     /budgets/last-used/months/{yyyy-mm-01}, sum activity for all categories
     in the "Health" category group (milliunits ÷ 1000, negated since
     spending is stored as negative), and write it into the Spent input.
     The YNAB API is CORS-enabled so this runs entirely in the browser. -->
<script>
(function () {
  const YNAB_BASE = 'https://api.ynab.com/v1';
  const TOKEN_KEY = 'np_ynab_token';
  const BUDGET_KEY = 'np_ynab_budget_id';
  const HEALTH_GROUP = 'Health';
  const MON3 = { Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
                 Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12' };

  const statusEl = document.getElementById('ynab-status');
  const syncBtn   = document.getElementById('sync-ynab');
  const connectBtn = document.getElementById('connect-ynab');

  function setStatus(text, cls) {
    if (!statusEl) return;
    statusEl.textContent = text;
    statusEl.className = 'ynab-status' + (cls ? ' ' + cls : '');
  }
  function getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch { return null; } }
  function getBudgetId() { try { return localStorage.getItem(BUDGET_KEY); } catch { return null; } }

  async function ynabFetch(path, token) {
    const r = await fetch(YNAB_BASE + path, {
      headers: { Authorization: 'Bearer ' + token },
    });
    if (r.status === 401) throw new Error('invalid-token');
    if (!r.ok) throw new Error('YNAB API ' + r.status);
    return r.json();
  }

  async function sync(token) {
    setStatus('Syncing…');
    // resolve budget ID (cached to avoid an extra round-trip)
    let budgetId = getBudgetId();
    if (!budgetId) {
      const data = await ynabFetch('/budgets/last-used', token);
      budgetId = data.data.budget.id;
      try { localStorage.setItem(BUDGET_KEY, budgetId); } catch {}
    }

    // collect visible months from the board DOM
    const board = document.getElementById('board');
    if (!board) { setStatus('Board not loaded', 'err'); return; }
    const monthEls = [...board.querySelectorAll('.month')];
    const spentByMonth = {};

    for (const monthEl of monthEls) {
      const name = monthEl.querySelector('.mname')?.textContent.trim();
      const year = parseInt(monthEl.querySelector('.msub')?.textContent.trim(), 10);
      const mm = MON3[name];
      if (!mm || !year) continue;

      const ynabMonth = `${year}-${mm}-01`;
      const data = await ynabFetch(`/budgets/${budgetId}/months/${ynabMonth}`, token);
      const cats = data.data.month.categories || [];
      const activityMilliunits = cats
        .filter(c => c.category_group_name === HEALTH_GROUP && !c.deleted)
        .reduce((s, c) => s + c.activity, 0);

      // YNAB spending = negative activity; negate to get positive "spent"
      spentByMonth[name] = Math.round(Math.abs(activityMilliunits)) / 1000;
    }

    if (window.SupplementBoard?.applyYnabSpent) {
      window.SupplementBoard.applyYnabSpent(spentByMonth);
    }

    setStatus('synced', 'ok');
    try { localStorage.setItem('np_ynab_last_sync', new Date().toISOString()); } catch {}
    refreshLabels();
  }

  async function runSync(token) {
    token = token || getToken();
    if (!token) return;
    try {
      await sync(token);
    } catch (e) {
      if (e.message === 'invalid-token') {
        setStatus('Invalid token', 'err');
        try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(BUDGET_KEY); } catch {}
        refreshLabels();
      } else {
        setStatus('Sync failed: ' + e.message, 'err');
      }
    }
  }

  function promptForToken() {
    const t = window.prompt(
      'Paste your YNAB Personal Access Token.\n\n' +
      'Find it at: app.ynab.com → Account Settings → Developer Settings → New Token',
      ''
    );
    if (!t || !t.trim()) return;
    const token = t.trim();
    try { localStorage.setItem(TOKEN_KEY, token); localStorage.removeItem(BUDGET_KEY); } catch {}
    refreshLabels();
    runSync(token);
  }

  function refreshLabels() {
    const hasToken = !!getToken();
    if (connectBtn) connectBtn.textContent = hasToken ? 'YNAB ✓' : '+ YNAB';
    if (syncBtn) syncBtn.hidden = !hasToken;
    if (!hasToken && statusEl) statusEl.textContent = '';
  }

  if (connectBtn) connectBtn.addEventListener('click', promptForToken);
  if (syncBtn) syncBtn.addEventListener('click', () => runSync());

  // auto-sync when the board tab is opened (if token exists and board is ready)
  document.addEventListener('boardReady', () => {
    if (getToken()) runSync();
  });

  refreshLabels();
})();
</script>

<!-- ── Inventory: Google OAuth (GIS) + Drive Picker + Sheets read ──
     The user picks their Inventory spreadsheet; the file id is cached locally.
     We read the "Inventory" tab via the Sheets API with the user's token and
     merge dose / Good Until / Supply Days into the board (by supplement name).
     Client ID + API key are public client-side values; restrict the API key by
     HTTP referrer in the Google Cloud console. -->
<script>
(function () {
  const GOOGLE = {
    clientId: '590352770305-b0agcr5v4c6e38taq7271gop7lub1q7u.apps.googleusercontent.com',
    apiKey: 'AIzaSyBTCb_yIVLNUcx1M3UlOeIwQQWmH2TYT2E',
    scopes: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets.readonly',
  };
  const FILE_KEY = 'np_inventory_file';

  const statusEl = () => document.getElementById('inv-status');
  const connectBtn = document.getElementById('connect-inventory');
  const changeBtn = document.getElementById('change-inventory');

  function setStatus(text, cls) {
    const el = statusEl(); if (!el) return;
    el.textContent = text;
    el.classList.remove('ok', 'err');
    if (cls) el.classList.add(cls);
  }
  function getCachedFile() {
    try { return JSON.parse(localStorage.getItem(FILE_KEY)); } catch (e) { return null; }
  }
  function setCachedFile(f) { try { localStorage.setItem(FILE_KEY, JSON.stringify(f)); } catch (e) {} }

  // wait for the async-loaded Google libraries
  function waitFor(test, ms = 8000) {
    return new Promise((resolve, reject) => {
      const t0 = Date.now();
      (function tick() {
        if (test()) return resolve();
        if (Date.now() - t0 > ms) return reject(new Error('Google libraries failed to load'));
        setTimeout(tick, 100);
      })();
    });
  }

  let tokenClient = null;
  function getToken() {
    return new Promise((resolve, reject) => {
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE.clientId, scope: GOOGLE.scopes, callback: () => {},
        });
      }
      tokenClient.callback = (resp) =>
        resp && resp.access_token ? resolve(resp.access_token) : reject(new Error(resp && resp.error || 'No token'));
      tokenClient.error_callback = (err) => reject(new Error(err && err.type || 'OAuth error'));
      tokenClient.requestAccessToken({ prompt: '' });
    });
  }

  function pickFile(token) {
    return new Promise((resolve, reject) => {
      gapi.load('picker', { callback: () => {
        try {
          const view = new google.picker.DocsView(google.picker.ViewId.SPREADSHEETS)
            .setSelectFolderEnabled(false).setMode(google.picker.DocsViewMode.LIST);
          const picker = new google.picker.PickerBuilder()
            .setOAuthToken(token)
            .setDeveloperKey(GOOGLE.apiKey)
            .addView(view)
            .setTitle('Choose your Inventory spreadsheet')
            .setCallback((data) => {
              if (data.action === google.picker.Action.PICKED) {
                const d = data.docs[0]; resolve({ id: d.id, name: d.name });
              } else if (data.action === google.picker.Action.CANCEL) { resolve(null); }
            })
            .build();
          picker.setVisible(true);
        } catch (e) { reject(e); }
      } });
    });
  }

  async function sheetsGet(token, path) {
    const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + path, {
      headers: { Authorization: 'Bearer ' + token },
    });
    if (!r.ok) throw new Error('Sheets API ' + r.status + (r.status === 403 ? ' (sheet not shared / scope denied)' : ''));
    return r.json();
  }

  // header row = an "Item" cell plus an inventory column
  function findHeader(rows) {
    return rows.findIndex((r) => {
      if (!r) return false;
      const low = r.map((c) => String(c == null ? '' : c).trim().toLowerCase());
      return low.indexOf('item') >= 0 && (low.indexOf('daily dose') >= 0 || low.indexOf('run out') >= 0 || low.indexOf('amount') >= 0);
    });
  }

  async function readInventory(token, fileId) {
    const meta = await sheetsGet(token, fileId + '?fields=sheets.properties.title');
    const titles = (meta.sheets || []).map((s) => s.properties.title).filter(Boolean);
    const title = titles.find((t) => t.trim().toLowerCase() === 'inventory')
               || titles.find((t) => /inventory/i.test(t));
    if (!title) throw new Error('No "Inventory" tab found. Tabs: ' + titles.join(', '));
    const vals = await sheetsGet(token, fileId + '/values/' + encodeURIComponent(title) + '?majorDimension=ROWS');
    const rows = vals.values || [];
    const hi = findHeader(rows);
    if (hi < 0) throw new Error('The "Inventory" tab has no "Item" header row');
    return { title, rows, hi };
  }

  function parseSheetDate(s) {
    s = String(s == null ? '' : s).trim();
    const p = s.split('/');
    if (p.length < 2) return null;
    const mo = parseInt(p[0], 10), d = parseInt(p[1], 10);
    if (isNaN(mo) || isNaN(d)) return null;
    let y = p[2] != null ? parseInt(p[2], 10) : NaN;
    if (isNaN(y)) y = new Date().getFullYear();
    else if (y < 100) y += 2000;
    return new Date(y, mo - 1, d);
  }

  function toISO(s) {
    const d = parseSheetDate(s);
    if (!d) return null;
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // Inventory columns: Item | Amount | Bottle Size | Logged On | Daily Dose | Run Out
  // (Expected Runway / Run Out are the sheet's own derived columns; the board recomputes.)
  function buildInvMap(rows, hi) {
    const norm = (s) => String(s == null ? '' : s).trim();
    const header = rows[hi].map((c) => norm(c).toLowerCase());
    const ci = (n) => header.indexOf(n.toLowerCase());
    const idx = {
      item: ci('Item'), amount: ci('Amount'), bottle: ci('Bottle Size'),
      logged: ci('Logged On'), dose: ci('Daily Dose'), type: ci('Type'),
    };

    // collect all rows per item
    const groups = {};
    for (let i = hi + 1; i < rows.length; i++) {
      const r = rows[i] || [];
      const name = norm(r[idx.item]);
      if (!name || name.toLowerCase() === 'summary') continue;
      const key = name.toLowerCase();
      // default to Reconcile when no Type column exists (backward-compatible)
      const type = idx.type >= 0 ? (norm(r[idx.type]) || 'Reconcile') : 'Reconcile';
      const loggedDate = idx.logged >= 0 ? parseSheetDate(norm(r[idx.logged])) : null;
      if (!groups[key]) groups[key] = { name, recs: [] };
      groups[key].recs.push({
        type,
        loggedDate,
        amount: Number(norm(r[idx.amount])) || 0,
        dose: idx.dose >= 0 ? (Number(norm(r[idx.dose])) || 0) : 0,
        bottleSize: idx.bottle >= 0 ? (Number(norm(r[idx.bottle])) || 0) : 0,
      });
    }

    // resolve each item to a single effective snapshot for calc()
    const map = {};
    for (const [key, { name, recs }] of Object.entries(groups)) {
      // most recent Reconcile by Logged On date
      const reconciles = recs
        .filter((r) => r.loggedDate && r.type.toLowerCase() !== 'adjustment')
        .sort((a, b) => b.loggedDate - a.loggedDate);
      if (!reconciles.length) continue;
      const rec = reconciles[0];

      // Adjustments on or after the reconcile date are additive to amount;
      // earlier ones are superseded by the reconcile and ignored.
      const adjSum = recs
        .filter((r) => r.type.toLowerCase() === 'adjustment'
                    && r.loggedDate && r.loggedDate >= rec.loggedDate)
        .reduce((s, r) => s + r.amount, 0);

      const d = rec.loggedDate;
      const loggedOn = d.getFullYear() + '-'
        + String(d.getMonth() + 1).padStart(2, '0') + '-'
        + String(d.getDate()).padStart(2, '0');

      map[key] = { name, amount: rec.amount + adjSum, bottleSize: rec.bottleSize, dose: rec.dose, loggedOn };
    }
    return map;
  }

  async function run(forcePick) {
    if (!window.SupplementBoard || !window.SupplementBoard.applyInventory) {
      setStatus('Open the board first', 'err'); return;
    }
    setStatus('Connecting…');
    try {
      await waitFor(() => window.google && google.accounts && google.accounts.oauth2 && window.gapi);
      const token = await getToken();
      let file = getCachedFile();
      if (forcePick || !file) {
        file = await pickFile(token);
        if (!file) { refreshLabels(); return; }
        setCachedFile(file);
      }
      setStatus('Reading “' + file.name + '”…');
      const { rows, hi } = await readInventory(token, file.id);
      const matched = window.SupplementBoard.applyInventory(buildInvMap(rows, hi));
      setStatus('Inventory: ' + file.name + ' · ' + matched + ' matched', 'ok');
      refreshLabels();
    } catch (e) {
      console.error('Inventory connect failed:', e);
      setStatus('Connect failed: ' + e.message, 'err');
    }
  }

  function refreshLabels() {
    const file = getCachedFile();
    if (connectBtn) connectBtn.textContent = file ? 'Refresh Inventory' : 'Connect Inventory';
    if (changeBtn) changeBtn.hidden = !file;
    if (file) { const el = statusEl(); if (el && !el.classList.contains('ok') && !el.classList.contains('err')) setStatus('Inventory: ' + file.name + ' (click Refresh)'); }
  }

  if (connectBtn) connectBtn.addEventListener('click', () => run(false));
  if (changeBtn) changeBtn.addEventListener('click', () => run(true));
  refreshLabels();
})();
</script>
</body>
</html>
