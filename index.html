<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normal Protocol — Intakes</title>
  <link rel="icon" type="image/svg+xml" href="Logos/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Google Identity Services (OAuth token client) + gapi (Drive Picker) for the Inventory tab -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #F6F4EE;
      --teal:   #79BDB1;
      --ink:    #171A1C;
      --ink-60: rgba(23,26,28,0.6);
      --ink-12: rgba(23,26,28,0.12);
      --radius: 10px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    :root { --cream-dark: #ECE7DA; }

    header {
      display: flex;
      align-items: stretch;
      gap: 16px;
      padding: 0 24px;
      min-height: 46px;
      background: var(--cream-dark);
      border-bottom: 1.5px solid var(--ink-12);
    }

    .brand { display: flex; align-items: center; gap: 10px; flex: 1 1 0; min-width: 0; }
    .brand img { width: 26px; height: 26px; }
    .brand h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    main { padding: 28px 32px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
    }

    .search-wrap { position: relative; }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-60);
      pointer-events: none;
    }

    #search {
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: var(--radius);
      padding: 7px 12px 7px 32px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--teal); }
    #search::placeholder { color: var(--ink-60); }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1.5px solid var(--ink-12);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--cream);
      padding: 11px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
      border-bottom: 1.5px solid var(--ink-12);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    thead th:hover { color: var(--ink); }
    thead th.sorted { color: var(--teal); }

    thead th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.5;
    }

    thead th.sorted .sort-icon { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--ink-12);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--cream); }

    tbody td {
      padding: 5px 16px;
      vertical-align: middle;
    }

    td.item { font-weight: 500; }

    td.qty {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      display: inline-block;
      background: rgba(121,189,177,0.15);
      color: var(--teal);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .listing-id {
      font-size: 12px;
      color: var(--ink-60);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .payment {
      font-size: 12px;
      color: var(--ink-60);
      max-width: 260px;
    }

    .empty, .loading, .error {
      text-align: center;
      padding: 48px 16px;
      color: var(--ink-60);
    }

    .error { color: #c0392b; }

    #count {
      font-size: 12px;
      color: var(--ink-60);
      margin-top: 12px;
    }

    /* ── Source dropdown ── */
    .source-cell { position: relative; }

    .source-trigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px 3px 10px;
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
      max-width: 180px;
    }

    .source-trigger:hover {
      border-color: var(--ink-12);
      background: white;
    }

    .source-trigger.open {
      border-color: var(--teal);
      background: white;
    }

    .source-trigger svg {
      flex-shrink: 0;
      color: var(--ink-60);
      transition: transform 0.15s;
    }

    .source-trigger.open svg { transform: rotate(180deg); }

    .source-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 100;
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(23,26,28,0.10);
      min-width: 160px;
      padding: 4px 0;
      overflow: hidden;
    }

    .source-menu.open { display: block; }

    .source-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
      transition: background 0.1s;
    }

    .source-option:hover { background: var(--cream); }

    .source-option.selected { font-weight: 600; }

    .source-option .check {
      width: 14px;
      flex-shrink: 0;
      color: var(--teal);
      visibility: hidden;
    }

    .source-option.selected .check { visibility: visible; }

    .source-saving {
      font-size: 11px;
      color: var(--ink-60);
      padding: 4px 10px 4px 34px;
      font-style: italic;
    }

    .source-error {
      font-size: 11px;
      color: #c0392b;
      padding: 4px 10px 4px 34px;
    }

    /* ── Tab navigation (centered in the top bar) ── */
    .tabs { display: flex; align-items: stretch; gap: 2px; }

    .tab-btn {
      appearance: none;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0 16px;
      font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--ink-60);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: var(--ink); }

    .tab-btn.active {
      color: #3f8f87;
      border-bottom-color: #3f8f87;
    }

    /* right side of the top bar — board-only Inventory controls */
    .header-right { flex: 1 1 0; display: flex; align-items: center; justify-content: flex-end; gap: 12px; min-width: 0; }
    .board-controls, .inv-controls { display: none; align-items: center; gap: 10px; }
    .board-controls.show, .inv-controls.show { display: flex; }
    .inv-soon-btn { font-size: 12px; padding: 4px 10px; border-radius: 4px; border: 1px solid #e08a3c; color: #e08a3c; background: transparent; cursor: pointer; }
    .inv-soon-btn.active { background: #e08a3c; color: #fff; }
    /* settings gear popout */
    .settings-wrap { position: relative; }
    .settings-btn {
      appearance: none; border: 1.5px solid var(--ink-12); background: transparent;
      cursor: pointer; padding: 5px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-60); transition: color 0.15s, border-color 0.15s;
    }
    .settings-btn:hover { color: var(--teal); border-color: var(--teal); }
    .settings-btn svg { width: 14px; height: 14px; display: block; fill: currentColor; }
    .settings-panel {
      display: none; flex-direction: column; gap: 6px;
      position: absolute; top: calc(100% + 8px); right: 0; z-index: 200;
      background: white; border: 1.5px solid var(--ink-12);
      border-radius: 10px; box-shadow: 0 4px 16px rgba(23,26,28,0.10);
      padding: 8px; min-width: 200px;
    }
    .settings-panel.open { display: flex; }
    .settings-panel-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--ink-60);
      padding: 2px 4px 6px; border-bottom: 1px solid var(--ink-12); margin-bottom: 2px;
    }
    .settings-action-btn {
      appearance: none; border: 1.5px solid var(--ink-12); background: white;
      border-radius: 7px; padding: 7px 10px; font-size: 12.5px; font-family: inherit;
      color: var(--ink); cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s;
    }
    .settings-action-btn:hover { border-color: var(--teal); background: rgba(121,189,177,0.06); color: #3f8f87; }

    /* refresh inventory button */
    .refresh-inv-btn {
      appearance: none; border: 1.5px solid var(--ink-12); background: transparent;
      cursor: pointer; padding: 5px 10px; border-radius: 7px; font-family: inherit;
      font-size: 12px; color: var(--ink-60); white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .refresh-inv-btn:hover { color: var(--teal); border-color: var(--teal); }

    /* shipment right-click context menu */
    .ship-ctx-menu {
      position: fixed; z-index: 9999;
      background: white; border: 1.5px solid var(--ink-12);
      border-radius: 9px; box-shadow: 0 6px 20px rgba(23,26,28,0.14);
      padding: 4px; min-width: 190px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    .ship-ctx-item {
      padding: 7px 11px; border-radius: 6px; cursor: pointer;
      color: var(--ink); transition: background 0.1s, color 0.1s;
    }
    .ship-ctx-item:hover { background: var(--cream); color: #3f8f87; }
    .ship-ctx-item.ctx-disabled { color: var(--ink-60); cursor: default; pointer-events: none; }
    .ship-ctx-divider { height: 1px; background: var(--ink-12); margin: 3px 4px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Inventory tab ── */
    #tab-inventory { padding-bottom: 20px; height: calc(100vh - 48px); overflow: auto; }
    #tab-inventory .table-wrap { overflow: visible; }
    #inv-table thead tr:first-child th { position: sticky; top: 0; z-index: 10; background: var(--cream); }
    #inv-table .inv-filters th { position: sticky; top: 40px; z-index: 10; background: var(--cream); }

    #inv-table td { font-size: 13px; }
    #inv-table .inv-name { font-weight: 500; }
    #inv-table .inv-onhand {
      font-variant-numeric: tabular-nums; cursor: pointer;
      border-radius: 4px; transition: background 0.12s;
    }
    #inv-table .inv-onhand:hover { background: rgba(112,196,187,0.12); color: #3f8f87; }
    #inv-table .inv-bottles { font-variant-numeric: tabular-nums; color: var(--ink-60); cursor: pointer; border-radius: 4px; transition: background 0.12s; white-space: nowrap; }
    #inv-table .inv-bottles:hover { background: rgba(112,196,187,0.12); color: #3f8f87; }
    #inv-table .inv-num { font-variant-numeric: tabular-nums; color: var(--ink-60); }
    #inv-table .inv-runout { font-size: 12px; white-space: nowrap; }
    .inv-bars { display: inline-flex; gap: 1px; align-items: center; vertical-align: middle; margin-left: 4px; }
    .inv-bar { display: block; flex-shrink: 0; width: 10px; height: 5px; border-radius: 1px; background: #3f8f87; opacity: 0.5; }
    #inv-table .inv-runout.inv-empty { color: #d6504a; font-weight: 600; }
    #inv-table .inv-runout.inv-soon { color: #e08a3c; }
    #inv-table .inv-no-data { color: var(--ink-60); }
    #inv-table .inv-supplier { font-size: 12px; color: var(--ink-60); }
    #inv-table .inv-del-btn { background: none; border: none; cursor: pointer; color: var(--ink-60); font-size: 14px; padding: 2px 4px; border-radius: 4px; opacity: 0; transition: opacity 0.1s, color 0.1s; line-height: 1; }
    #inv-table tr:hover .inv-del-btn { opacity: 1; }
    #inv-table .inv-del-btn:hover { color: #d6504a; }
    #inv-table .inv-filters th { padding: 3px 8px 6px; }
    #inv-table .inv-filters input[type=search] {
      width: 100%; box-sizing: border-box; padding: 3px 6px;
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 12px; font-family: inherit;
      background: var(--surface); color: var(--ink);
    }
    #inv-table .inv-filters input[type=search]:focus { outline: none; border-color: var(--teal); }
    #inv-table .inv-filters input[type=search]::-webkit-search-cancel-button { cursor: pointer; }

    .inv-edit-input {
      width: 72px; padding: 3px 6px; border: 1.5px solid var(--teal);
      border-radius: 4px; font-size: 13px; font-family: inherit;
      font-variant-numeric: tabular-nums; outline: none;
    }
  </style>

  <!-- ── Next Orders styles (compact layout, scoped to #tab-board) ── -->
  <style>
    #tab-board {
      --accent: #70c4bb;
      --accent-deep: #3f8f87;
      --accent-tint: #eaf6f4;
      --b-ink: #1c2426;
      --ink-2: #51606a;
      --ink-3: #8a979e;
      --line: #e4e9ea;
      --line-soft: #eef2f2;
      --b-bg: #eef1f2;
      --paper: #ffffff;
      --soon: #e08a3c;
      --soon-tint: #fdf3e8;
      --out: #d6504a;
      --out-tint: #fbecea;
      --shadow-card: 0 1px 2px rgba(28, 36, 38, .06), 0 1px 1px rgba(28, 36, 38, .04);
      --shadow-pop: 0 10px 28px rgba(28, 36, 38, .16);
      --font-ui: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
      --font-num: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;
      background: var(--cream);
      color: var(--b-ink);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      /* own scroll pane filling the viewport below the header, so the horizontal
         scrollbar is pinned to the bottom of the screen rather than mid-page */
      height: calc(100vh - 48px);
      overflow: auto;
    }

    @keyframes sb-pulse {
      0% { box-shadow: 0 0 0 0 rgba(112, 196, 187, .5); }
      70% { box-shadow: 0 0 0 7px rgba(112, 196, 187, 0); }
      100% { box-shadow: 0 0 0 0 rgba(112, 196, 187, 0); }
    }

    /* ── board scroller ── */
    #tab-board .board {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 18px;
      min-height: 100%;
    }

    /* ── month column ── */
    #tab-board .month {
      flex: 0 0 590px; width: 1200px;
      display: flex; flex-direction: column;
      background: #fff; border: 1px solid #dde3e4; border-radius: 14px;
    }
    #tab-board .month-head {
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 20;
      background: #fff; border-radius: 14px 14px 0 0;
      box-shadow: 0 1px 0 transparent;
      transition: box-shadow .15s;
    }
    #tab-board .month-head.is-stuck { box-shadow: 0 1px 0 #dde3e4; }
    .month-sentinel { height: 0; }
    #tab-board .month-title { display: flex; align-items: baseline; gap: 7px; flex: none; }
    #tab-board .month-title .mname { font-size: 16px; font-weight: 600; letter-spacing: -.01em; }
    #tab-board .month-title .msub { font-family: var(--font-num); font-size: 11px; color: var(--ink-3); }
    #tab-board .month-title .mcount {
      font-family: var(--font-num); font-size: 10px;
      color: var(--ink-3); background: #dbe2e3; padding: 1px 7px; border-radius: 20px;
    }
    #tab-board .month-metrics { margin-left: auto; margin-right: -9px; display: flex; align-items: center; }
    #tab-board .metric {
      display: flex; flex-direction: column; align-items: flex-end;
      padding: 0 9px; border-left: 1px solid #d7dedf; line-height: 1.15;
    }
    #tab-board .metric:first-child { border-left: 0; }
    #tab-board .metric:last-child { padding-right: 0; }
    #tab-board .metric .mk {
      font-size: 8.5px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--ink-3); white-space: nowrap;
    }
    #tab-board .metric .mv {
      font-family: var(--font-num); font-size: 14.5px; font-weight: 500;
      margin-top: 2px; letter-spacing: -.01em;
    }
    #tab-board .metric.is-total .mv { color: var(--accent-deep); font-weight: 600; }
    #tab-board .metric.is-max .mv { color: var(--ink-2); }
    #tab-board .metric.spent .mv { color: var(--b-ink); }
    #tab-board .field label .lbl-sub { color: var(--ink-3); font-weight: 500; }

    #tab-board .month-list {
      min-height: 40px; padding: 4px 11px 11px;
      display: flex; flex-direction: column; gap: 9px;
    }
    #tab-board .month-list > * { flex: 0 0 auto; }

    /* add buttons that live inline in the month / shipment header rows */
    #tab-board .month-head .add-btn, #tab-board .ship-head .add-btn {
      flex: 0 0 auto; height: 26px; padding: 0 7px; gap: 5px;
      border: 1px solid #c4cdd0; border-radius: 8px; background: rgba(255, 255, 255, .7);
      font-size: 11.5px; color: var(--ink-2);
    }
    /* push the $ total to the far right; min-date sits between + Item and total */
    #tab-board .ship-min-date {
      font-family: var(--font-num); font-size: 12px; color: var(--accent-deep);
      white-space: nowrap; flex: 0 0 auto; margin-left: auto;
    }
    #tab-board .ship-head .ship-total { margin-left: 12px; }
    #tab-board .month-head .add-btn:hover, #tab-board .ship-head .add-btn:hover {
      border-color: var(--accent); color: var(--accent-deep); background: #fff;
    }

    /* ── shipment block ── */
    #tab-board .shipment {
      background: var(--accent-tint); border: 1px solid #cfe6e2; border-radius: 11px;
      box-shadow: var(--shadow-card); overflow: hidden;
    }
    #tab-board .ship-head {
      display: flex; align-items: center; gap: 8px; padding: 5px 9px 0px 14px;
      background: transparent;
    }
    #tab-board .ship-head .truck {
      width: 22px; height: 22px; border-radius: 6px; flex: none;
      background: #fff; border: 1px solid #cfe6e2; color: var(--accent-deep);
      display: grid; place-items: center;
    }
    #tab-board .ship-head .truck svg { width: 13px; height: 13px; }
    #tab-board .ship-id { min-width: 0; flex: 0 1 auto; display: flex; align-items: baseline; gap: 7px; margin-right: 0; }
    #tab-board .ship-name {
      font-size: 13px; font-weight: 600; letter-spacing: -.01em; outline: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    #tab-board .ship-name:focus { text-overflow: clip; overflow: visible; }
    #tab-board .ship-id .scount {
      flex: none; font-family: var(--font-num); font-size: 10px; color: var(--ink-3);
      background: #d6e6e2; padding: 1px 7px; border-radius: 20px;
    }
    #tab-board .ship-total {
      font-family: var(--font-num); font-size: 14px; font-weight: 600;
      color: var(--accent-deep); text-align: right; padding-left: 4px;
    }
    #tab-board .ship-body { padding: 9px; display: flex; flex-direction: column; gap: 9px; min-height: 30px; }
    #tab-board .ship-body > * { flex: 0 0 auto; }
    #tab-board .ship-body:empty::after {
      content: 'Drop a card here'; display: block; text-align: center; padding: 10px 0;
      font-size: 11px; color: var(--ink-3); font-family: var(--font-num);
      border: 1px dashed #bcd8d2; border-radius: 8px;
    }

    /* ── card ── */
    #tab-board .card {
      position: relative; background: var(--paper); border: 1px solid var(--line);
      border-radius: 10px; box-shadow: var(--shadow-card); padding: 10px 11px 11px;
    }
    #tab-board .month-list > .card { border-color: #cdd6d8; }
    #tab-board .card               { border-left: 3px solid #d2d9da; }
    #tab-board .card.tier-reorder  { border-left-color: var(--accent); }
    #tab-board .card.tier-soon     { border-left-color: var(--soon); }
    #tab-board .card.tier-out      { border-left-color: var(--out); }
    #tab-board .card:not(.counted) { border-style: dashed; }
    #tab-board .card-top { display: flex; align-items: flex-start; gap: 7px; }
    /* drag handles: invisible left-border strip on cards, truck icon on shipments */
    #tab-board .card-grip { cursor: grab; flex: none; }
    #tab-board .truck.block-grip { cursor: grab; }
    #tab-board .grip:active { cursor: grabbing; }
    #tab-board .card-name {
      flex: 1; min-width: 0; font-size: 13.5px; font-weight: 600;
      letter-spacing: -.01em; line-height: 1.25; outline: none;
    }
    #tab-board .card-name:empty::before { content: 'Name'; color: var(--ink-3); }
    #tab-board .badge {
      flex: none; font-family: var(--font-num); font-size: 9.5px; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase; padding: 3px 6px;
      border-radius: 20px; line-height: 1; color: var(--ink-3); background: var(--line-soft);
    }
    #tab-board .tier-soon .badge { color: var(--soon); background: var(--soon-tint); }
    #tab-board .tier-out .badge { color: var(--out); background: var(--out-tint); }
    #tab-board .proj { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    #tab-board .proj .cell { min-width: 0; }
    #tab-board .proj .pk {
      font-size: 9px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--ink-3); text-align: center;
    }
    /* proj: "16d · Jun 24 → 49d · Jul 27" combined layout */
    #tab-board .proj .pv { display: flex; align-items: baseline; gap: 6px; margin-top: 2px; justify-content: center; }
    #tab-board .proj .cur, #tab-board .proj .nxt { display: flex; align-items: baseline; gap: 4px; }
    #tab-board .proj .dl {
      font-family: var(--font-num); font-weight: 500; color: var(--b-ink);
      font-size: 19px; line-height: 1; letter-spacing: -.02em;
    }
    #tab-board .proj .dl .u { font-size: 11px; color: var(--ink-3); margin-left: 1px; }
    #tab-board .proj .ro { font-family: var(--font-num); font-size: 15px; color: var(--b-ink); }
    #tab-board .proj .sep { font-size: 11px; color: var(--ink-3); margin-left: -4px; }
    #tab-board .tier-soon .proj .cur .dl { color: var(--soon); }
    #tab-board .tier-out .proj .cur .dl { color: var(--out); }
    #tab-board .proj .arrow { color: var(--ink-3); font-size: 12px; opacity: 0; width: 0; transition: opacity .15s; }
    #tab-board .proj .nxt { opacity: 0; width: 0; overflow: hidden; color: var(--accent-deep); }
    #tab-board .proj .nxt .dl { font-size: 19px; line-height: 1; letter-spacing: -.02em; color: var(--accent-deep); }
    #tab-board .proj .nxt .dl .u { font-size: 11px; color: var(--accent); }
    #tab-board .proj .nxt .ro { font-size: 15px; color: var(--accent-deep); }
    #tab-board .card.has-order .proj .cur .dl { color: var(--ink-3); font-size: 13px; }
    #tab-board .card.has-order .proj .cur .ro { font-size: 11px; color: var(--ink-3); }
    #tab-board .card.has-order .proj .arrow { opacity: 1; width: auto; }
    #tab-board .card.has-order .proj .nxt { opacity: 1; width: auto; overflow: visible; }
    #tab-board .order {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--line);
    }
    #tab-board .field { display: flex; flex-direction: column; gap: 3px; }
    #tab-board .field label {
      font-size: 9px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--ink-3);
    }
    #tab-board .input-wrap {
      display: flex; align-items: center; gap: 2px;
      background: #f7f9f9; border: 1px solid var(--line); border-radius: 7px;
      padding: 0 8px; height: 30px; transition: border-color .12s, background .12s;
    }
    #tab-board .input-wrap:focus-within { border-color: var(--accent); background: #fff; }
    #tab-board .input-wrap .pfx, #tab-board .input-wrap .sfx {
      font-family: var(--font-num); font-size: 11px; color: var(--ink-3); flex: none;
    }
    #tab-board .input-wrap input {
      width: 100%; min-width: 0; border: 0; background: transparent; outline: none;
      font-family: var(--font-num); font-size: 13px; color: var(--b-ink);
      -moz-appearance: textfield; text-align: right;
    }
    #tab-board .input-wrap input::-webkit-inner-spin-button,
    #tab-board .input-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    #tab-board .card-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    #tab-board .meta { font-family: var(--font-num); font-size: 10.5px; color: var(--ink-3); }
    #tab-board .meta b { color: var(--ink-2); font-weight: 500; }
    #tab-board .card-foot .ototal { margin-left: auto; font-family: var(--font-num); font-size: 14px; font-weight: 500; }
    #tab-board .card-foot .ototal small {
      font-size: 9px; color: var(--ink-3); letter-spacing: .05em;
      font-weight: 600; text-transform: uppercase; margin-right: 5px;
    }
    #tab-board .incl-toggle {
      flex: none; border: 0; background: transparent; padding: 0; cursor: pointer;
      display: inline-flex; align-items: center; margin-left: 2px;
    }
    #tab-board .incl-toggle .sw {
      width: 30px; height: 17px; border-radius: 20px; background: #d2d9da;
      position: relative; transition: background .15s;
    }
    #tab-board .incl-toggle .sw i {
      position: absolute; top: 2px; left: 2px; width: 13px; height: 13px;
      border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2);
      transition: transform .15s;
    }
    #tab-board .incl-toggle:hover .sw { background: #c3ccce; }
    #tab-board .card.counted .incl-toggle .sw { background: var(--accent); }
    #tab-board .card.counted .incl-toggle:hover .sw { background: var(--accent-deep); }
    #tab-board .card.counted .incl-toggle .sw i { transform: translateX(13px); }
    #tab-board .month-list > .card .badge.loose-tag { display: inline-block; }
    #tab-board .badge.loose-tag { display: none; background: #eef2f2; color: var(--ink-3); }
    #tab-board .del {
      position: absolute; top: 7px; right: 7px; width: 20px; height: 20px;
      border: 0; border-radius: 6px; background: transparent; color: var(--ink-3);
      cursor: pointer; opacity: 0; transition: opacity .12s, background .12s, color .12s;
      display: grid; place-items: center; font-size: 14px; line-height: 1;
    }
    #tab-board .card:hover .del, #tab-board .ship-head:hover .del { opacity: 1; }
    #tab-board .del:hover { background: var(--out-tint); color: var(--out); }
    #tab-board .ship-head .del { position: static; opacity: 0; }
    #tab-board .shipment:hover .ship-head .del { opacity: 1; }
    /* card-end groups incl-toggle + del; in non-compact it floats top-right like del did */
    #tab-board .card-end {
      position: absolute; top: 6px; right: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    #tab-board .card-end .del { position: static; }
    #tab-board .add-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      height: 34px; border: 1px dashed #c4cdd0; border-radius: 9px;
      background: transparent; color: var(--ink-2); font-family: var(--font-ui);
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all .12s;
    }
    #tab-board .add-btn:hover { border-color: var(--accent); color: var(--accent-deep); background: #fff; }
    #tab-board .add-btn svg { width: 12px; height: 12px; }

    /* ── Inventory item picker dropdown ── */
    .inv-picker {
      /* position:fixed + coordinates set by JS (body portal avoids overflow:hidden clipping) */
      z-index: 9999;
      background: #fff; border: 1px solid #c4cdd0; border-radius: 10px;
      box-shadow: var(--shadow-pop); overflow: hidden; text-align: left;
      /* local copies of board tokens (picker lives outside #tab-board) */
      --ip-soon: #e08a3c; --ip-soon-tint: #fdf3e8;
      --ip-out: #d6504a;  --ip-out-tint: #fbecea;
      --ip-reorder: #3f8f87; --ip-reorder-tint: #eaf6f4;
      --ip-mono: 'IBM Plex Mono', ui-monospace, monospace;
    }
    .inv-picker-search {
      width: 100%; border: 0; border-bottom: 1px solid var(--line); outline: none;
      padding: 9px 12px; font-family: var(--font-ui); font-size: 13px; color: var(--b-ink);
      background: #f7f9f9; border-radius: 10px 10px 0 0;
    }
    .inv-picker-list { list-style: none; margin: 0; padding: 4px 0; }
    .inv-picker-opt {
      padding: 7px 13px; font-size: 13px; cursor: pointer; color: #1c2426;
      transition: background .1s, color .12s; outline: none;
      border-radius: 6px; margin: 0 4px;
      display: grid; grid-template-columns: 145px 95px 1fr; align-items: center; gap: 8px;
    }
    .inv-picker-opt:hover, .inv-picker-opt:focus { background: #f0f2f3; color: #3f8f87; }
    .inv-picker-opt .ipm-left { min-width: 0; display: flex; align-items: baseline; gap: 5px; overflow: hidden; }
    .inv-picker-opt .ipm-name { flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inv-picker-opt .ipm-inlist { flex: none; font-size: 11px; color: #8a979e; white-space: nowrap; font-style: italic; }
    .inv-picker-opt .ipm-meta { font-family: var(--ip-mono); font-size: 11px; color: #8a979e; white-space: nowrap; text-align: right; }
    .inv-picker-opt.inv-picker-free { display: block; }
    .inv-picker-opt .ipm-bars { display: flex; gap: 1px; align-items: center; }
    .ipm-bar { display: block; flex-shrink: 0; width: 10px; height: 5px; border-radius: 1px; background: #3f8f87; opacity: 0.5; }
    .inv-picker-opt.is-soon    { background: var(--ip-soon-tint); }
    .inv-picker-opt.is-soon    .ipm-meta { color: var(--ip-soon); }
    .inv-picker-opt.is-out     { background: var(--ip-out-tint); }
    .inv-picker-opt.is-out     .ipm-meta { color: var(--ip-out); }
    .inv-picker-opt.is-reorder { background: var(--ip-reorder-tint); }
    .inv-picker-opt.is-reorder .ipm-meta { color: var(--ip-reorder); }
    .inv-picker-opt.is-soon:hover,    .inv-picker-opt.is-soon:focus    { background: #fdecd8; }
    .inv-picker-opt.is-out:hover,     .inv-picker-opt.is-out:focus     { background: #f8dcda; }
    .inv-picker-opt.is-reorder:hover, .inv-picker-opt.is-reorder:focus { background: #d4f0ed; }
    .inv-picker-opt.is-inlist { opacity: 0.45; }
    .inv-picker-opt.is-inlist:hover, .inv-picker-opt.is-inlist:focus { opacity: 1; }
    .inv-picker-free { color: #3f8f87; font-style: italic; }
    .inv-picker-empty { padding: 7px 13px; font-size: 12px; color: #8a979e; font-style: italic; }

    /* sortable helpers */
    #tab-board .sb-ghost { opacity: .4; }
    #tab-board .sb-chosen { box-shadow: var(--shadow-pop); }
    #tab-board .sb-drag { transform: none; }
    #tab-board .month-list.sb-over, #tab-board .ship-body.sb-over { outline: 2px dashed var(--accent); outline-offset: -3px; border-radius: 10px; }
    /* allow drag clone to escape overflow:hidden on .shipment */
    .sb-dragging #tab-board .shipment { overflow: visible; }
    /* closed-hand cursor while dragging */
    .sb-dragging, .sb-dragging * { cursor: grabbing !important; }

    /* ── Column alignment in compact mode ─────────────────────────────────
       Metric order: SPENT | SHIPMENTS | PLANNED | MAX  (MAX rightmost, original)

       Strategy: give MAX a min-width:88px so PLANNED's right edge is predictable
       for typical amounts (< $1000 → MAX ≤ 7 chars = ~79px fits in 88px):
         MAX right edge      ≈ 14px (month-head right padding, flush with content right)
         PLANNED right edge  ≈ 14 + 88 = 102px from .month inner right ← alignment column

       ship-total right: 90px  (= 102 − 12 where 12 = month-list 11 + ship border 1)

       Dates: proj right is at 18(card)+22(del)+9+84+9+82+9=233px from .shipment right.
       Runout cell (right half of proj, 68px) centered at 282px from .shipment left.
       ship-min-date is 68px wide centered over the runout cell: right:248px.
         (right:248 → element at 564−248−68=248 to 316px left → center 282px ✓)

       Loose cards lack ship-border(1)+ship-body-padding(6)=7px per side;
       margin:0 7px gives them the same card content width and alignment.             */
    #tab-board .board.layout-compact .ship-head { position: relative; }
    #tab-board .board.layout-compact .ship-head .ship-total {
      position: absolute; right: 334px; width: 84px;
      text-align: right; margin: 0;
      top: 56%; transform: translateY(-50%);
    }
    /* ship-min-date: 68px centered over the runout cell (right half of proj) */
    #tab-board .board.layout-compact .ship-min-date {
      position: absolute; right: 528px; width: 68px;
      text-align: right; margin: 0;
      top: 56%; transform: translateY(-50%);
    }
    /* ship-notes: freeform text between ship-total and del × */
    #tab-board .ship-notes {
      font-size: 12px; color: #222; flex: 1 1 0; min-width: 0;
      outline: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: text;
    }
    #tab-board .ship-notes:empty::before { content: attr(placeholder); opacity: .4; pointer-events: none; }
    #tab-board .ship-notes:focus { color: var(--fg); }
    #tab-board .board.layout-compact .ship-notes {
      position: absolute; right: 37px; width: 248px;
      text-align: left; margin: 0;
      top: 56%; transform: translateY(-50%);
    }
    /* del stays at far-right of the flex row now that ship-total is absolute */
    #tab-board .board.layout-compact .ship-head > .del { margin-left: auto; }
    /* month metrics: fixed-width columns so the alignment column is stable.
       PLANNED right edge = 14px (month-head pad) + 96px (MAX box) = 110px from month inner right.
       ship-total right = 110 − 12 (month-list 11 + shipment border 1) = 98px.
       SPENT and SHIPMENTS get min-width only (auto-size for short values, grow for large). */
    #tab-board .board.layout-compact .metric { width: 96px; }
    #tab-board .board.layout-compact .metric:last-child { padding-right: 9px; }
    /* loose cards: add 7px margin each side so they align with shipment cards */
    #tab-board .board.layout-compact .month-list > .card { margin: 0 7px; }

    /* ── Untracked (free-text) cards: no proj column, name is editable ── */
    #tab-board .card.card--untracked .status { display: none; }
    #tab-board .board.layout-compact .card.card--untracked .proj { display: none; }
    #tab-board .board.layout-compact .card.card--untracked .card-body {
      grid-template-columns: 321px 82px 84px 317px;
      grid-template-areas: "top order foot del";
    }
    /* lock tracked card names (cursor only; actual editing is blocked by no contenteditable) */
    #tab-board .card-name:not([contenteditable]) { cursor: default; user-select: none; }

    /* ── COMPACT layout — one dense grid row per card ── */
    #tab-board .board.layout-compact .month-list { gap: 5px; }
    #tab-board .board.layout-compact .ship-body { gap: 5px; padding: 6px; }
    #tab-board .board.layout-compact .card { position: relative; padding: 6px 6px 6px 11px; overflow: hidden; }
    #tab-board .board.layout-compact .card-grip {
      position: absolute; left: 0; top: 0; bottom: 0; width: 11px;
    }
    #tab-board .board.layout-compact .card-body {
      display: grid;
      grid-template-columns: 143px 155px 94px 81px 1fr;
      grid-template-areas: "top proj order foot del";
      align-items: center; column-gap: 9px;
    }
    #tab-board .board.layout-compact .badge,
    #tab-board .board.layout-compact .proj .pk,
    #tab-board .board.layout-compact .meta,
    #tab-board .board.layout-compact .input-wrap .sfx { display: none; }
    #tab-board .board.layout-compact .month-list > .card .badge.loose-tag { display: none; }
    #tab-board .board.layout-compact .card-top { grid-area: top; min-width: 0; gap: 5px; align-items: center; }
    #tab-board .board.layout-compact .card-name {
      font-size: 13px; line-height: 1.2; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #tab-board .board.layout-compact .proj {
      grid-area: proj; margin: 0;
      align-items: baseline; white-space: nowrap; justify-content: flex-end;
    }
    #tab-board .board.layout-compact .proj .pv { margin: 0; gap: 4px; justify-content: flex-end; }
    #tab-board .board.layout-compact .proj .dl { font-size: 13px; }
    #tab-board .board.layout-compact .proj .ro { font-size: 12px; }
    #tab-board .board.layout-compact .card.has-order .proj .cur .dl { font-size: 10px; }
    #tab-board .board.layout-compact .card.has-order .proj .cur .ro { font-size: 10px; }
    #tab-board .board.layout-compact .order {
      grid-area: order; margin: 0; padding: 0; border: 0;
      display: flex; gap: 4px; align-items: center; justify-content: flex-end;
    }
    #tab-board .board.layout-compact .order .field { flex-direction: row; align-items: center; gap: 4px; }
    #tab-board .board.layout-compact .order .field label { margin: 0; }
    #tab-board .board.layout-compact .order .field:nth-child(1) label { display: none; }
    #tab-board .board.layout-compact .order .field:nth-child(2) label { font-size: 0; }
    #tab-board .board.layout-compact .order .field:nth-child(2) label::before {
      content: '×'; font-size: 13px; font-weight: 500; color: var(--ink-3);
    }
    #tab-board .board.layout-compact .order .field label .lbl-sub { display: none; }
    #tab-board .board.layout-compact .input-wrap { height: 24px; padding: 0 6px; }
    #tab-board .board.layout-compact .input-wrap input { font-size: 12px; }
    #tab-board .board.layout-compact .input-wrap input[data-field="price"] { width: 3.2ch; }
    #tab-board .board.layout-compact .input-wrap input[data-field="qty"]   { width: 2ch; text-align: center; }
    #tab-board .board.layout-compact .card-foot {
      grid-area: foot; justify-self: stretch; justify-content: flex-end;
      align-items: center; gap: 7px; margin: 0;
    }
    #tab-board .board.layout-compact .incl-toggle .sw { width: 26px; height: 15px; }
    #tab-board .board.layout-compact .incl-toggle .sw i { width: 11px; height: 11px; }
    #tab-board .board.layout-compact .card.counted .incl-toggle .sw i { transform: translateX(11px); }
    #tab-board .board.layout-compact .card-foot .ototal small { display: none; }
    #tab-board .board.layout-compact .card-foot .ototal .amt { font-size: 13px; }
    #tab-board .board.layout-compact .card-end {
      position: static; grid-area: del;
      display: flex; align-items: center; justify-content: flex-start; gap: 4px;
    }
    /* card notes field — sits between toggle and × */
    #tab-board .card-notes {
      flex: 1 1 0; min-width: 0; font-size: 12px; color: #222; padding-left: 10px;
      outline: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: text;
    }
    #tab-board .card-notes:empty::before { content: attr(placeholder); opacity: .35; pointer-events: none; }
    #tab-board .card-notes:focus { color: var(--fg); }
    #tab-board .board.layout-compact .card-end .del {
      position: static; width: 18px; height: 18px; opacity: .4; flex: none;
    }
    #tab-board .board.layout-compact .card:hover .card-end .del { opacity: 1; }

    /* ── shipment stage toggle ── */
    #tab-board .ship-stage {
      display: flex; border: 1px solid var(--line); border-radius: 6px;
      overflow: hidden; flex: none;
    }
    #tab-board .stage-btn {
      font: 500 10.5px/1 var(--font-ui); padding: 4px 8px;
      background: var(--paper); color: var(--ink-3);
      border: none; border-left: 1px solid var(--line);
      cursor: pointer; transition: background .1s, color .1s; white-space: nowrap;
    }
    #tab-board .stage-btn:first-child { border-left: none; }
    #tab-board .stage-btn:hover:not(.active) { background: var(--accent-tint); color: var(--ink-2); }
    #tab-board .stage-btn.active { background: var(--b-ink); color: #fff; }

    /* ── locked shipment (any non-null stage) ── */
    #tab-board .shipment.is-locked {
      background: #f3f4f4; border-color: #d4d8d8;
    }
    #tab-board .shipment.is-locked > .ship-head {
      background: transparent;
    }
    #tab-board .shipment.is-locked > .ship-head .truck {
      background: #eaecec; border-color: #d4d8d8; color: #8a9798;
    }
    #tab-board .shipment.is-locked > .ship-head > .truck.block-grip { pointer-events: none; opacity: 0.4; }
    #tab-board .shipment.is-locked .ship-body .card-grip { pointer-events: none; opacity: 0.3; }
    #tab-board .shipment.is-locked .ship-body input[disabled] {
      background: transparent; opacity: 0.45; cursor: default;
    }
    #tab-board .shipment.is-locked .ship-body .incl-toggle[disabled] {
      opacity: 0.35; cursor: default; pointer-events: none;
    }
    #tab-board .shipment.is-locked .ship-add { display: none; }

    /* Divider above the first locked shipment */
    #tab-board .month-list > *:not(.shipment.is-locked) + .shipment.is-locked {
      margin-top: 14px;
      border-top-width: 2px;
      border-top-color: #b8bfbf;
    }

    /* compact mode: hide notes/min-date on locked ships so the toggle fits */
    #tab-board .board.layout-compact .shipment.is-locked .ship-notes { display: none; }
    #tab-board .board.layout-compact .shipment.is-locked .ship-min-date { display: none; }
    /* in compact, unlocked ships: stage toggle sits between add-btn and del */
    #tab-board .board.layout-compact .ship-stage { font-size: 9.5px; }
    #tab-board .board.layout-compact .stage-btn { padding: 3px 5px; font-size: 9.5px; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <img src="Logos/icon.svg" alt="Normal Protocol" />
    <h1>Normal Protocol</h1>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="intakes">Intakes</button>
    <button class="tab-btn" data-tab="board">Next Orders</button>
    <button class="tab-btn" data-tab="inventory">Inventory</button>
  </nav>
  <div class="header-right">
    <span class="inv-controls" id="inv-controls">
      <button class="inv-soon-btn" id="inv-soon-btn" title="Show only items running out within 30 days">⚠ Soon</button>
      <button class="refresh-inv-btn" id="inv-refresh-btn">↻ Refresh</button>
    </span>
    <span class="board-controls" id="board-controls">
      <button class="refresh-inv-btn" id="refresh-inv-btn">↻ Refresh Inventory</button>

<script>
  const COLUMNS = [
    { key: "item",              label: "Item",       cls: "item" },
    { key: "brand",             label: "Brand",      cls: "" },
    { key: "daily_qty",         label: "Qty / day",  cls: "qty" },
    { key: "from",              label: "Source",     cls: "source-cell" },
    { key: "Price",             label: "Price",      cls: "qty" },
    { key: "payment_structure", label: "Payment",    cls: "payment" },
    { key: "listing_id",        label: "Listing ID", cls: "listing-id" },
  ];

  let allRows = [];
  let suppliers = [];
  let sortCol = "item";
  let sortAsc = true;
  let activeMenu = null;

  function fmtPrice(v) {
    const n = parseFloat(v);
    return isNaN(n) ? "" : `$${n.toFixed(2)}`;
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Close any open menu ──
  function closeMenu() {
    if (!activeMenu) return;
    const { trigger, menu } = activeMenu;
    trigger.classList.remove("open");
    menu.classList.remove("open");
    activeMenu = null;
  }

  document.addEventListener("click", (e) => {
    if (activeMenu && !activeMenu.trigger.contains(e.target) && !activeMenu.menu.contains(e.target)) {
      closeMenu();
    }
  });

  // ── Build a source dropdown cell ──
  function makeSourceCell(row) {
    const current = row["from"] ?? "";

    const trigger = document.createElement("button");
    trigger.className = "source-trigger";
    trigger.innerHTML = `
      <span class="source-label">${esc(current)}</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m6 9 6 6 6-6"/>
      </svg>`;

    const menu = document.createElement("div");
    menu.className = "source-menu";

    function buildOptions(selectedValue) {
      menu.innerHTML = "";
      suppliers.forEach(name => {
        const opt = document.createElement("div");
        opt.className = "source-option" + (name === selectedValue ? " selected" : "");
        opt.innerHTML = `
          <svg class="check" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          ${esc(name)}`;
        opt.addEventListener("click", () => selectSupplier(name));
        menu.appendChild(opt);
      });
    }

    async function selectSupplier(name) {
      if (name === row["from"]) { closeMenu(); return; }
      closeMenu();

      // Optimistic update
      trigger.querySelector(".source-label").textContent = name;
      const prevVal = row["from"];
      row["from"] = name;

      try {
        const res = await fetch(`/api/intakes/${row.ID}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ from: name }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (err) {
        // Rollback on failure
        row["from"] = prevVal;
        trigger.querySelector(".source-label").textContent = prevVal;
        const errNote = document.createElement("div");
        errNote.className = "source-error";
        errNote.textContent = "Save failed — try again";
        menu.appendChild(errNote);
        console.error("Source update failed:", err);
      }
    }

    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      if (activeMenu && activeMenu.trigger === trigger) {
        closeMenu();
        return;
      }
      closeMenu();
      buildOptions(row["from"]);
      trigger.classList.add("open");
      menu.classList.add("open");
      activeMenu = { trigger, menu };
    });

    buildOptions(current);

    const wrapper = document.createElement("div");
    wrapper.style.position = "relative";
    wrapper.style.display = "inline-block";
    wrapper.appendChild(trigger);
    wrapper.appendChild(menu);
    return wrapper;
  }

  // ── Render headers ──
  function renderHeaders() {
    const tr = document.getElementById("header-row");
    tr.innerHTML = "";
    COLUMNS.forEach(col => {
      const th = document.createElement("th");
      const isSorted = sortCol === col.key;
      if (isSorted) th.classList.add("sorted");
      th.innerHTML = `${col.label}<span class="sort-icon">${isSorted ? (sortAsc ? "▲" : "▼") : "⇅"}</span>`;
      th.addEventListener("click", () => {
        if (sortCol === col.key) sortAsc = !sortAsc;
        else { sortCol = col.key; sortAsc = true; }
        render(document.getElementById("search").value);
      });
      tr.appendChild(th);
    });
  }

  // ── Render table body ──
  function render(query = "") {
    renderHeaders();
    const tbody = document.getElementById("table-body");
    const q = query.toLowerCase();
    let rows = allRows.filter(r =>
      COLUMNS.some(c => String(r[c.key] ?? "").toLowerCase().includes(q))
    );
    rows.sort((a, b) => {
      const numeric = sortCol === "daily_qty" || sortCol === "Price";
      const n = numeric
        ? (parseFloat(a[sortCol]) || 0) - (parseFloat(b[sortCol]) || 0)
        : String(a[sortCol] ?? "").toLowerCase() < String(b[sortCol] ?? "").toLowerCase() ? -1
        : String(a[sortCol] ?? "").toLowerCase() > String(b[sortCol] ?? "").toLowerCase() ? 1 : 0;
      return sortAsc ? n : -n;
    });

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${COLUMNS.length}" class="empty">No results found.</td></tr>`;
      document.getElementById("count").textContent = "";
      return;
    }

    tbody.innerHTML = "";
    rows.forEach(r => {
      const tr = document.createElement("tr");

      const cells = [
        { cls: "item",       html: esc(r.item) },
        { cls: "",           html: `<span class="badge">${esc(r.brand)}</span>` },
        { cls: "qty",        html: esc(r.daily_qty) },
        { cls: "source-cell", node: makeSourceCell(r) },
        { cls: "qty",        html: fmtPrice(r.Price) },
        { cls: "payment",    html: esc(r.payment_structure) },
        { cls: "listing-id", html: esc(r.listing_id) },
      ];

      cells.forEach(({ cls, html, node }) => {
        const td = document.createElement("td");
        if (cls) td.className = cls;
        if (node) td.appendChild(node);
        else td.innerHTML = html;
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    document.getElementById("count").textContent =
      `${rows.length} item${rows.length !== 1 ? "s" : ""}`;
  }

  // ── Init: load intakes + suppliers in parallel ──
  async function init() {
    try {
      const [intakesRes, suppliersRes] = await Promise.all([
        fetch("/api/intakes"),
        fetch("/api/suppliers"),
      ]);
      if (!intakesRes.ok) throw new Error(`Intakes: HTTP ${intakesRes.status}`);
      if (!suppliersRes.ok) throw new Error(`Suppliers: HTTP ${suppliersRes.status}`);
      allRows = await intakesRes.json();
      suppliers = await suppliersRes.json();
      render();
    } catch (e) {
      document.getElementById("table-body").innerHTML =
        `<tr><td colspan="${COLUMNS.length}" class="error">Failed to load — ${e.message}</td></tr>`;
    }
  }

  document.getElementById("search").addEventListener("input", e => render(e.target.value));

  init();

  // ── Tab switching (persisted across reloads) ──
  const TAB_KEY = "np_active_tab";
  let boardInitialized = false;
  function activateTab(tab) {
    document.querySelectorAll(".tab-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.tab === tab));
    document.querySelectorAll(".tab-panel").forEach(p =>
      p.classList.toggle("active", p.id === `tab-${tab}`));
    const bc = document.getElementById("board-controls");
    if (bc) bc.classList.toggle("show", tab === "board");
    const ic = document.getElementById("inv-controls");
    if (ic) ic.classList.toggle("show", tab === "inventory");
    if (!boardInitialized) {
      boardInitialized = true;
      if (window.SupplementBoard) {
        window.SupplementBoard.init();
      } else {
        setTimeout(() => window.SupplementBoard && window.SupplementBoard.init(), 500);
      }
    }
    if (tab === "inventory") document.dispatchEvent(new CustomEvent("inventoryActivated"));
    try { localStorage.setItem(TAB_KEY, tab); } catch (e) {}
  }
  document.querySelectorAll(".tab-btn").forEach(btn =>
    btn.addEventListener("click", () => activateTab(btn.dataset.tab)));
  // restore the last-open tab once all scripts (incl. the board) have parsed
  document.addEventListener("DOMContentLoaded", () => {
    let saved = "intakes";
    try { saved = localStorage.getItem(TAB_KEY) || "intakes"; } catch (e) {}
    if (saved !== "intakes") activateTab(saved);
  });

  // settings gear popout toggle
  (function () {
    const btn = document.getElementById('settings-btn');
    const panel = document.getElementById('settings-panel');
    if (!btn || !panel) return;
    btn.addEventListener('click', (e) => { e.stopPropagation(); panel.classList.toggle('open'); });
    document.addEventListener('click', (e) => {
      if (!panel.contains(e.target) && e.target !== btn) panel.classList.remove('open');
    });
  })();
</script>

<script>
(function () {
  const DAY = 86400000;

  function today() { return new Date(); }
  function parseDate(iso) { return new Date(iso + 'T00:00:00'); }
  function addDays(d, n) { return new Date(d.getTime() + n * DAY); }
  function daysBetween(a, b) { return (b - a) / DAY; }

  function calc(c) {
    const dose = Number(c.dose) || 1;                  // caps/day
    const bottle = Number(c.bottleSize) || 0;          // caps/bottle
    const t = today();
    const logged = parseDate(c.loggedOn);
    const elapsed = Math.max(0, daysBetween(logged, t));
    const onHand = c.amount - dose * elapsed;           // may be < 0 (overdue)

    const curDaysLeft = onHand / dose;
    const curRunOut = addDays(logged, c.amount / dose);

    const qty = Number(c.qty) || 0;                     // BOTTLES
    const added = qty * bottle;
    const newOnHand = onHand + added;
    const newDaysLeft = newOnHand / dose;
    const newRunOut = addDays(t, newDaysLeft);

    const price = Number(c.price) || 0;                 // per bottle
    const cost = price * qty;

    return {
      dose, bottle, onHand, curDaysLeft, curRunOut,
      qty, added, newOnHand, newDaysLeft, newRunOut, price, cost,
      hasOrder: qty > 0,
    };
  }

  const MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
    'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function fmtDate(d) {
    const now = today();
    const base = `${MON[d.getMonth()]} ${d.getDate()}`;
    return d.getFullYear() !== now.getFullYear()
      ? `${base}, ’${String(d.getFullYear()).slice(2)}` : base;
  }
  function fmtDateShort(d) {
    const now = today();
    const base = `${d.getMonth() + 1}/${d.getDate()}`;
    return d.getFullYear() !== now.getFullYear()
      ? `${base}/${String(d.getFullYear()).slice(2)}` : base;
  }
  function fmtMoney(n) {
    return '$' + (Number(n) || 0).toLocaleString('en-US',
      { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtMoney0(n) {
    return '$' + Math.round(Number(n) || 0).toLocaleString('en-US');
  }
  function fmtUnits(n) {
    const r = Math.round(n);
    return r < 0 ? '0' : `${r}`;
  }

  function tier(days, threshold) {
    if (days <= 0) return 'out';
    if (days < threshold) return 'soon';
    return 'ok';
  }

  const SEED = {
    cardData: {
      drainage:  { name: 'Drainage Activator', amount: 62,  dose: 6,  bottleSize: 120, loggedOn: '2026-06-04', price: 45, qty: 1, includeInMonthTotal: true },
      biotoxin1: { name: 'BioToxin',           amount: 53,  dose: 4,  bottleSize: 120, loggedOn: '2026-06-04', price: 48, qty: 1, includeInMonthTotal: true },
      atp:       { name: 'ATP',                amount: 110, dose: 11, bottleSize: 120, loggedOn: '2026-06-04', price: 63, qty: 1, includeInMonthTotal: true },
      para2:     { name: 'Para 2',             amount: 65,  dose: 8,  bottleSize: 120, loggedOn: '2026-06-04', price: 40, qty: 1, includeInMonthTotal: true },
      serratia:  { name: 'Serratia',           amount: 9,   dose: 1,  bottleSize: 180, loggedOn: '2026-06-04', price: 54, qty: 1, includeInMonthTotal: false },
      biotoxin2: { name: 'BioToxin',           amount: 66,  dose: 4,  bottleSize: 120, loggedOn: '2026-05-29', price: 48, qty: 1, includeInMonthTotal: true },
      lymph:     { name: 'LymphActiv',         amount: 40,  dose: 2,  bottleSize: 60,  loggedOn: '2026-06-04', price: 36, qty: 1, includeInMonthTotal: true },

      s_bluesky_jun: { name: 'Blue Sky Vitamin' },

          { type: 'shipment', id: 's_bluesky_jun', cards: ['atp', 'drainage', 'para2', 'serratia'] },
          { type: 'card', id: 'lymph' },

      },
      {

  window.SB = {

})();
</script>

<!-- ── Next Orders: render / nested drag-and-drop / inline edit / totals / persistence ── -->
<script>
(function () {
  const SB = window.SB;
  const KEY = 'sb_state_v7';
  const board = document.getElementById('board');
  const tabBoard = board.closest('#tab-board');

  // IntersectionObserver that toggles .is-stuck on .month-head when its sentinel scrolls off the top
  const stickyObs = new IntersectionObserver(
    (entries) => entries.forEach((e) => {
      e.target.nextElementSibling.classList.toggle('is-stuck', !e.isIntersecting);
    }),
    { root: tabBoard, threshold: 0 }
  );
  function observeSentinels() {
    board.querySelectorAll('.month-sentinel').forEach((s) => stickyObs.observe(s));
  }

  window.SBoard = window.SBoard || { threshold: 10 };
  const thr = () => window.SBoard.threshold || 10;

  const ICON = {
    grip: `<svg viewBox="0 0 8 16" width="11" height="16" fill="currentColor"><circle cx="2" cy="3" r="1.3"/><circle cx="6" cy="3" r="1.3"/><circle cx="2" cy="8" r="1.3"/><circle cx="6" cy="8" r="1.3"/><circle cx="2" cy="13" r="1.3"/><circle cx="6" cy="13" r="1.3"/></svg>`,
    truck: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M1 5h11v9H1z"/><path d="M12 8h4l3 3v3h-7z"/><circle cx="5" cy="16.5" r="1.6"/><circle cx="16" cy="16.5" r="1.6"/></svg>`,
    plus: `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>`,
  };

  let STATE; // { cardData, shipmentData }
  let structure;
  let INV_MAP = {};     // lowercased-name -> Inventory row (set by applyInventory)
  let SPENT_BY_MONTH = {}; // month name -> $ amount (set by YNAB sync)
  let PROJ_MAP = {};    // lowercased-name -> { daysLeft, runOut } after all board orders

  // ── data layer: load the board from /api/orders (Turso) ──
  async function load() {
    try {
      const res = await fetch('/api/orders');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      fromApi(await res.json());
    } catch (e) {
      if (e instanceof TypeError) {
        // Network error: server not running. Don't corrupt the visible state
        // with the seed — just show a clear message and leave the board empty.
        STATE = { cardData: {}, shipmentData: {} };
        structure = [];
        const bar = document.getElementById('board');
        if (bar) bar.innerHTML = `<div style="padding:40px 24px;font-family:var(--font-ui);color:var(--ink-3);font-size:13px;">⚠ Could not reach the board API — is the dev server running?<br><code style="font-size:11px;margin-top:8px;display:block;">npm run dev:local</code></div>`;
      } else {
        // HTTP error from the server itself — show what went wrong.
        STATE = { cardData: {}, shipmentData: {} };
        structure = [];
        console.error('Board: /api/orders load failed —', e.message);
        const bar = document.getElementById('board');
        if (bar) bar.innerHTML = `<div style="padding:40px 24px;font-family:var(--font-ui);color:var(--ink-3);font-size:13px;">⚠ Board load error: ${e.message}</div>`;
      }
    }
  }

  // map { months, orders, items } -> board STATE + structure.
  // Inventory-sourced fields (dose/amount/bottleSize/loggedOn) are absent for
  // now; the board renders run-out as "—" until the Inventory sheet is wired.
  function fromApi(data) {
    const months = (data.months || []).slice().sort((a, b) => a.position - b.position);
    const orders = data.orders || [];
    const items = data.items || [];
    const cardData = {}, shipmentData = {};
    items.forEach((it) => {
      cardData[it.order_item_id] = {
        name: it.supplement,
        price: it.price_per_bottle || 0,
        qty: it.order_qty_bottles || 0,
        includeInMonthTotal: !!it.include_in_total,
        untracked: !!it.untracked,
        notes: it.notes || '',
      };
    });
    orders.forEach((o) => {
      const stage = o.status && o.status !== 'Staged' ? o.status.toLowerCase() : undefined;
      shipmentData[o.order_id] = { name: o.merchant || 'Order', notes: o.notes || '', ...(stage ? { stage } : {}) };
    });

    structure = months.map((m) => {
      const blocks = [];
      orders.filter((o) => o.month === m.month).forEach((o) => {
        const cards = items
          .filter((it) => it.order_id === o.order_id)
          .sort((a, b) => a.item_position - b.item_position)
          .map((it) => it.order_item_id);
        blocks.push({ _pos: o.position, type: 'shipment', id: o.order_id, cards });
      });
      items.filter((it) => it.month === m.month && (it.order_id == null || it.order_id === ''))
        .forEach((it) => blocks.push({ _pos: it.block_position, type: 'card', id: it.order_item_id }));
      blocks.sort((a, b) => (a._pos || 0) - (b._pos || 0));
      blocks.forEach((b) => delete b._pos);
      return { id: m.month, name: m.month, sub: String(m.year || ''), blocks };
    });
    STATE = { cardData, shipmentData };
    padMonths(6);
  }

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function padMonths(count) {
    const now = SB.today();
    // key by "MonthName_Year" so year-boundary months (Jan 2027 ≠ Jan 2026) never collide
    const existing = new Set(structure.map(m => m.name + '_' + (parseInt(m.sub) || 0)));
    for (let i = 0; i < count; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
      const name = MONTH_NAMES[d.getMonth()];
      const year = d.getFullYear();
      const key = name + '_' + year;
      if (!existing.has(key)) {
        structure.push({ id: key, name, sub: String(year), blocks: [] });
        existing.add(key);
      }
    }
    structure.sort((a, b) => {
      const ya = parseInt(a.sub) || 0, yb = parseInt(b.sub) || 0;
      if (ya !== yb) return ya - yb;
      return MONTH_NAMES.indexOf(a.name) - MONTH_NAMES.indexOf(b.name);
    });
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function applyShipmentStage(shipEl, stage) {
    const locked = stage != null;
    shipEl.classList.toggle('is-locked', locked);
    shipEl.querySelectorAll('.stage-btn').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.stage === stage);
    });
    shipEl.querySelectorAll('.ship-body input[data-field="price"], .ship-body input[data-field="qty"]').forEach((inp) => {
      inp.disabled = locked;
    });
    shipEl.querySelectorAll('.ship-body .incl-toggle').forEach((btn) => {
      btn.disabled = locked;
    });
  }

  function isoToday() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  function uid(p) { return p + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
  function el(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  // ── builders ──
  function cardHTML(id) {
    const c = STATE.cardData[id];
    const untracked = !!c.untracked;
    return `
    <div class="card${untracked ? ' card--untracked' : ''}" data-id="${id}" data-kind="card">
      <div class="card-body">
        <div class="card-top">
          <span class="card-grip block-grip" aria-hidden="true"></span>
          <div class="card-name" ${untracked ? 'contenteditable="true" spellcheck="false"' : ''} data-field="name">${esc(c.name)}</div>
          <span class="badge loose-tag">Loose</span>
          <span class="badge status">OK</span>
        </div>
        <div class="proj">
          <div class="pk">Supply</div>
          <div class="pv">
            <span class="cur">
              <span class="dl"><span class="n">0</span><span class="u">d</span></span>
              <span class="sep">,</span>
              <span class="ro">—</span>
            </span>
            <span class="arrow">→</span>
            <span class="nxt">
              <span class="dl"><span class="n">0</span><span class="u">d</span></span>
              <span class="sep">,</span>
              <span class="ro">—</span>
            </span>
          </div>
        </div>
        <div class="order">
          <div class="field">
            <label>Price <span class="lbl-sub">/ bottle</span></label>
            <div class="input-wrap"><span class="pfx">$</span><input type="number" step="0.01" min="0" inputmode="decimal" data-field="price" value="${c.price}"></div>
          </div>
          <div class="field">
            <label>Order <span class="lbl-sub">bottles</span></label>
            <div class="input-wrap"><input type="number" step="1" min="0" inputmode="numeric" data-field="qty" value="${c.qty}"><span class="sfx">btl</span></div>
          </div>
        </div>
        <div class="card-foot">
          <span class="meta">on hand <b class="onhand">0</b> · <b class="dose">0</b>/day · <b class="bsize">0</b>/btl</span>
          <span class="ototal"><small>Order</small><span class="amt">$0.00</span></span>
        </div>
        <div class="card-end">
          <button class="incl-toggle" data-act="toggle-include" title="Count this item in the month’s Planned total" aria-label="Count in Planned total"><span class="sw"><i></i></span></button>
          <span class="card-notes" contenteditable="true" spellcheck="false" placeholder="notes...">${esc(c.notes || '')}</span>
          <button class="del" data-act="del-card" title="Remove item" aria-label="Remove item">×</button>
        </div>
      </div>
    </div>`;
  }

  function shipmentHTML(block) {
    const s = STATE.shipmentData[block.id] || { name: 'Shipment' };
    const stage = s.stage || null;
    const locked = stage != null;
    const cards = block.cards.map(cardHTML).join('');
    const stageBtns = ['ordered', 'entered', 'received']
      .map((st) => `<button class="stage-btn${stage === st ? ' active' : ''}" data-act="set-stage" data-stage="${st}">${st[0].toUpperCase() + st.slice(1)}</button>`)
      .join('');
    return `
    <div class="shipment${locked ? ' is-locked' : ''}" data-id="${block.id}" data-kind="shipment">
      <div class="ship-head">
        <span class="truck block-grip" title="Drag shipment">${ICON.truck}</span>
        <div class="ship-id">
          <span class="ship-name" contenteditable="true" spellcheck="false" data-field="name">${esc(s.name)}</span>
          <span class="scount">0</span>
        </div>
        <button class="add-btn ship-add" data-act="add-card-ship">${ICON.plus} Item</button>
        <span class="ship-min-date"></span>
        <div class="ship-total"><span class="amt">$0.00</span></div>
        <div class="ship-stage">${stageBtns}</div>
        <span class="ship-notes" contenteditable="true" spellcheck="false" data-field="notes" placeholder="notes...">${esc(s.notes || '')}</span>
        <button class="del" data-act="del-ship" title="Remove shipment">×</button>
      </div>
      <div class="ship-body" data-list="shipment">${cards}</div>
    </div>`;
  }

  function blockHTML(block) {
    return block.type === 'shipment' ? shipmentHTML(block) : cardHTML(block.id);
  }

  function monthHTML(m) {
    return `
    <div class="month" data-id="${m.id}">
      <div class="month-sentinel"></div>
      <div class="month-head">
        <div class="month-title">
          <span class="mname">${esc(m.name)}</span>
          <span class="msub">${esc(m.sub || '')}</span>
          <span class="mcount">0</span>
        </div>
        <button class="add-btn month-add" data-act="add-ship">${ICON.plus} Order</button>
        <button class="add-btn month-add" data-act="add-card-month">${ICON.plus} Item</button>
        <div class="month-metrics">
          <div class="metric spent">
            <span class="mk">Spent</span>
            <span class="mv spentv">$0.00</span>
          </div>
          <div class="metric">
            <span class="mk">Shipments</span>
            <span class="mv shipv">$0.00</span>
          </div>
          <div class="metric is-total">
            <span class="mk">Planned</span>
            <span class="mv plannedv">$0.00</span>
          </div>
          <div class="metric is-max">
            <span class="mk">Max</span>
            <span class="mv maxv">$0.00</span>
          </div>
        </div>
      </div>
      <div class="month-list" data-list="month">${m.blocks.map(blockHTML).join('')}</div>
    </div>`;
  }

  const STAGE_PRI = { ordered: 0, entered: 1, received: 2 };

  function render() {
    board.innerHTML = structure.map(monthHTML).join('');
    board.querySelectorAll('.month-list').forEach(makeMonthSortable);
    board.querySelectorAll('.ship-body').forEach(makeShipSortable);
    board.querySelectorAll('.shipment').forEach((shipEl) => {
      const sd = STATE.shipmentData[shipEl.dataset.id];
      if (sd && sd.stage) applyShipmentStage(shipEl, sd.stage);
    });
    // Sort locked shipments into stage order: Ordered → Entered → Received
    board.querySelectorAll('.month-list').forEach((list) => {
      [...list.querySelectorAll(':scope > .shipment.is-locked')]
        .sort((a, b) => {
          const sa = (STATE.shipmentData[a.dataset.id] || {}).stage || '';
          const sb = (STATE.shipmentData[b.dataset.id] || {}).stage || '';
          return (STAGE_PRI[sa] ?? 0) - (STAGE_PRI[sb] ?? 0);
        })
        .forEach((el) => list.appendChild(el));
    });
    recalcAll();
    observeSentinels();
  }

  // ── per-card update ──
  function setDays(span, val) {
    const n = span.querySelector('.n'), u = span.querySelector('.u');
    n.textContent = Math.max(0, Math.round(val));
    if (u) u.textContent = 'd';
  }

  function updateCard(cardEl) {
    const id = cardEl.dataset.id;
    const c = STATE.cardData[id];
    if (!c) return 0;
    const r = calcForCard(c);
    // run-out needs Inventory (dose/amount/loggedOn); absent until the sheet is wired
    const hasInv = !c.untracked && !!c.dose && !!c.loggedOn;
    const tier = hasInv ? SB.tier(r.curDaysLeft, thr()) : 'ok';
    const compact = board.classList.contains('layout-compact');
    const df = compact ? SB.fmtDateShort : SB.fmtDate;

    cardEl.classList.toggle('tier-reorder', hasInv && tier === 'ok' && r.curDaysLeft > 0 && r.curDaysLeft <= 45);
    cardEl.classList.toggle('tier-soon', tier === 'soon');
    cardEl.classList.toggle('tier-out', tier === 'out');
    cardEl.classList.toggle('has-order', hasInv && r.hasOrder);
    cardEl.classList.toggle('counted', !!c.includeInMonthTotal);

    cardEl.querySelector('.status').textContent =
      !hasInv ? '—' : tier === 'out' ? 'OUT' : tier === 'soon' ? 'SOON' : 'OK';

    const proj = cardEl.querySelector('.proj');
    const curDl = proj.querySelector('.cur .dl');
    const nxtDl = proj.querySelector('.nxt .dl');
    const curRo = proj.querySelector('.cur .ro');
    const nxtRo = proj.querySelector('.nxt .ro');
    const dash = (span) => {
      const n = span.querySelector('.n'), u = span.querySelector('.u');
      if (n) { n.textContent = '—'; if (u) u.textContent = ''; } else { span.textContent = '—'; }
    };
    if (hasInv) {
      setDays(curDl, r.curDaysLeft);
      setDays(nxtDl, r.newDaysLeft);
      curRo.textContent = df(r.curRunOut);
      nxtRo.textContent = df(r.newRunOut);
      cardEl.querySelector('.onhand').textContent = SB.fmtUnits(r.onHand);
      cardEl.querySelector('.dose').textContent = String(+r.dose.toFixed(1));
      cardEl.querySelector('.bsize').textContent = String(r.bottle);
    } else {
      [curDl, nxtDl].forEach(dash);
      curRo.textContent = '—';
      nxtRo.textContent = '—';
      cardEl.querySelector('.onhand').textContent = '—';
      cardEl.querySelector('.dose').textContent = '—';
      cardEl.querySelector('.bsize').textContent = '—';
    }
    cardEl.querySelector('.ototal .amt').textContent = SB.fmtMoney(r.cost);

    return r.cost;
  }

  // ── totals ──
  function monthSpent(monthEl) {
    const name = monthEl.querySelector('.mname')?.textContent.trim();
    let base = SPENT_BY_MONTH[name] || 0;
    // Add ordered shipment totals (Entered/Received are excluded — user has entered in YNAB)
    monthEl.querySelectorAll('.month-list > .shipment').forEach((shipEl) => {
      const sd = STATE.shipmentData[shipEl.dataset.id] || {};
      if (sd.stage === 'ordered') {
        shipEl.querySelectorAll(':scope .ship-body > .card').forEach((cardEl) => {
          const c = STATE.cardData[cardEl.dataset.id];
          if (c) base += (Number(c.price) || 0) * (Number(c.qty) || 0);
        });
      }
    });
    return base;
  }

  // ── carry-forward: each subsequent listing of the same supplement starts
  //    from the projected on-hand after the previous order, across months. ──
  function calcForCard(c) {
    if (c._effectiveDays !== undefined && !c.untracked && c.dose && c.loggedOn) {
      return SB.calc(Object.assign({}, c, {
        amount: c._effectiveDays * Number(c.dose),
        loggedOn: isoToday(),
      }));
    }
    // Locked shipment cards: show run-out as of before the order was placed
    if (c._preOrderAmount !== undefined && c.dose && c.loggedOn) {
      return SB.calc(Object.assign({}, c, { amount: c._preOrderAmount }));
    }
    return SB.calc(c);
  }

  function applyEffectiveMap() {
    const seen = new Map(); // supplement name (lowercase) → { daysLeft, runOut } after last order
    board.querySelectorAll('.card[data-id]').forEach((cardEl) => {
      const c = STATE.cardData[cardEl.dataset.id];
      if (!c) return;
      const hasInv = !c.untracked && !!c.dose && !!c.loggedOn;
      if (!hasInv) { delete c._effectiveDays; return; }
      const key = c.name.trim().toLowerCase();
      const inLocked = !!cardEl.closest('.shipment.is-locked');
      if (inLocked) {
        // Show pre-order run-out — don't absorb carry-forward; use _preOrderAmount in calcForCard.
        // Still advance 'seen' so future unlocked orders project from the correct post-order baseline.
        delete c._effectiveDays;
        if (c.includeInMonthTotal) {
          // c.amount = full invMap amount (includes this order) → curDaysLeft is the post-order baseline
          const r = SB.calc(c);
          seen.set(key, { daysLeft: r.curDaysLeft, runOut: r.curRunOut });
        }
      } else {
        delete c._preOrderAmount; // clear stale value if shipment was unlocked
        if (seen.has(key)) c._effectiveDays = seen.get(key).daysLeft;
        else delete c._effectiveDays;
        if (c.includeInMonthTotal) {
          const r = calcForCard(c);
          seen.set(key, { daysLeft: r.newDaysLeft, runOut: r.newRunOut });
        }
      }
    });
    // expose final projected state for the item picker
    PROJ_MAP = {};
    seen.forEach((proj, key) => { PROJ_MAP[key] = proj; });
  }

  function recalcAll() {
    applyEffectiveMap();
    board.querySelectorAll('.month').forEach((monthEl) => {
      const list = monthEl.querySelector('.month-list');
      let shipSum = 0, plannedItems = 0, maxItems = 0, itemCount = 0;

      [...list.children].forEach((node) => {
        if (node.classList.contains('shipment')) {
          const shipLocked = !!(STATE.shipmentData[node.dataset.id] || {}).stage;
          let sTot = 0, sCount = 0, minRunOut = null;
          node.querySelectorAll(':scope .ship-body > .card').forEach((cardEl) => {
            const cost = updateCard(cardEl);
            const c = STATE.cardData[cardEl.dataset.id];
            const inc = c && c.includeInMonthTotal;
            if (!shipLocked) {
              maxItems += cost;
              if (inc) { sTot += cost; plannedItems += cost; sCount++; }
            } else {
              if (inc) { sTot += cost; sCount++; }
            }
            // track min new run-out across all ordered cards (needs Inventory data)
            if (!shipLocked && c && c.dose && c.loggedOn) {
              const r = calcForCard(c);
              if (r.hasOrder && isFinite(r.newRunOut)) {
                if (!minRunOut || r.newRunOut < minRunOut) minRunOut = r.newRunOut;
              }
            }
          });
          node.querySelector('.ship-total .amt').textContent = SB.fmtMoney(sTot);
          node.querySelector('.scount').textContent = sCount;
          const md = node.querySelector('.ship-min-date');
          if (md) md.textContent = minRunOut ? SB.fmtDateShort(minRunOut) : '';
          if ((STATE.shipmentData[node.dataset.id] || {}).stage !== 'received') shipSum += sTot;
          itemCount += sCount;
        } else if (node.classList.contains('card')) {
          const cost = updateCard(node);
          maxItems += cost;
          if (STATE.cardData[node.dataset.id] && STATE.cardData[node.dataset.id].includeInMonthTotal) plannedItems += cost;
          itemCount++;
        }
      });

      const spent = monthSpent(monthEl);
      const spentEl = monthEl.querySelector('.spentv');
      if (spentEl) spentEl.textContent = SB.fmtMoney(spent);
      monthEl.querySelector('.shipv').textContent = SB.fmtMoney(shipSum);
      monthEl.querySelector('.plannedv').textContent = SB.fmtMoney(spent + plannedItems);
      monthEl.querySelector('.maxv').textContent = SB.fmtMoney(spent + maxItems);
      monthEl.querySelector('.mcount').textContent = `${itemCount}`;
    });
    updateMonthVisibility();
  }
  window.SBoard.recalc = recalcAll;

  function updateMonthVisibility() {
    const now = SB.today();
    const curYear = now.getFullYear();
    const curMonth = now.getMonth(); // 0-indexed
    board.querySelectorAll('.month').forEach((monthEl) => {
      const name = monthEl.querySelector('.mname')?.textContent.trim() || '';
      const year = parseInt(monthEl.querySelector('.msub')?.textContent.trim(), 10) || 0;
      const mIdx = MONTH_NAMES.indexOf(name);
      const isPast = year < curYear || (year === curYear && mIdx < curMonth);
      const isEmpty = monthEl.querySelector('.month-list').children.length === 0;
      monthEl.style.display = isPast && isEmpty ? 'none' : '';
    });
  }

  // ── persistence: serialize the DOM to the /api/orders shape and PUT it ──
  function pushItem(items, id, orderId, month, blockPos, itemPos) {
    const c = STATE.cardData[id] || {};
    items.push({
      order_item_id: id,
      order_id: orderId,
      month,
      block_position: blockPos,
      item_position: itemPos,
      supplement: c.name || '',
      price_per_bottle: Number(c.price) || 0,
      order_qty_bottles: Number(c.qty) || 0,
      include_in_total: c.includeInMonthTotal ? 1 : 0,
      untracked: c.untracked ? 1 : 0,
      notes: c.notes || '',
    });
  }
  function toApi() {
    const months = [], orders = [], items = [];
    [...board.querySelectorAll('.month')].forEach((m, mi) => {
      const month = m.querySelector('.mname').textContent.trim();
      months.push({
        month,
        year: parseInt(m.querySelector('.msub').textContent.trim(), 10) || null,
        position: mi + 1,
      });
      const blocks = [...m.querySelector('.month-list').children]
        .filter((n) => n.classList.contains('shipment') || n.classList.contains('card'));
      blocks.forEach((n, bi) => {
        const blockPos = bi + 1;
        if (n.classList.contains('shipment')) {
          const oid = n.dataset.id;
          const s = STATE.shipmentData[oid] || {};
          const stageStatus = s.stage ? (s.stage[0].toUpperCase() + s.stage.slice(1)) : 'Staged';
          orders.push({ order_id: oid, month, merchant: s.name || '', position: blockPos, status: stageStatus, notes: s.notes || '' });
          [...n.querySelectorAll(':scope .ship-body > .card')].forEach((cardEl, ci) => {
            pushItem(items, cardEl.dataset.id, oid, month, blockPos, ci + 1);
          });
        } else {
          pushItem(items, n.dataset.id, null, month, blockPos, 1);
        }
      });
    });
    return { months, orders, items };
  }

  let saveTimer = null;
  async function persist() {
    // Never wipe Turso data if the board failed to load (structure would be empty).
    if (!structure || structure.length === 0) return;
    try {
