<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normal Protocol — Intakes</title>
  <link rel="icon" type="image/svg+xml" href="Logos/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #F6F4EE;
      --teal:   #79BDB1;
      --ink:    #171A1C;
      --ink-60: rgba(23,26,28,0.6);
      --ink-12: rgba(23,26,28,0.12);
      --radius: 10px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    :root { --cream-dark: #ECE7DA; }

    header {
      display: flex;
      align-items: stretch;
      gap: 16px;
      padding: 0 24px;
      min-height: 46px;
      background: var(--cream-dark);
      border-bottom: 1.5px solid var(--ink-12);
    }

    .brand { display: flex; align-items: center; gap: 10px; flex: 1 1 0; min-width: 0; }
    .brand img { width: 26px; height: 26px; }
    .brand h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    main { padding: 28px 32px; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
    }

    .search-wrap { position: relative; }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-60);
      pointer-events: none;
    }

    #search {
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: var(--radius);
      padding: 7px 12px 7px 32px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      width: 220px;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--teal); }
    #search::placeholder { color: var(--ink-60); }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1.5px solid var(--ink-12);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--cream);
      padding: 11px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-60);
      border-bottom: 1.5px solid var(--ink-12);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    thead th:hover { color: var(--ink); }
    thead th.sorted { color: var(--teal); }

    thead th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.5;
    }

    thead th.sorted .sort-icon { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--ink-12);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--cream); }

    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    td.item { font-weight: 500; }

    td.qty {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      display: inline-block;
      background: rgba(121,189,177,0.15);
      color: var(--teal);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .listing-id {
      font-size: 12px;
      color: var(--ink-60);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .payment {
      font-size: 12px;
      color: var(--ink-60);
      max-width: 260px;
    }

    .empty, .loading, .error {
      text-align: center;
      padding: 48px 16px;
      color: var(--ink-60);
    }

    .error { color: #c0392b; }

    #count {
      font-size: 12px;
      color: var(--ink-60);
      margin-top: 12px;
    }

    /* ── Source dropdown ── */
    .source-cell { position: relative; }

    .source-trigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px 3px 10px;
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink);
      background: transparent;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
      max-width: 180px;
    }

    .source-trigger:hover {
      border-color: var(--ink-12);
      background: white;
    }

    .source-trigger.open {
      border-color: var(--teal);
      background: white;
    }

    .source-trigger svg {
      flex-shrink: 0;
      color: var(--ink-60);
      transition: transform 0.15s;
    }

    .source-trigger.open svg { transform: rotate(180deg); }

    .source-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 100;
      background: white;
      border: 1.5px solid var(--ink-12);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(23,26,28,0.10);
      min-width: 160px;
      padding: 4px 0;
      overflow: hidden;
    }

    .source-menu.open { display: block; }

    .source-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
      transition: background 0.1s;
    }

    .source-option:hover { background: var(--cream); }

    .source-option.selected { font-weight: 600; }

    .source-option .check {
      width: 14px;
      flex-shrink: 0;
      color: var(--teal);
      visibility: hidden;
    }

    .source-option.selected .check { visibility: visible; }

    .source-saving {
      font-size: 11px;
      color: var(--ink-60);
      padding: 4px 10px 4px 34px;
      font-style: italic;
    }

    .source-error {
      font-size: 11px;
      color: #c0392b;
      padding: 4px 10px 4px 34px;
    }

    /* ── Tab navigation (centered in the top bar) ── */
    .tabs { display: flex; align-items: stretch; gap: 2px; }

    .tab-btn {
      appearance: none;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-60);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover { color: var(--ink); }

    .tab-btn.active {
      color: #3f8f87;
      border-bottom-color: #3f8f87;
    }

    /* right side of the top bar (kept empty as a flex spacer so tabs stay centered) */
    .header-right { flex: 1 1 0; display: flex; align-items: center; justify-content: flex-end; gap: 12px; min-width: 0; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>

  <!-- ── Supplement Board styles (compact layout, scoped to #tab-board) ── -->
  <style>
    #tab-board {
      --accent: #70c4bb;
      --accent-deep: #3f8f87;
      --accent-tint: #eaf6f4;
      --b-ink: #1c2426;
      --ink-2: #51606a;
      --ink-3: #8a979e;
      --line: #e4e9ea;
      --line-soft: #eef2f2;
      --b-bg: #eef1f2;
      --paper: #ffffff;
      --soon: #e08a3c;
      --soon-tint: #fdf3e8;
      --out: #d6504a;
      --out-tint: #fbecea;
      --shadow-card: 0 1px 2px rgba(28, 36, 38, .06), 0 1px 1px rgba(28, 36, 38, .04);
      --shadow-pop: 0 10px 28px rgba(28, 36, 38, .16);
      --font-ui: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
      --font-num: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;
      background: var(--cream);
      color: var(--b-ink);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      /* own scroll pane filling the viewport below the header, so the horizontal
         scrollbar is pinned to the bottom of the screen rather than mid-page */
      height: calc(100vh - 48px);
      overflow: auto;
    }

    @keyframes sb-pulse {
      0% { box-shadow: 0 0 0 0 rgba(112, 196, 187, .5); }
      70% { box-shadow: 0 0 0 7px rgba(112, 196, 187, 0); }
      100% { box-shadow: 0 0 0 0 rgba(112, 196, 187, 0); }
    }

    /* ── board scroller ── */
    #tab-board .board {
      display: flex; gap: 18px; align-items: flex-start;
      padding: 22px 24px 24px;
      min-height: 100%;
    }

    /* ── month column ── */
    #tab-board .month {
      flex: 0 0 590px; width: 590px;
      display: flex; flex-direction: column;
      background: #fff; border: 1px solid #dde3e4; border-radius: 14px;
    }
    #tab-board .month-head { padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
    #tab-board .month-title { display: flex; align-items: baseline; gap: 7px; flex: none; }
    #tab-board .month-title .mname { font-size: 16px; font-weight: 600; letter-spacing: -.01em; outline: none; }
    #tab-board .month-title .msub { font-family: var(--font-num); font-size: 11px; color: var(--ink-3); }
    #tab-board .month-title .mcount {
      font-family: var(--font-num); font-size: 10px;
      color: var(--ink-3); background: #dbe2e3; padding: 1px 7px; border-radius: 20px;
    }
    #tab-board .month-metrics { margin-left: auto; display: flex; align-items: center; }
    #tab-board .metric {
      display: flex; flex-direction: column; align-items: flex-end;
      padding: 0 9px; border-left: 1px solid #d7dedf; line-height: 1.15;
    }
    #tab-board .metric:first-child { border-left: 0; }
    #tab-board .metric:last-child { padding-right: 0; }
    #tab-board .metric .mk {
      font-size: 8.5px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--ink-3); white-space: nowrap;
    }
    #tab-board .metric .mv {
      font-family: var(--font-num); font-size: 14.5px; font-weight: 500;
      margin-top: 2px; letter-spacing: -.01em;
    }
    #tab-board .metric.is-total .mv { color: var(--accent-deep); font-weight: 600; }
    #tab-board .metric.is-max .mv { color: var(--ink-2); }
    #tab-board .mv-money { display: inline-flex; align-items: baseline; }
    #tab-board .mv-money .pfx { font-family: var(--font-num); font-size: 11px; color: var(--ink-3); margin-right: 1px; }
    #tab-board .spent-input {
      width: 56px; border: 0; background: transparent; padding: 0;
      font-family: var(--font-num); font-size: 14.5px; font-weight: 500;
      text-align: right; color: var(--b-ink); outline: none; -moz-appearance: textfield;
      border-bottom: 1px dashed transparent; min-width: 1.5ch;
    }
    #tab-board .spent-input:hover { border-bottom-color: #c2ccce; }
    #tab-board .spent-input:focus { border-bottom-color: var(--accent); }
    #tab-board .spent-input::-webkit-inner-spin-button,
    #tab-board .spent-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    #tab-board .field label .lbl-sub { color: var(--ink-3); font-weight: 500; }

    #tab-board .month-list {
      min-height: 40px; padding: 4px 11px 11px;
      display: flex; flex-direction: column; gap: 9px;
    }
    #tab-board .month-list > * { flex: 0 0 auto; }

    /* add buttons that live inline in the month / shipment header rows */
    #tab-board .month-head .add-btn, #tab-board .ship-head .add-btn {
      flex: 0 0 auto; height: 26px; padding: 0 14px; gap: 5px;
      border: 1px solid #c4cdd0; border-radius: 8px; background: rgba(255, 255, 255, .7);
      font-size: 11.5px; color: var(--ink-2);
    }
    #tab-board .month-head .add-btn:hover, #tab-board .ship-head .add-btn:hover {
      border-color: var(--accent); color: var(--accent-deep); background: #fff;
    }

    /* ── shipment block ── */
    #tab-board .shipment {
      background: var(--accent-tint); border: 1px solid #cfe6e2; border-radius: 11px;
      box-shadow: var(--shadow-card); overflow: hidden;
    }
    #tab-board .ship-head {
      display: flex; align-items: center; gap: 8px; padding: 8px 9px;
      background: transparent;
    }
    #tab-board .ship-head .truck {
      width: 22px; height: 22px; border-radius: 6px; flex: none;
      background: #fff; border: 1px solid #cfe6e2; color: var(--accent-deep);
      display: grid; place-items: center;
    }
    #tab-board .ship-head .truck svg { width: 13px; height: 13px; }
    #tab-board .ship-id { min-width: 0; flex: 1; display: flex; align-items: baseline; gap: 7px; }
    #tab-board .ship-name {
      font-size: 13px; font-weight: 600; letter-spacing: -.01em; outline: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
    }
    #tab-board .ship-name:focus { text-overflow: clip; overflow: visible; }
    #tab-board .ship-id .scount {
      flex: none; font-family: var(--font-num); font-size: 10px; color: var(--ink-3);
      background: #d6e6e2; padding: 1px 7px; border-radius: 20px;
    }
    #tab-board .ship-total {
      font-family: var(--font-num); font-size: 14px; font-weight: 600;
      color: var(--accent-deep); text-align: right; padding-left: 4px;
    }
    #tab-board .ship-body { padding: 9px; display: flex; flex-direction: column; gap: 9px; min-height: 30px; }
    #tab-board .ship-body > * { flex: 0 0 auto; }
    #tab-board .ship-body:empty::after {
      content: 'Drop a card here'; display: block; text-align: center; padding: 10px 0;
      font-size: 11px; color: var(--ink-3); font-family: var(--font-num);
      border: 1px dashed #bcd8d2; border-radius: 8px;
    }

    /* ── card ── */
    #tab-board .card {
      position: relative; background: var(--paper); border: 1px solid var(--line);
      border-radius: 10px; box-shadow: var(--shadow-card); padding: 10px 11px 11px;
    }
    #tab-board .month-list > .card { border-style: dashed; border-color: #cdd6d8; }
    #tab-board .card.tier-soon { border-left: 3px solid var(--soon); }
    #tab-board .card.tier-out { border-left: 3px solid var(--out); }
    #tab-board .card-top { display: flex; align-items: flex-start; gap: 7px; }
    #tab-board .grip {
      flex: none; width: 16px; align-self: stretch; cursor: grab;
      color: #c4cdd0; margin: -2px 0 -2px -3px;
      display: flex; align-items: flex-start; padding-top: 2px;
      opacity: 0; transition: opacity .12s;
    }
    #tab-board .grip svg { width: 11px; height: 16px; }
    #tab-board .card:hover .grip, #tab-board .shipment:hover > .ship-head .grip { opacity: 1; }
    #tab-board .grip:active { cursor: grabbing; }
    #tab-board .card-name {
      flex: 1; min-width: 0; font-size: 13.5px; font-weight: 600;
      letter-spacing: -.01em; line-height: 1.25; outline: none;
    }
    #tab-board .card-name:empty::before { content: 'Name'; color: var(--ink-3); }
    #tab-board .badge {
      flex: none; font-family: var(--font-num); font-size: 9.5px; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase; padding: 3px 6px;
      border-radius: 20px; line-height: 1; color: var(--ink-3); background: var(--line-soft);
    }
    #tab-board .tier-soon .badge { color: var(--soon); background: var(--soon-tint); }
    #tab-board .tier-out .badge { color: var(--out); background: var(--out-tint); }
    #tab-board .proj { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    #tab-board .proj .cell { min-width: 0; }
    #tab-board .proj .pk {
      font-size: 9px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--ink-3); text-align: center;
    }
    #tab-board .proj .pv { display: flex; align-items: baseline; gap: 5px; margin-top: 2px; justify-content: center; }
    #tab-board .proj .now {
      font-family: var(--font-num); font-weight: 500; color: var(--b-ink);
      font-size: 19px; line-height: 1; letter-spacing: -.02em;
    }
    #tab-board .proj .now .u { font-size: 11px; color: var(--ink-3); margin-left: 1px; }
    #tab-board .proj .runout .now { font-size: 15px; }
    #tab-board .tier-soon .proj .daysleft .now { color: var(--soon); }
    #tab-board .tier-out .proj .daysleft .now { color: var(--out); }
    #tab-board .proj .arrow { color: var(--ink-3); font-size: 12px; opacity: 0; width: 0; transition: opacity .15s; }
    #tab-board .proj .next { font-family: var(--font-num); font-weight: 500; color: var(--accent-deep); opacity: 0; width: 0; overflow: hidden; }
    #tab-board .proj .daysleft .next { font-size: 19px; line-height: 1; letter-spacing: -.02em; }
    #tab-board .proj .daysleft .next .u { font-size: 11px; color: var(--accent); }
    #tab-board .proj .runout .next { font-size: 15px; }
    #tab-board .card.has-order .proj .now {
      color: var(--ink-3); font-size: 13px; text-decoration: line-through; text-decoration-color: #c9d2d4;
    }
    #tab-board .card.has-order .proj .runout .now { font-size: 11px; }
    #tab-board .card.has-order .proj .arrow { opacity: 1; width: auto; }
    #tab-board .card.has-order .proj .next { opacity: 1; width: auto; overflow: visible; }
    #tab-board .order {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--line);
    }
    #tab-board .field { display: flex; flex-direction: column; gap: 3px; }
    #tab-board .field label {
      font-size: 9px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--ink-3);
    }
    #tab-board .input-wrap {
      display: flex; align-items: center; gap: 2px;
      background: #f7f9f9; border: 1px solid var(--line); border-radius: 7px;
      padding: 0 8px; height: 30px; transition: border-color .12s, background .12s;
    }
    #tab-board .input-wrap:focus-within { border-color: var(--accent); background: #fff; }
    #tab-board .input-wrap .pfx, #tab-board .input-wrap .sfx {
      font-family: var(--font-num); font-size: 11px; color: var(--ink-3); flex: none;
    }
    #tab-board .input-wrap input {
      width: 100%; min-width: 0; border: 0; background: transparent; outline: none;
      font-family: var(--font-num); font-size: 13px; color: var(--b-ink);
      -moz-appearance: textfield; text-align: right;
    }
    #tab-board .input-wrap input::-webkit-inner-spin-button,
    #tab-board .input-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    #tab-board .card-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    #tab-board .meta { font-family: var(--font-num); font-size: 10.5px; color: var(--ink-3); }
    #tab-board .meta b { color: var(--ink-2); font-weight: 500; }
    #tab-board .card-foot .ototal { margin-left: auto; font-family: var(--font-num); font-size: 14px; font-weight: 500; }
    #tab-board .card-foot .ototal small {
      font-size: 9px; color: var(--ink-3); letter-spacing: .05em;
      font-weight: 600; text-transform: uppercase; margin-right: 5px;
    }
    #tab-board .incl-toggle {
      flex: none; border: 0; background: transparent; padding: 0; cursor: pointer;
      display: inline-flex; align-items: center; margin-left: 2px;
    }
    #tab-board .incl-toggle .sw {
      width: 30px; height: 17px; border-radius: 20px; background: #d2d9da;
      position: relative; transition: background .15s;
    }
    #tab-board .incl-toggle .sw i {
      position: absolute; top: 2px; left: 2px; width: 13px; height: 13px;
      border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2);
      transition: transform .15s;
    }
    #tab-board .incl-toggle:hover .sw { background: #c3ccce; }
    #tab-board .card.counted .incl-toggle .sw { background: var(--accent); }
    #tab-board .card.counted .incl-toggle:hover .sw { background: var(--accent-deep); }
    #tab-board .card.counted .incl-toggle .sw i { transform: translateX(13px); }
    #tab-board .month-list > .card .badge.loose-tag { display: inline-block; }
    #tab-board .badge.loose-tag { display: none; background: #eef2f2; color: var(--ink-3); }
    #tab-board .del {
      position: absolute; top: 7px; right: 7px; width: 20px; height: 20px;
      border: 0; border-radius: 6px; background: transparent; color: var(--ink-3);
      cursor: pointer; opacity: 0; transition: opacity .12s, background .12s, color .12s;
      display: grid; place-items: center; font-size: 14px; line-height: 1;
    }
    #tab-board .card:hover .del, #tab-board .ship-head:hover .del { opacity: 1; }
    #tab-board .del:hover { background: var(--out-tint); color: var(--out); }
    #tab-board .ship-head .del { position: static; opacity: 0; }
    #tab-board .shipment:hover .ship-head .del { opacity: 1; }
    #tab-board .add-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      height: 34px; border: 1px dashed #c4cdd0; border-radius: 9px;
      background: transparent; color: var(--ink-2); font-family: var(--font-ui);

<body>

<header>
  <div class="brand">
    <img src="Logos/icon.svg" alt="Normal Protocol" />
    <h1>Normal Protocol</h1>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="intakes">Intakes</button>
    <button class="tab-btn" data-tab="board">Supplement Board</button>
  </nav>
  <div class="header-right"></div>
</header>

<main id="tab-intakes" class="tab-panel active">
  <div class="toolbar">
    <span class="section-title">Daily Supplements</span>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="Search items…" />
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr id="header-row"></tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" class="loading">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div id="count"></div>
</main>

<section id="tab-board" class="tab-panel">
  <div id="board" class="board layout-compact"></div>
</section>

<script>
  const COLUMNS = [
    { key: "item",              label: "Item",       cls: "item" },
    { key: "brand",             label: "Brand",      cls: "" },
    { key: "daily_qty",         label: "Qty / day",  cls: "qty" },
    { key: "from",              label: "Source",     cls: "source-cell" },
    { key: "Price",             label: "Price",      cls: "qty" },
    { key: "payment_structure", label: "Payment",    cls: "payment" },
    { key: "listing_id",        label: "Listing ID", cls: "listing-id" },
  ];

  let allRows = [];
  let suppliers = [];
  let sortCol = "item";
  let sortAsc = true;
  let activeMenu = null;

  function fmtPrice(v) {
    const n = parseFloat(v);
    return isNaN(n) ? "" : `$${n.toFixed(2)}`;
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Close any open menu ──
  function closeMenu() {
    if (!activeMenu) return;
    const { trigger, menu } = activeMenu;
    trigger.classList.remove("open");
    menu.classList.remove("open");
    activeMenu = null;
  }

  document.addEventListener("click", (e) => {
    if (activeMenu && !activeMenu.trigger.contains(e.target) && !activeMenu.menu.contains(e.target)) {
      closeMenu();
    }
  });

  // ── Build a source dropdown cell ──
  function makeSourceCell(row) {
    const current = row["from"] ?? "";

    const trigger = document.createElement("button");
    trigger.className = "source-trigger";
    trigger.innerHTML = `
      <span class="source-label">${esc(current)}</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m6 9 6 6 6-6"/>
      </svg>`;

    const menu = document.createElement("div");
    menu.className = "source-menu";

    function buildOptions(selectedValue) {
      menu.innerHTML = "";
      suppliers.forEach(name => {
        const opt = document.createElement("div");
        opt.className = "source-option" + (name === selectedValue ? " selected" : "");
        opt.innerHTML = `
          <svg class="check" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          ${esc(name)}`;
        opt.addEventListener("click", () => selectSupplier(name));
        menu.appendChild(opt);
      });
    }

    async function selectSupplier(name) {
      if (name === row["from"]) { closeMenu(); return; }
      closeMenu();

      // Optimistic update
      trigger.querySelector(".source-label").textContent = name;
      const prevVal = row["from"];
      row["from"] = name;

      try {
        const res = await fetch(`/api/intakes/${row.ID}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ from: name }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (err) {
        // Rollback on failure
        row["from"] = prevVal;
        trigger.querySelector(".source-label").textContent = prevVal;
        const errNote = document.createElement("div");
        errNote.className = "source-error";
        errNote.textContent = "Save failed — try again";
        menu.appendChild(errNote);
        console.error("Source update failed:", err);
      }
    }

    trigger.addEventListener("click", (e) => {
      e.stopPropagation();
      if (activeMenu && activeMenu.trigger === trigger) {
        closeMenu();
        return;
      }
      closeMenu();
      buildOptions(row["from"]);
      trigger.classList.add("open");
      menu.classList.add("open");
      activeMenu = { trigger, menu };
    });

    buildOptions(current);

    const wrapper = document.createElement("div");
    wrapper.style.position = "relative";
    wrapper.style.display = "inline-block";
    wrapper.appendChild(trigger);
    wrapper.appendChild(menu);
    return wrapper;
  }

  // ── Render headers ──
  function renderHeaders() {
    const tr = document.getElementById("header-row");
    tr.innerHTML = "";
    COLUMNS.forEach(col => {
      const th = document.createElement("th");
      const isSorted = sortCol === col.key;
      if (isSorted) th.classList.add("sorted");
      th.innerHTML = `${col.label}<span class="sort-icon">${isSorted ? (sortAsc ? "▲" : "▼") : "⇅"}</span>`;
      th.addEventListener("click", () => {
        if (sortCol === col.key) sortAsc = !sortAsc;
        else { sortCol = col.key; sortAsc = true; }
        render(document.getElementById("search").value);
      });
      tr.appendChild(th);
    });
  }

  // ── Render table body ──
  function render(query = "") {
    renderHeaders();
    const tbody = document.getElementById("table-body");
    const q = query.toLowerCase();
    let rows = allRows.filter(r =>
      COLUMNS.some(c => String(r[c.key] ?? "").toLowerCase().includes(q))
    );
    rows.sort((a, b) => {
      const numeric = sortCol === "daily_qty" || sortCol === "Price";
      const n = numeric
        ? (parseFloat(a[sortCol]) || 0) - (parseFloat(b[sortCol]) || 0)
        : String(a[sortCol] ?? "").toLowerCase() < String(b[sortCol] ?? "").toLowerCase() ? -1
        : String(a[sortCol] ?? "").toLowerCase() > String(b[sortCol] ?? "").toLowerCase() ? 1 : 0;
      return sortAsc ? n : -n;
    });

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${COLUMNS.length}" class="empty">No results found.</td></tr>`;
      document.getElementById("count").textContent = "";
      return;
    }

    tbody.innerHTML = "";
    rows.forEach(r => {
      const tr = document.createElement("tr");

      const cells = [
        { cls: "item",       html: esc(r.item) },
        { cls: "",           html: `<span class="badge">${esc(r.brand)}</span>` },
        { cls: "qty",        html: esc(r.daily_qty) },
        { cls: "source-cell", node: makeSourceCell(r) },
        { cls: "qty",        html: fmtPrice(r.Price) },
        { cls: "payment",    html: esc(r.payment_structure) },
        { cls: "listing-id", html: esc(r.listing_id) },
      ];

      cells.forEach(({ cls, html, node }) => {
        const td = document.createElement("td");
        if (cls) td.className = cls;
        if (node) td.appendChild(node);
        else td.innerHTML = html;
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    document.getElementById("count").textContent =
      `${rows.length} item${rows.length !== 1 ? "s" : ""}`;
  }

  // ── Init: load intakes + suppliers in parallel ──
  async function init() {
    try {
      const [intakesRes, suppliersRes] = await Promise.all([
        fetch("/api/intakes"),
        fetch("/api/suppliers"),
      ]);
      if (!intakesRes.ok) throw new Error(`Intakes: HTTP ${intakesRes.status}`);
      if (!suppliersRes.ok) throw new Error(`Suppliers: HTTP ${suppliersRes.status}`);
      allRows = await intakesRes.json();
      suppliers = await suppliersRes.json();
      render();
    } catch (e) {
      document.getElementById("table-body").innerHTML =
        `<tr><td colspan="${COLUMNS.length}" class="error">Failed to load — ${e.message}</td></tr>`;
    }
  }

  document.getElementById("search").addEventListener("input", e => render(e.target.value));

  init();

  // ── Tab switching (persisted across reloads) ──
  const TAB_KEY = "np_active_tab";
  let boardInitialized = false;
  function activateTab(tab) {
    document.querySelectorAll(".tab-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.tab === tab));
    document.querySelectorAll(".tab-panel").forEach(p =>
      p.classList.toggle("active", p.id === `tab-${tab}`));
    if (tab === "board" && !boardInitialized) {
      boardInitialized = true;
      window.SupplementBoard.init();
    }
    try { localStorage.setItem(TAB_KEY, tab); } catch (e) {}
  }
  document.querySelectorAll(".tab-btn").forEach(btn =>
    btn.addEventListener("click", () => activateTab(btn.dataset.tab)));
  // restore the last-open tab once all scripts (incl. the board) have parsed
  document.addEventListener("DOMContentLoaded", () => {
    let saved = "intakes";
    try { saved = localStorage.getItem(TAB_KEY) || "intakes"; } catch (e) {}
    if (saved === "board") activateTab("board");
  });
</script>

<!-- ── Supplement Board: domain logic (ported verbatim from prototype/data.js) ── -->
<script>
(function () {
  const DAY = 86400000;

  function today() { return new Date(); }
  function parseDate(iso) { return new Date(iso + 'T00:00:00'); }
  function addDays(d, n) { return new Date(d.getTime() + n * DAY); }
  function daysBetween(a, b) { return (b - a) / DAY; }

  function calc(c) {
    const dose = Number(c.dose) || 1;                  // caps/day
    const bottle = Number(c.bottleSize) || 0;          // caps/bottle
    const t = today();
    const logged = parseDate(c.loggedOn);
    const elapsed = Math.max(0, daysBetween(logged, t));
    const onHand = c.amount - dose * elapsed;           // may be < 0 (overdue)

    const curDaysLeft = onHand / dose;
    const curRunOut = addDays(logged, c.amount / dose);

    const qty = Number(c.qty) || 0;                     // BOTTLES
    const added = qty * bottle;
    const newOnHand = onHand + added;
    const newDaysLeft = newOnHand / dose;
    const newRunOut = addDays(t, newDaysLeft);

    const price = Number(c.price) || 0;                 // per bottle
    const cost = price * qty;

    return {
      dose, bottle, onHand, curDaysLeft, curRunOut,
      qty, added, newOnHand, newDaysLeft, newRunOut, price, cost,
      hasOrder: qty > 0,
    };
  }

  const MON = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
    'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function fmtDate(d) {
    const now = today();
    const base = `${MON[d.getMonth()]} ${d.getDate()}`;
    return d.getFullYear() !== now.getFullYear()
      ? `${base}, ’${String(d.getFullYear()).slice(2)}` : base;
  }
  function fmtDateShort(d) {
    const now = today();
    const base = `${d.getMonth() + 1}/${d.getDate()}`;
    return d.getFullYear() !== now.getFullYear()
      ? `${base}/${String(d.getFullYear()).slice(2)}` : base;
  }
  function fmtMoney(n) {
    return '$' + (Number(n) || 0).toLocaleString('en-US',
      { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtMoney0(n) {
    return '$' + Math.round(Number(n) || 0).toLocaleString('en-US');
  }
  function fmtUnits(n) {
    const r = Math.round(n);
    return r < 0 ? '0' : `${r}`;
  }

  function tier(days, threshold) {
    if (days <= 0) return 'out';
    if (days < threshold) return 'soon';
    return 'ok';
  }

  const SEED = {
    cardData: {
      drainage:  { name: 'Drainage Activator', amount: 62,  dose: 6,  bottleSize: 120, loggedOn: '2026-06-04', price: 45, qty: 1, includeInMonthTotal: true },
      biotoxin1: { name: 'BioToxin',           amount: 53,  dose: 4,  bottleSize: 120, loggedOn: '2026-06-04', price: 48, qty: 1, includeInMonthTotal: true },
      atp:       { name: 'ATP',                amount: 110, dose: 11, bottleSize: 120, loggedOn: '2026-06-04', price: 63, qty: 1, includeInMonthTotal: true },
      para2:     { name: 'Para 2',             amount: 65,  dose: 8,  bottleSize: 120, loggedOn: '2026-06-04', price: 40, qty: 1, includeInMonthTotal: true },
      serratia:  { name: 'Serratia',           amount: 9,   dose: 1,  bottleSize: 180, loggedOn: '2026-06-04', price: 54, qty: 1, includeInMonthTotal: false },
      biotoxin2: { name: 'BioToxin',           amount: 66,  dose: 4,  bottleSize: 120, loggedOn: '2026-05-29', price: 48, qty: 1, includeInMonthTotal: true },
      lymph:     { name: 'LymphActiv',         amount: 40,  dose: 2,  bottleSize: 60,  loggedOn: '2026-06-04', price: 36, qty: 1, includeInMonthTotal: true },
      para1:     { name: 'Para 1',             amount: 151, dose: 4,  bottleSize: 120, loggedOn: '2026-06-04', price: 42, qty: 1, includeInMonthTotal: false },
      brain:     { name: 'Brain',              amount: 105, dose: 2,  bottleSize: 180, loggedOn: '2026-05-29', price: 58, qty: 1, includeInMonthTotal: true },
      thymus:    { name: 'Thymus',             amount: 249, dose: 3,  bottleSize: 180, loggedOn: '2026-05-29', price: 39, qty: 1, includeInMonthTotal: true },
    },
    shipmentData: {
      s_bluesky_jun: { name: 'Blue Sky Vitamin' },
      s_cellcore:    { name: 'CellCore Direct' },
      s_fullscript:  { name: 'Fullscript' },
      s_bluesky_aug: { name: 'Blue Sky Vitamin' },
    },
    structure: [
      {
        id: 'm_jun', name: 'Jun', sub: '2026', spent: 480,
        blocks: [
          { type: 'shipment', id: 's_bluesky_jun', cards: ['atp', 'drainage', 'para2', 'serratia'] },
          { type: 'card', id: 'lymph' },
          { type: 'shipment', id: 's_cellcore', cards: ['biotoxin1', 'biotoxin2'] },
        ],
      },
      {
        id: 'm_jul', name: 'Jul', sub: '2026', spent: 0,
        blocks: [
          { type: 'shipment', id: 's_fullscript', cards: ['para1', 'brain'] },
        ],
      },
      {
        id: 'm_aug', name: 'Aug', sub: '2026', spent: 0,
        blocks: [
          { type: 'shipment', id: 's_bluesky_aug', cards: ['thymus'] },
        ],
      },
    ],
  };

  window.SB = {
    DAY, today, parseDate, addDays, daysBetween,
    calc, fmtDate, fmtDateShort, fmtMoney, fmtMoney0, fmtUnits, tier,
    SEED,
  };
})();
</script>

<!-- ── Supplement Board: render / nested drag-and-drop / inline edit / totals / persistence ── -->
<script>
(function () {
  const SB = window.SB;
  const KEY = 'sb_state_v7';
  const board = document.getElementById('board');

  window.SBoard = window.SBoard || { threshold: 10 };
  const thr = () => window.SBoard.threshold || 10;

  const ICON = {
    grip: `<svg viewBox="0 0 8 16" fill="currentColor"><circle cx="2" cy="3" r="1.3"/><circle cx="6" cy="3" r="1.3"/><circle cx="2" cy="8" r="1.3"/><circle cx="6" cy="8" r="1.3"/><circle cx="2" cy="13" r="1.3"/><circle cx="6" cy="13" r="1.3"/></svg>`,
    truck: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M1 5h11v9H1z"/><path d="M12 8h4l3 3v3h-7z"/><circle cx="5" cy="16.5" r="1.6"/><circle cx="16" cy="16.5" r="1.6"/></svg>`,
    plus: `<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>`,
  };

  let STATE; // { cardData, shipmentData }
  let structure;

  function load() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(KEY)); } catch (e) {}
    if (saved && saved.cardData && saved.structure) {
      STATE = { cardData: saved.cardData, shipmentData: saved.shipmentData || {} };
      structure = saved.structure;
    } else {
      const seed = JSON.parse(JSON.stringify(SB.SEED));
      STATE = { cardData: seed.cardData, shipmentData: seed.shipmentData };
      structure = seed.structure;
    }
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function isoToday() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  function uid(p) { return p + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
  function el(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  // ── builders ──
  function cardHTML(id) {
    const c = STATE.cardData[id];
    return `
    <div class="card" data-id="${id}" data-kind="card">
      <div class="card-body">
        <div class="card-top">
          <span class="grip block-grip card-grip" title="Drag">${ICON.grip}</span>
          <div class="card-name" contenteditable="true" spellcheck="false" data-field="name">${esc(c.name)}</div>
          <span class="badge loose-tag">Loose</span>
          <span class="badge status">OK</span>
        </div>
        <div class="proj">
          <div class="cell daysleft">
            <div class="pk">Days left</div>
            <div class="pv">
              <span class="now"><span class="n">0</span><span class="u">d</span></span>
              <span class="arrow">→</span>
              <span class="next"><span class="n">0</span><span class="u">d</span></span>
            </div>
          </div>
          <div class="cell runout">
            <div class="pk">Runs out</div>
            <div class="pv">
              <span class="now">—</span>
              <span class="arrow">→</span>
              <span class="next">—</span>
            </div>
          </div>
        </div>
        <div class="order">
          <div class="field">
            <label>Price <span class="lbl-sub">/ bottle</span></label>
            <div class="input-wrap"><span class="pfx">$</span><input type="number" step="0.01" min="0" inputmode="decimal" data-field="price" value="${c.price}"></div>
          </div>
          <div class="field">
            <label>Order <span class="lbl-sub">bottles</span></label>
            <div class="input-wrap"><input type="number" step="1" min="0" inputmode="numeric" data-field="qty" value="${c.qty}"><span class="sfx">btl</span></div>
          </div>
        </div>
        <div class="card-foot">
          <span class="meta">on hand <b class="onhand">0</b> · <b class="dose">0</b>/day · <b class="bsize">0</b>/btl</span>
          <span class="ototal"><small>Order</small><span class="amt">$0.00</span></span>
          <button class="incl-toggle" data-act="toggle-include" title="Count this item in the month’s Planned total" aria-label="Count in Planned total"><span class="sw"><i></i></span></button>
        </div>
        <button class="del" data-act="del-card" title="Remove item" aria-label="Remove item">×</button>
      </div>
    </div>`;
  }

  function shipmentHTML(block) {
    const s = STATE.shipmentData[block.id] || { name: 'Shipment' };
    const cards = block.cards.map(cardHTML).join('');
    return `
    <div class="shipment" data-id="${block.id}" data-kind="shipment">
      <div class="ship-head">
        <span class="grip block-grip" title="Drag shipment">${ICON.grip}</span>
        <span class="truck">${ICON.truck}</span>
        <div class="ship-id">
          <span class="ship-name" contenteditable="true" spellcheck="false" data-field="name">${esc(s.name)}</span>
          <span class="scount">0</span>
        </div>
        <div class="ship-total"><span class="amt">$0.00</span></div>
        <button class="add-btn ship-add" data-act="add-card-ship">${ICON.plus} Item</button>
        <button class="del" data-act="del-ship" title="Remove shipment">×</button>
      </div>
      <div class="ship-body" data-list="shipment">${cards}</div>
    </div>`;
  }

  function blockHTML(block) {
    return block.type === 'shipment' ? shipmentHTML(block) : cardHTML(block.id);
  }

  function monthHTML(m) {
    return `
    <div class="month" data-id="${m.id}">
      <div class="month-head">
        <div class="month-title">
          <span class="mname" contenteditable="true" spellcheck="false" data-field="name">${esc(m.name)}</span>
          <span class="msub">${esc(m.sub || '')}</span>
          <span class="mcount">0</span>
        </div>
        <button class="add-btn month-add" data-act="add-ship">${ICON.plus} Order</button>
        <button class="add-btn month-add" data-act="add-card-month">${ICON.plus} Item</button>
        <div class="month-metrics">
          <div class="metric spent">
            <span class="mk">Spent</span>
            <span class="mv mv-money"><span class="pfx">$</span><input class="spent-input" type="number" min="0" step="0.01" inputmode="decimal" value="${Number(m.spent) || 0}"></span>
          </div>
          <div class="metric">
            <span class="mk">Shipments</span>
            <span class="mv shipv">$0.00</span>
          </div>
          <div class="metric is-total">
            <span class="mk">Planned</span>
            <span class="mv plannedv">$0.00</span>
          </div>
          <div class="metric is-max">
            <span class="mk">Max</span>
            <span class="mv maxv">$0.00</span>
          </div>
        </div>
      </div>
      <div class="month-list" data-list="month">${m.blocks.map(blockHTML).join('')}</div>
    </div>`;
  }

  function render() {
    board.innerHTML = structure.map(monthHTML).join('');
    board.querySelectorAll('.month-list').forEach(makeMonthSortable);
    board.querySelectorAll('.ship-body').forEach(makeShipSortable);
    board.querySelectorAll('.spent-input').forEach(sizeSpent);
    recalcAll();
  }

  function sizeSpent(input) {
    const len = Math.max(1, String(input.value).length);
    input.style.width = (len + 1.5) + 'ch';
  }

  // ── per-card update ──
  function setDays(span, val) {
    const n = span.querySelector('.n');
    n.textContent = Math.max(0, Math.round(val));
  }

  function updateCard(cardEl) {
    const id = cardEl.dataset.id;
    const c = STATE.cardData[id];
    if (!c) return 0;
    const r = SB.calc(c);
    const tier = SB.tier(r.curDaysLeft, thr());
    const compact = board.classList.contains('layout-compact');
    const df = compact ? SB.fmtDateShort : SB.fmtDate;

    cardEl.classList.toggle('tier-soon', tier === 'soon');
    cardEl.classList.toggle('tier-out', tier === 'out');
    cardEl.classList.toggle('has-order', r.hasOrder);
    cardEl.classList.toggle('counted', !!c.includeInMonthTotal);

    cardEl.querySelector('.status').textContent =
      tier === 'out' ? 'OUT' : tier === 'soon' ? 'SOON' : 'OK';

    const dl = cardEl.querySelector('.daysleft');
    setDays(dl.querySelector('.now'), r.curDaysLeft);
    setDays(dl.querySelector('.next'), r.newDaysLeft);

    const ro = cardEl.querySelector('.runout');
    ro.querySelector('.now').textContent = df(r.curRunOut);
    ro.querySelector('.next').textContent = df(r.newRunOut);

    cardEl.querySelector('.onhand').textContent = SB.fmtUnits(r.onHand);
    cardEl.querySelector('.dose').textContent = String(+r.dose.toFixed(1));
    cardEl.querySelector('.bsize').textContent = String(r.bottle);
    cardEl.querySelector('.ototal .amt').textContent = SB.fmtMoney(r.cost);

    cardEl.querySelectorAll('input[data-field]').forEach((inp) => {
      if (compact) {
        const len = Math.max(1, String(inp.value).length);
        inp.style.width = (len + 1.2) + 'ch';
      } else if (inp.style.width) {
        inp.style.width = '';
      }
    });

    return r.cost;
  }

  // ── totals ──
  function monthSpent(monthEl) {
    const i = monthEl.querySelector('.spent-input');
    return i ? (Number(i.value) || 0) : 0;
  }

  function recalcAll() {
    board.querySelectorAll('.month').forEach((monthEl) => {
      const list = monthEl.querySelector('.month-list');
      let shipSum = 0, plannedItems = 0, maxItems = 0, itemCount = 0;

      [...list.children].forEach((node) => {
        if (node.classList.contains('shipment')) {
          let sTot = 0, sCount = 0;
          node.querySelectorAll(':scope .ship-body > .card').forEach((cardEl) => {
            const cost = updateCard(cardEl);
            const inc = STATE.cardData[cardEl.dataset.id] && STATE.cardData[cardEl.dataset.id].includeInMonthTotal;
            maxItems += cost;
            if (inc) { sTot += cost; plannedItems += cost; } // toggled-off rows leave the shipment subtotal
            sCount++;
          });
          node.querySelector('.ship-total .amt').textContent = SB.fmtMoney(sTot);
          node.querySelector('.scount').textContent = sCount;
          shipSum += sTot;
          itemCount += sCount;
        } else if (node.classList.contains('card')) {
          const cost = updateCard(node);
          maxItems += cost;
          if (STATE.cardData[node.dataset.id] && STATE.cardData[node.dataset.id].includeInMonthTotal) plannedItems += cost;
          itemCount++;
        }
      });

      const spent = monthSpent(monthEl);
      monthEl.querySelector('.shipv').textContent = SB.fmtMoney(shipSum);
      monthEl.querySelector('.plannedv').textContent = SB.fmtMoney(spent + plannedItems);
      monthEl.querySelector('.maxv').textContent = SB.fmtMoney(spent + maxItems);
      monthEl.querySelector('.mcount').textContent = `${itemCount}`;
    });
  }
  window.SBoard.recalc = recalcAll;

  // ── persistence ──
  function serialize() {
    const struct = [...board.querySelectorAll('.month')].map((m) => ({
      id: m.dataset.id,
      name: m.querySelector('.mname').textContent.trim(),
      sub: m.querySelector('.msub').textContent.trim(),
      spent: monthSpent(m),
      blocks: [...m.querySelector('.month-list').children]
        .filter((n) => n.classList.contains('shipment') || n.classList.contains('card'))
        .map((n) => {
          if (n.classList.contains('shipment')) {
            return {
              type: 'shipment', id: n.dataset.id,
              cards: [...n.querySelectorAll(':scope .ship-body > .card')].map((c) => c.dataset.id),
            };
          }
          return { type: 'card', id: n.dataset.id };
        }),
    }));
    const liveCards = new Set(), liveShips = new Set();
    struct.forEach((m) => m.blocks.forEach((b) => {
      if (b.type === 'shipment') { liveShips.add(b.id); b.cards.forEach((c) => liveCards.add(c)); }
      else liveCards.add(b.id);
    }));
    const cardData = {}, shipmentData = {};
    liveCards.forEach((id) => { if (STATE.cardData[id]) cardData[id] = STATE.cardData[id]; });
    liveShips.forEach((id) => { if (STATE.shipmentData[id]) shipmentData[id] = STATE.shipmentData[id]; });
    return { cardData, shipmentData, structure: struct };
  }

  let saveTimer = null;
  function persist() {
    try { localStorage.setItem(KEY, JSON.stringify(serialize())); } catch (e) {}
  }
  function persistSoon() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(persist, 250);
  }

  // ── drag and drop (SortableJS, nested) ──
  const afterDrag = () => { recalcAll(); persist(); };
  const COMMON = {
    animation: 160, easing: 'cubic-bezier(.2,.7,.3,1)',
    filter: 'input,[contenteditable],button',
    preventOnFilter: false,
    ghostClass: 'sb-ghost', chosenClass: 'sb-chosen', dragClass: 'sb-drag',
    // forceFallback: use SortableJS's own pointer-driven drag clone instead of
    // native HTML5 DnD — renders the designed rotate/pop-shadow on the dragged
    // card, escapes the overflow:hidden clipping on shipments/compact cards, and
    // behaves consistently across browsers.
    forceFallback: true, fallbackOnBody: true, swapThreshold: 0.65,
  };
  function makeMonthSortable(listEl) {
    new Sortable(listEl, Object.assign({}, COMMON, {
      group: { name: 'sb', pull: true, put: true },
      draggable: '.card, .shipment',
      handle: '.block-grip',
      onEnd: afterDrag,
    }));
  }
  function makeShipSortable(bodyEl) {
    new Sortable(bodyEl, Object.assign({}, COMMON, {
      group: { name: 'sb', pull: true, put: (to, from, drag) => drag.classList.contains('card') },
      draggable: '.card',
      handle: '.card-grip',
      onEnd: afterDrag,
    }));
  }

  // ── editing ──
  board.addEventListener('input', (e) => {
    const t = e.target;
    if (t.matches('input[data-field]')) {
      const cardEl = t.closest('.card');
      const c = STATE.cardData[cardEl.dataset.id];
      c[t.dataset.field] = t.value === '' ? 0 : Number(t.value);
      updateCard(cardEl);
      recalcTotalsFor(cardEl);
      persistSoon();
    } else if (t.matches('.card-name')) {
      STATE.cardData[t.closest('.card').dataset.id].name = t.textContent;
      persistSoon();
    } else if (t.matches('.ship-name')) {
      const ship = t.closest('.shipment');
      (STATE.shipmentData[ship.dataset.id] || (STATE.shipmentData[ship.dataset.id] = {})).name = t.textContent;
      persistSoon();
    } else if (t.matches('.spent-input')) {
      sizeSpent(t);
      recalcTotalsFor(t);
      persistSoon();
    } else if (t.matches('.mname')) {
      persistSoon();
    }
  });

  function recalcTotalsFor(node) {
    const monthEl = node.closest('.month');
    if (!monthEl) return;
    const list = monthEl.querySelector('.month-list');
    let shipSum = 0, plannedItems = 0, maxItems = 0;
    [...list.children].forEach((n) => {
      if (n.classList.contains('shipment')) {
        let sTot = 0;
        n.querySelectorAll(':scope .ship-body > .card').forEach((cardEl) => {
          const c = STATE.cardData[cardEl.dataset.id];
          const cost = c ? SB.calc(c).cost : 0;
          maxItems += cost;
          if (c && c.includeInMonthTotal) { sTot += cost; plannedItems += cost; } // toggled-off rows leave the shipment subtotal
        });
        n.querySelector('.ship-total .amt').textContent = SB.fmtMoney(sTot);
        shipSum += sTot;
      } else if (n.classList.contains('card')) {
        const c = STATE.cardData[n.dataset.id];
        const cost = c ? SB.calc(c).cost : 0;
        maxItems += cost;
        if (c && c.includeInMonthTotal) plannedItems += cost;
      }
    });
    const spent = monthSpent(monthEl);
    monthEl.querySelector('.shipv').textContent = SB.fmtMoney(shipSum);
    monthEl.querySelector('.plannedv').textContent = SB.fmtMoney(spent + plannedItems);
    monthEl.querySelector('.maxv').textContent = SB.fmtMoney(spent + maxItems);
  }

  // ── actions (add / delete / toggle) ──
  board.addEventListener('click', (e) => {
    const act = e.target.closest('[data-act]');
    if (!act) return;
    const a = act.dataset.act;

    if (a === 'toggle-include') {
      e.preventDefault();
      const cardEl = act.closest('.card');
      const c = STATE.cardData[cardEl.dataset.id];
      c.includeInMonthTotal = !c.includeInMonthTotal;
      cardEl.classList.toggle('counted', c.includeInMonthTotal);
      recalcTotalsFor(cardEl);
      persist();
      return;
    }
    if (a === 'del-card') {
      const cardEl = act.closest('.card');
      cardEl.remove();
      recalcAll(); persist();
      return;
    }
    if (a === 'del-ship') {
      act.closest('.shipment').remove();
      recalcAll(); persist();
      return;
    }
    if (a === 'add-card-ship') {
      const body = act.closest('.shipment').querySelector('.ship-body');
      const id = newCard();
      const node = el(cardHTML(id));
      body.appendChild(node);
      finishAdd(node);
      return;
    }
    if (a === 'add-card-month') {
      const list = act.closest('.month').querySelector('.month-list');
      const id = newCard();
      const node = el(cardHTML(id));
      list.appendChild(node);
      finishAdd(node);
      return;
    }
    if (a === 'add-ship') {
      const list = act.closest('.month').querySelector('.month-list');
      const sid = uid('s_');
      STATE.shipmentData[sid] = { name: 'New merchant' };
      const node = el(shipmentHTML({ type: 'shipment', id: sid, cards: [] }));
      list.appendChild(node);
      makeShipSortable(node.querySelector('.ship-body'));
      recalcAll(); persist();
      const nm = node.querySelector('.ship-name');
      nm.focus(); selectAll(nm);
      return;
    }
  });

  function newCard() {
    const id = uid('c_');
    STATE.cardData[id] = {
      name: 'New supplement', amount: 30, dose: 1, bottleSize: 30,
      loggedOn: isoToday(), price: 0, qty: 0, includeInMonthTotal: true,
    };
    return id;
  }
  function finishAdd(node) {
    recalcAll(); persist();
    const nm = node.querySelector('.card-name');
    nm.focus(); selectAll(nm);
  }
  function selectAll(node) {
    const r = document.createRange();
    r.selectNodeContents(node);
    const s = window.getSelection();
    s.removeAllRanges(); s.addRange(r);
  }

  board.addEventListener('blur', (e) => {
    if (e.target.matches('[contenteditable]')) persist();
  }, true);
  board.addEventListener('paste', (e) => {
    if (e.target.matches('[contenteditable]')) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    }
  });
  board.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.matches('[contenteditable]')) {
      e.preventDefault(); e.target.blur();
    }
  });

  // ── public API (lazy init from the tab switcher) ──
  let booted = false;
  window.SupplementBoard = {
    init() {
      if (booted) return;
      booted = true;
      load();
      render();
      const asof = document.getElementById('board-asof');
      if (asof) asof.textContent = SB.fmtDate(SB.today());

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => {
          board.querySelectorAll('.spent-input').forEach(sizeSpent);
          recalcAll();
        });
      }
      // keep the live countdown honest across midnight
      setInterval(recalcAll, 60 * 60 * 1000);
    },
    reset() {
      localStorage.removeItem(KEY);
      location.reload();
    },
  };

  const resetBtn = document.getElementById('board-reset');
  if (resetBtn) resetBtn.addEventListener('click', () => window.SupplementBoard.reset());
})();
</script>
</body>
</html>
