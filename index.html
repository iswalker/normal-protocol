      const res = await fetch('/api/orders', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(toApi()),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch (e) {
      console.error('Board: save to /api/orders failed —', e.message);
    }
  }
  function persistSoon() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(persist, 400);
  }

  // ── drag and drop (SortableJS, nested) ──
  const COMMON = {
    animation: 160, easing: 'cubic-bezier(.2,.7,.3,1)',
    filter: 'input,[contenteditable],button',
    preventOnFilter: false,
    ghostClass: 'sb-ghost', chosenClass: 'sb-chosen', dragClass: 'sb-drag',
    // forceFallback: pointer-driven drag clone for consistent cross-browser behavior.
    // fallbackOnBody: false keeps the clone inside the board hierarchy so the
    // compact CSS selectors apply, eliminating the "detailed card" drag artifact.
    // The clone uses position:fixed so overflow:hidden on .shipment doesn't clip it;
    // we additionally toggle .sb-dragging on body during drag to un-clip if needed.
    forceFallback: true, fallbackOnBody: false, swapThreshold: 0.65,
    onStart: () => document.body.classList.add('sb-dragging'),
    onEnd: () => { document.body.classList.remove('sb-dragging'); recalcAll(); persist(); },
  };
  function makeMonthSortable(listEl) {
    new Sortable(listEl, Object.assign({}, COMMON, {
      group: { name: 'sb', pull: true, put: true },
      draggable: '.card, .shipment',
      handle: '.block-grip',
    }));
  }
  function makeShipSortable(bodyEl) {
    new Sortable(bodyEl, Object.assign({}, COMMON, {
      group: { name: 'sb', pull: true, put: (to, from, drag) => drag.classList.contains('card') },
      draggable: '.card',
      handle: '.card-grip',
    }));
  }

  // ── editing ──
  board.addEventListener('input', (e) => {
    const t = e.target;
    if (t.matches('input[data-field]')) {
      const cardEl = t.closest('.card');
      const c = STATE.cardData[cardEl.dataset.id];
      c[t.dataset.field] = t.value === '' ? 0 : Number(t.value);
      recalcAll();
      persistSoon();
    } else if (t.matches('.card-name')) {
      STATE.cardData[t.closest('.card').dataset.id].name = t.textContent;
      persistSoon();
    } else if (t.matches('.ship-name')) {
      const ship = t.closest('.shipment');
      (STATE.shipmentData[ship.dataset.id] || (STATE.shipmentData[ship.dataset.id] = {})).name = t.textContent;
      persistSoon();
    } else if (t.matches('.ship-notes')) {
      const ship = t.closest('.shipment');
      (STATE.shipmentData[ship.dataset.id] || (STATE.shipmentData[ship.dataset.id] = {})).notes = t.textContent;
      persistSoon();
    } else if (t.matches('.card-notes')) {
      STATE.cardData[t.closest('.card').dataset.id].notes = t.textContent;
      persistSoon();
    }
  });

  function recalcTotalsFor(node) {
    const monthEl = node.closest('.month');
    if (!monthEl) return;
    const list = monthEl.querySelector('.month-list');
    let shipSum = 0, plannedItems = 0, maxItems = 0;
    [...list.children].forEach((n) => {
      if (n.classList.contains('shipment')) {
        const shipLocked = !!(STATE.shipmentData[n.dataset.id] || {}).stage;
        let sTot = 0, minRunOut = null;
        n.querySelectorAll(':scope .ship-body > .card').forEach((cardEl) => {
          const c = STATE.cardData[cardEl.dataset.id];
          const r = c ? calcForCard(c) : null;
          const cost = r ? r.cost : 0;
          if (!shipLocked) {
            maxItems += cost;
            if (c && c.includeInMonthTotal) { sTot += cost; plannedItems += cost; }
            if (c && c.dose && c.loggedOn && r && r.hasOrder && isFinite(r.newRunOut)) {
              if (!minRunOut || r.newRunOut < minRunOut) minRunOut = r.newRunOut;
            }
          } else if (c && c.includeInMonthTotal) { sTot += cost; }
        });
        n.querySelector('.ship-total .amt').textContent = SB.fmtMoney(sTot);
        const md = n.querySelector('.ship-min-date');
        if (md) md.textContent = minRunOut ? SB.fmtDateShort(minRunOut) : '';
        if ((STATE.shipmentData[n.dataset.id] || {}).stage !== 'received') shipSum += sTot;
      } else if (n.classList.contains('card')) {
        const c = STATE.cardData[n.dataset.id];
        const cost = c ? calcForCard(c).cost : 0;
        maxItems += cost;
        if (c && c.includeInMonthTotal) plannedItems += cost;
      }
    });
    const spent = monthSpent(monthEl);
    const spentEl = monthEl.querySelector('.spentv');
    if (spentEl) spentEl.textContent = SB.fmtMoney(spent);
    monthEl.querySelector('.shipv').textContent = SB.fmtMoney(shipSum);
    monthEl.querySelector('.plannedv').textContent = SB.fmtMoney(spent + plannedItems);
    monthEl.querySelector('.maxv').textContent = SB.fmtMoney(spent + maxItems);
  }

  // ── actions (add / delete / toggle) ──
  board.addEventListener('click', (e) => {
    const act = e.target.closest('[data-act]');
    if (!act) return;
    const a = act.dataset.act;

    if (a === 'set-stage') {
      const shipEl = act.closest('.shipment');
      const id = shipEl.dataset.id;
      STATE.shipmentData[id] = STATE.shipmentData[id] || {};
      const sd = STATE.shipmentData[id];
      const oldStage = sd.stage || null;
      const clicked = act.dataset.stage;
      const newStage = clicked === oldStage ? null : clicked;
      const monthEl = shipEl.closest('.month');

      if (newStage == null) delete sd.stage; else sd.stage = newStage;

      if (newStage != null) {
        const list = monthEl.querySelector('.month-list');
        const myPri = STAGE_PRI[newStage] ?? 0;
        // Find first locked sibling whose stage is later than ours and insert before it
        const anchor = [...list.querySelectorAll(':scope > .shipment.is-locked')]
          .filter((el) => el !== shipEl)
          .find((el) => (STAGE_PRI[(STATE.shipmentData[el.dataset.id] || {}).stage] ?? 0) > myPri);
        if (anchor) list.insertBefore(shipEl, anchor);
        else list.appendChild(shipEl);
      }

      applyShipmentStage(shipEl, newStage);
      recalcAll();
      persist();

      if (window.InventoryWriter && newStage != null) {
        const invCards = [...shipEl.querySelectorAll('.ship-body > .card')].map((c) => {
          const d = STATE.cardData[c.dataset.id] || {};
          return { name: d.name || '', bottleSize: d.bottleSize || 0, qty: Number(d.qty) || 0 };
        });
        window.InventoryWriter.writeShipment({ orderId: id, merchantName: sd.name || '', cards: invCards, newStage, oldStage });
      }
      return;
    }

    if (a === 'toggle-include') {
      e.preventDefault();
      const cardEl = act.closest('.card');
      const c = STATE.cardData[cardEl.dataset.id];
      c.includeInMonthTotal = !c.includeInMonthTotal;
      cardEl.classList.toggle('counted', c.includeInMonthTotal);
      recalcAll();
      persist();
      return;
    }
    if (a === 'del-card') {
      const cardEl = act.closest('.card');
      cardEl.remove();
      recalcAll(); persist();
      return;
    }
    if (a === 'del-ship') {
      act.closest('.shipment').remove();
      recalcAll(); persist();
      return;
    }
    if (a === 'add-card-ship') {
      if (act.closest('.shipment').classList.contains('is-locked')) return;
      if (activePicker) { closeItemPicker(); return; }
      const shipEl = act.closest('.shipment');
      const body = shipEl.querySelector('.ship-body');
      const shipName = (STATE.shipmentData[shipEl.dataset.id]?.name || '').trim();
      showItemPicker(act, (id) => { const c = el(cardHTML(id)); body.prepend(c); finishAdd(c); }, shipName || null);
      return;
    }
    if (a === 'add-card-month') {
      if (activePicker) { closeItemPicker(); return; }
      const list = act.closest('.month').querySelector('.month-list');
      showItemPicker(act, (id) => { const c = el(cardHTML(id)); list.prepend(c); finishAdd(c); });
      return;
    }
    if (a === 'add-ship') {
      const list = act.closest('.month').querySelector('.month-list');
      const sid = uid('s_');
      STATE.shipmentData[sid] = { name: 'New merchant', notes: '' };
      const node = el(shipmentHTML({ type: 'shipment', id: sid, cards: [] }));
      list.prepend(node);
      makeShipSortable(node.querySelector('.ship-body'));
      recalcAll(); persist();
      const nm = node.querySelector('.ship-name');
      nm.focus(); selectAll(nm);
      return;
    }
  });

  function newCard(name) {
    const id = uid('c_');
    const inv = INV_MAP[(name || '').trim().toLowerCase()];
    const untracked = !inv; // free-text if not found in Inventory
    STATE.cardData[id] = {
      name: name || 'New supplement',
      amount: inv ? inv.amount : 0,
      dose: inv ? inv.dose : 0,
      bottleSize: inv ? inv.bottleSize : 0,
      loggedOn: inv ? inv.loggedOn : isoToday(),
      price: '', qty: 1, includeInMonthTotal: true,
      untracked,
    };
    return id;
  }
  function finishAdd(node) {
    recalcAll(); persist();
  }

  // ── Inventory picklist shown when "+ Item" is clicked ──────────────────
  let activePicker = null;
  function showItemPicker(anchor, onSelect, fromFilter = null) {
    closeItemPicker();

    // Names on the board right now — query the live DOM so deleted cards aren't included
    const onBoard = new Set(
      [...board.querySelectorAll('.card[data-id]')].map((el) => {
        const c = STATE.cardData[el.dataset.id];
        return c ? c.name.trim().toLowerCase() : '';
      }).filter(Boolean)
    );

    // Enrich each inventory entry using projected state after all board orders
    function countCoveredMonths(runOut) {
      if (!runOut) return 0;
      const today = SB.today();
      let count = 0;
      let m = new Date(today.getFullYear(), today.getMonth() + 1, 1);
      for (let i = 0; i < 12; i++) {
        // covered if runOut reaches at least 7 days into this calendar month
        const threshold = new Date(m.getFullYear(), m.getMonth(), 8);
        if (runOut >= threshold) { count++; m = new Date(m.getFullYear(), m.getMonth() + 1, 1); }
        else break;
      }
      return count;
    }

    const allItems = Object.values(INV_MAP).map((inv) => {
      const hasDose = inv.dose && inv.loggedOn;
      let tier = 'ok', meta = null, bars = 0;
      if (hasDose) {
        const key = inv.name.trim().toLowerCase();
        const proj = PROJ_MAP[key];
        let daysLeft, runOut;
        if (proj) {
          // already has orders on the board — show state after all of them
          daysLeft = proj.daysLeft;
          runOut = proj.runOut;
        } else {
          // not on the board yet — show current inventory state
          const r = SB.calc(inv);
          daysLeft = r.curDaysLeft;
          runOut = r.curRunOut;
        }
        const base = SB.tier(daysLeft, thr());
        tier = base !== 'ok' ? base : (daysLeft <= 45 ? 'reorder' : 'ok');
        meta = `${Math.round(daysLeft)}d · ${SB.fmtDateShort(runOut)}`;
        bars = countCoveredMonths(runOut);
      }
      const inList = onBoard.has(inv.name.trim().toLowerCase());
      return { name: inv.name, froms: inv.froms || [], tier, meta, bars, inList };
    }).sort((a, b) => a.name.localeCompare(b.name));

    // When called from a shipment, limit to items whose From matches the merchant name
    const items = fromFilter
      ? allItems.filter((it) => it.froms.some((f) => f.toLowerCase() === fromFilter.toLowerCase()))
      : allItems;

    const names = items.map((it) => it.name);

    const picker = document.createElement('div');
    picker.className = 'inv-picker';
    picker.innerHTML = `
      <input class="inv-picker-search" type="text" placeholder="Search or type a name…" autocomplete="off" />
      <ul class="inv-picker-list"></ul>`;

    const input = picker.querySelector('.inv-picker-search');
    const list = picker.querySelector('.inv-picker-list');

    function renderList(q) {
      const lq = q.toLowerCase();
      const matches = q ? items.filter((it) => it.name.toLowerCase().includes(lq)) : items;
      list.innerHTML = '';
      // "Use as typed" option when the query doesn't exactly match an Inventory item
      if (q && !names.some((n) => n.toLowerCase() === lq)) {
        const li = document.createElement('li');
        li.className = 'inv-picker-opt inv-picker-free';
        li.tabIndex = 0;
        li.textContent = `+ Add "${q}"`;
        li.dataset.name = q;
        list.appendChild(li);
      }
      matches.slice(0, 50).forEach(({ name, tier, meta, bars, inList }) => {
        const li = document.createElement('li');
        li.className = 'inv-picker-opt' + (tier !== 'ok' && !inList ? ` is-${tier}` : '') + (inList ? ' is-inlist' : '');
        li.tabIndex = 0;
        li.dataset.name = name;
        const left = document.createElement('span');
        left.className = 'ipm-left';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'ipm-name';
        nameSpan.textContent = name;
        left.appendChild(nameSpan);
        if (inList) {
          const tag = document.createElement('em');
          tag.className = 'ipm-inlist';
          tag.textContent = 'In List';
          left.appendChild(tag);
        }
        li.appendChild(left);
        if (meta) {
          const metaSpan = document.createElement('span');
          metaSpan.className = 'ipm-meta';
          metaSpan.textContent = meta;
          li.appendChild(metaSpan);
        }
        if (bars > 0) {
          const barsSpan = document.createElement('span');
          barsSpan.className = 'ipm-bars';
          for (let i = 0; i < Math.min(bars, 6); i++) {
            const b = document.createElement('span');
            b.className = 'ipm-bar';
            barsSpan.appendChild(b);
          }
          li.appendChild(barsSpan);
        }
        list.appendChild(li);
      });
      if (!matches.length && !q) {
        const li = document.createElement('li');
        li.className = 'inv-picker-empty';
        li.textContent = 'No Inventory connected — type a name';
        list.appendChild(li);
      }
    }

    function commit(name) {
      closeItemPicker();
      const id = newCard(name);
      onSelect(id);
    }

    input.addEventListener('input', () => renderList(input.value));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeItemPicker(); return; }
      if (e.key === 'Enter') {
        e.preventDefault(); // suppress keypress on the contenteditable card-name that focus lands on
        const first = list.querySelector('.inv-picker-opt');
        if (first) commit(first.dataset.name);
        else if (input.value.trim()) commit(input.value.trim());
      }
      if (e.key === 'ArrowDown') { e.preventDefault(); list.querySelector('.inv-picker-opt')?.focus(); }
    });
    list.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.target.closest('.inv-picker-opt')?.click(); }
      if (e.key === 'ArrowDown') { e.preventDefault(); e.target.nextElementSibling?.focus(); }
      if (e.key === 'ArrowUp') { e.preventDefault(); const p = e.target.previousElementSibling; if (p) p.focus(); else input.focus(); }
      if (e.key === 'Escape') closeItemPicker();
    });
    list.addEventListener('click', (e) => {
      const opt = e.target.closest('.inv-picker-opt');
      if (opt) commit(opt.dataset.name);
    });

    // Portal to body with position:absolute in document coords so overflow:hidden
    // on .shipment doesn't clip it, and the page can scroll to reveal the full list.
    const rect = anchor.getBoundingClientRect();
    picker.style.position = 'absolute';
    picker.style.left = (rect.left + window.scrollX) + 'px';
    picker.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    picker.style.width = Math.max(350, rect.width) + 'px';
    document.body.appendChild(picker);
    activePicker = picker;
    renderList('');
    input.focus();

    setTimeout(() => {
      document.addEventListener('click', outsideClick, true);
    }, 0);
    function outsideClick(e) {
      if (!picker.contains(e.target) && e.target !== anchor) closeItemPicker();
    }
    picker._outsideClick = outsideClick;
  }

  function closeItemPicker() {
    if (!activePicker) return;
    document.removeEventListener('click', activePicker._outsideClick, true);
    activePicker.remove();
    activePicker = null;
  }
  function selectAll(node) {
    const r = document.createRange();
    r.selectNodeContents(node);
    const s = window.getSelection();
    s.removeAllRanges(); s.addRange(r);
  }

  board.addEventListener('blur', (e) => {
    if (e.target.matches('[contenteditable]')) persist();
  }, true);
  board.addEventListener('paste', (e) => {
    if (e.target.matches('[contenteditable]')) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    }
  });
  board.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.matches('[contenteditable]')) {
      e.preventDefault(); e.target.blur();
    }
  });

  // ── right-click context menus (shipment + card) ──
  let activeCtxMenu = null;
  function closeCtxMenu() {
    if (activeCtxMenu) { activeCtxMenu.remove(); activeCtxMenu = null; }
  }

  function buildCtxMenu(e, buildFn) {
    const menu = document.createElement('div');
    menu.className = 'ship-ctx-menu';
    function ctxItem(label, disabled, action) {
      const d = document.createElement('div');
      d.className = 'ship-ctx-item' + (disabled ? ' ctx-disabled' : '');
      d.textContent = label;
      if (!disabled) d.addEventListener('mousedown', (ev) => { ev.preventDefault(); });
      if (!disabled) d.addEventListener('click', () => { closeCtxMenu(); action(); });
      return d;
    }
    function ctxDivider() {
      const d = document.createElement('div'); d.className = 'ship-ctx-divider'; return d;
    }
    buildFn(menu, ctxItem, ctxDivider);
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    document.body.appendChild(menu);
    activeCtxMenu = menu;
    requestAnimationFrame(() => {
      const r = menu.getBoundingClientRect();
      if (r.right > window.innerWidth - 8) menu.style.left = (e.clientX - r.width) + 'px';
      if (r.bottom > window.innerHeight - 8) menu.style.top = (e.clientY - r.height) + 'px';
    });
  }

  function findOrCreateShipInMonth(monthEl, shipName) {
    const existing = [...monthEl.querySelectorAll('.shipment')].find(s =>
      ((STATE.shipmentData[s.dataset.id] || {}).name || '').trim().toLowerCase() === shipName.trim().toLowerCase()
    );
    if (existing) return existing.querySelector('.ship-body');
    const sid = uid('s_');
    STATE.shipmentData[sid] = { name: shipName, notes: '' };
    const newEl = el(shipmentHTML({ type: 'shipment', id: sid, cards: [] }));
    monthEl.querySelector('.month-list').prepend(newEl);
    makeShipSortable(newEl.querySelector('.ship-body'));
    return newEl.querySelector('.ship-body');
  }

  board.addEventListener('contextmenu', (e) => {
    // Card menu takes priority over shipment menu
    const cardEl = e.target.closest('.card[data-id]');
    if (cardEl) {
      e.preventDefault();
      closeCtxMenu();
      const container = cardEl.parentElement;
      const monthEl = cardEl.closest('.month');
      const allMonths = [...board.querySelectorAll('.month')];
      const monthIdx = allMonths.indexOf(monthEl);
      const siblings = [...container.children];
      const myIdx = siblings.indexOf(cardEl);
      const isFirst = myIdx === 0;
      const isLast = myIdx === siblings.length - 1;
      const hasPrev = monthIdx > 0;
      const hasNext = monthIdx < allMonths.length - 1;

      function cardDest(targetMonthEl) {
        if (container.classList.contains('ship-body')) {
          const shipEl = container.closest('.shipment');
          const shipName = (STATE.shipmentData[shipEl.dataset.id] || {}).name || '';
          return findOrCreateShipInMonth(targetMonthEl, shipName);
        }
        return targetMonthEl.querySelector('.month-list');
      }

      buildCtxMenu(e, (menu, ctxItem, ctxDivider) => {
        menu.appendChild(ctxItem('Move to Top', isFirst, () => { container.prepend(cardEl); recalcAll(); persist(); }));
        menu.appendChild(ctxItem('Move to End', isLast, () => { container.append(cardEl); recalcAll(); persist(); }));
        menu.appendChild(ctxDivider());
        menu.appendChild(ctxItem('Move to Next Month', !hasNext, () => {
          cardDest(allMonths[monthIdx + 1]).prepend(cardEl); recalcAll(); persist();
        }));
        menu.appendChild(ctxItem('Move to Previous Month', !hasPrev, () => {
          cardDest(allMonths[monthIdx - 1]).prepend(cardEl); recalcAll(); persist();
        }));
        menu.appendChild(ctxDivider());
        menu.appendChild(ctxItem('Copy to Next Month', !hasNext, () => {
          const newId = uid('c_');
          STATE.cardData[newId] = Object.assign({}, STATE.cardData[cardEl.dataset.id] || {});
          const newEl = el(cardHTML(newId));
          cardDest(allMonths[monthIdx + 1]).prepend(newEl);
          recalcAll(); persist();
        }));
      });
      return;
    }

    const shipEl = e.target.closest('.shipment');
    if (!shipEl) return;
    e.preventDefault();
    closeCtxMenu();

    const monthEl = shipEl.closest('.month');
    const list = monthEl.querySelector('.month-list');
    const allMonths = [...board.querySelectorAll('.month')];
    const monthIdx = allMonths.indexOf(monthEl);
    const listChildren = [...list.children];
    const myIdx = listChildren.indexOf(shipEl);
    const isFirst = myIdx === 0;
    const firstLocked = listChildren.find((n) => n.classList.contains('shipment') && (STATE.shipmentData[n.dataset.id] || {}).stage);
    const unlockedEnd = firstLocked ? listChildren.indexOf(firstLocked) - 1 : listChildren.length - 1;
    const isLast = myIdx === unlockedEnd;
    const hasPrev = monthIdx > 0;
    const hasNext = monthIdx < allMonths.length - 1;

    buildCtxMenu(e, (menu, ctxItem, ctxDivider) => {
      menu.appendChild(ctxItem('Move to Top', isFirst, () => {
        list.prepend(shipEl); recalcAll(); persist();
      }));
      menu.appendChild(ctxItem('Move to End', isLast, () => {
        if (firstLocked) list.insertBefore(shipEl, firstLocked);
        else list.append(shipEl);
        recalcAll(); persist();
      }));
      menu.appendChild(ctxDivider());
      menu.appendChild(ctxItem('Move to Next Month', !hasNext, () => {
        allMonths[monthIdx + 1].querySelector('.month-list').prepend(shipEl);
        recalcAll(); persist();
      }));
      menu.appendChild(ctxItem('Move to Previous Month', !hasPrev, () => {
        allMonths[monthIdx - 1].querySelector('.month-list').prepend(shipEl);
        recalcAll(); persist();
      }));
      menu.appendChild(ctxDivider());
      menu.appendChild(ctxItem('Copy to Next Month', !hasNext, () => {
        const sid = uid('s_');
        STATE.shipmentData[sid] = Object.assign({}, STATE.shipmentData[shipEl.dataset.id] || {});
        const oldCardIds = [...shipEl.querySelectorAll(':scope .ship-body > .card[data-id]')].map(c => c.dataset.id);
        const newCards = oldCardIds.map(oldId => {
          const newId = uid('c_');
          STATE.cardData[newId] = Object.assign({}, STATE.cardData[oldId] || {});
          return newId;
        });
        const newEl = el(shipmentHTML({ type: 'shipment', id: sid, cards: newCards }));
        allMonths[monthIdx + 1].querySelector('.month-list').prepend(newEl);
        makeShipSortable(newEl.querySelector('.ship-body'));
        recalcAll(); persist();
      }));
    });
  });

  document.addEventListener('click', closeCtxMenu);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCtxMenu(); });

  // ── public API (lazy init from the tab switcher) ──
  let booted = false;
  window.SupplementBoard = {
    async init() {
      if (booted) return;
      booted = true;
      await load();
      render();
      const asof = document.getElementById('board-asof');
      if (asof) asof.textContent = SB.fmtDate(SB.today());

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(recalcAll);
      }
      // keep the live countdown honest across midnight
      setInterval(recalcAll, 60 * 60 * 1000);
      // notify other modules (e.g. YNAB) that the board is ready
      document.dispatchEvent(new CustomEvent('boardReady'));
    },
    reset() {
      localStorage.removeItem(KEY);
      location.reload();
    },
    // apply YNAB-derived "Spent" values per month name (e.g. { Jun: 480.50 })
    applyYnabSpent(spentByMonth) {
      if (!board) return;
      Object.assign(SPENT_BY_MONTH, spentByMonth);
      board.querySelectorAll('.month').forEach((monthEl) => {
        const name = monthEl.querySelector('.mname').textContent.trim();
        if (!(name in spentByMonth)) return;
        const el = monthEl.querySelector('.spentv');
        if (el) el.textContent = SB.fmtMoney(spentByMonth[name]);
      });
      recalcAll();
      persist();
    },
    // merge Inventory (by supplement name) into the cards so run-out computes.
    // invMap: { "<name lowercased>": { amount, bottleSize, dose, loggedOn(ISO) } }
    // These are exactly calc()'s inputs, so the board's native run-out math runs.
    // Not persisted — Orders stays staging-only.
    applyInventory(invMap, preOrderMap) {
      if (!STATE || !STATE.cardData) return 0;
      INV_MAP = invMap; // keep for the add-item picker
      let matched = 0;
      Object.values(STATE.cardData).forEach((c) => {
        const inv = invMap[String(c.name || '').trim().toLowerCase()];
        if (inv && inv.dose > 0 && inv.loggedOn) {
          c.amount = inv.amount;
          c.bottleSize = inv.bottleSize;
          c.dose = inv.dose;
          c.loggedOn = inv.loggedOn;
          delete c._preOrderAmount; // will be re-set below for locked shipment cards
          matched++;
        }
      });
      // Set pre-order amounts for cards inside locked shipments
      if (preOrderMap) {
        board.querySelectorAll('.shipment.is-locked').forEach((shipEl) => {
          const contrib = preOrderMap[shipEl.dataset.id];
          if (!contrib) return;
          shipEl.querySelectorAll('.ship-body > .card').forEach((cardEl) => {
            const c = STATE.cardData[cardEl.dataset.id];
            if (!c) return;
            const key = (c.name || '').trim().toLowerCase();
            if (contrib[key] != null) c._preOrderAmount = contrib[key];
          });
        });
      }
      recalcAll();
      return matched;
    },
  };

  const resetBtn = document.getElementById('board-reset');
  if (resetBtn) resetBtn.addEventListener('click', () => window.SupplementBoard.reset());
})();
</script>

<!-- ── YNAB: Personal Access Token + category-group sum for "Spent" ──
     The user pastes their YNAB PAT once; it's cached in localStorage.
     On sync (manual or on board open), we fetch each visible month from
     /budgets/last-used/months/{yyyy-mm-01}, sum activity for all categories
     in the "Health" category group (milliunits ÷ 1000, negated since
     spending is stored as negative), and write it into the Spent input.
     The YNAB API is CORS-enabled so this runs entirely in the browser. -->
<script>
(function () {
  const YNAB_BASE = 'https://api.ynab.com/v1';
  const TOKEN_KEY = 'np_ynab_token';
  const BUDGET_KEY = 'np_ynab_budget_id';
  const GROUP_KEY  = 'np_ynab_group';
  const MON3 = { Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
                 Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12' };

  function getGroupName() { try { return localStorage.getItem(GROUP_KEY) || 'Health'; } catch { return 'Health'; } }

  const connectBtn = document.getElementById('update-ynab');

  function setStatus(text, cls) {
    if (cls === 'err') console.error('YNAB:', text);
  }
  function getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch { return null; } }
  function getBudgetId() { try { return localStorage.getItem(BUDGET_KEY); } catch { return null; } }

  async function ynabFetch(path, token) {
    const r = await fetch(YNAB_BASE + path, {
      headers: { Authorization: 'Bearer ' + token },
    });
    if (r.status === 401) throw new Error('invalid-token');
    if (!r.ok) throw new Error('YNAB API ' + r.status);
    return r.json();
  }

  async function sync(token) {
    setStatus('Syncing…');
    // resolve budget ID (cached to avoid an extra round-trip)
    let budgetId = getBudgetId();
    if (!budgetId) {
      const data = await ynabFetch('/budgets/last-used', token);
      budgetId = data.data.budget.id;
      try { localStorage.setItem(BUDGET_KEY, budgetId); } catch {}
    }

    // collect visible months from the board DOM
    const board = document.getElementById('board');
    if (!board) { setStatus('Board not loaded', 'err'); return; }
    const monthEls = [...board.querySelectorAll('.month')];
    const spentByMonth = {};

    for (const monthEl of monthEls) {
      const name = monthEl.querySelector('.mname')?.textContent.trim();
      const year = parseInt(monthEl.querySelector('.msub')?.textContent.trim(), 10);
      const mm = MON3[name];
      if (!mm || !year) continue;

      const ynabMonth = `${year}-${mm}-01`;
      let cats = [];
      try {
        const data = await ynabFetch(`/budgets/${budgetId}/months/${ynabMonth}`, token);
        cats = data.data.month.categories || [];
      } catch (e) {
        if (e.message.includes('404')) { spentByMonth[name] = 0; continue; } // month not in YNAB yet
        throw e; // re-throw real errors (401, network, etc.)
      }
      const groupName = getGroupName();
      const allGroups = [...new Set(cats.map(c => c.category_group_name).filter(Boolean))];
      console.log(`YNAB ${ynabMonth}: ${cats.length} categories across groups:`, allGroups, `— filtering by "${groupName}"`);
      const activityMilliunits = cats
        .filter(c => c.category_group_name === groupName && !c.deleted)
        .reduce((s, c) => s + c.activity, 0);

      // YNAB spending = negative activity; negate to get positive "spent"
      spentByMonth[name] = Math.round(Math.abs(activityMilliunits)) / 1000;
    }

    if (window.SupplementBoard?.applyYnabSpent) {
      window.SupplementBoard.applyYnabSpent(spentByMonth);
    }

    setStatus('synced', 'ok');
    try { localStorage.setItem('np_ynab_last_sync', new Date().toISOString()); } catch {}
    refreshLabels();
  }

  async function runSync(token) {
    token = token || getToken();
    if (!token) return;
    try {
      await sync(token);
    } catch (e) {
      if (e.message === 'invalid-token') {
        setStatus('Invalid token', 'err');
        try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(BUDGET_KEY); } catch {}
        refreshLabels();
      } else {
        setStatus('Sync failed: ' + e.message, 'err');
      }
    }
  }

  function promptForToken() {
    const t = window.prompt(
      'Paste your YNAB Personal Access Token.\n\n' +
      'Find it at: app.ynab.com → Account Settings → Developer Settings → New Token',
      ''
    );
    if (!t || !t.trim()) return;
    const token = t.trim();

    const g = window.prompt(
      'Which YNAB category group tracks health spending?\n\n' +
      'Must match the group name exactly as it appears in YNAB.\n' +
      '(Open the browser console after saving to see all group names returned by the API.)',
      getGroupName()
    );
    if (g == null) return; // cancelled
    try {
      localStorage.setItem(TOKEN_KEY, token);
      localStorage.removeItem(BUDGET_KEY);
      if (g.trim()) localStorage.setItem(GROUP_KEY, g.trim());
    } catch {}
    refreshLabels();
    runSync(token);
  }

  function refreshLabels() {}

  if (connectBtn) connectBtn.addEventListener('click', promptForToken);

  // auto-sync when the board tab is opened (if token exists and board is ready)
  document.addEventListener('boardReady', () => {
    if (getToken()) runSync();
  });

  refreshLabels();
})();
</script>

<!-- ── Inventory: Google OAuth (GIS) + Drive Picker + Sheets read ──
     The user picks their Google Spreadsheet; the file id is cached locally.
     We read the "Items" tab (static metadata: name, bottle size, dose, suppliers)
     and combine with inventory amounts fetched from Turso /api/inventory.
     Client ID + API key are public client-side values; restrict the API key by
     HTTP referrer in the Google Cloud console. -->
<script>
(function () {
  const GOOGLE = {
    clientId: '590352770305-b0agcr5v4c6e38taq7271gop7lub1q7u.apps.googleusercontent.com',
    apiKey: 'AIzaSyBTCb_yIVLNUcx1M3UlOeIwQQWmH2TYT2E',
    scopes: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
  };
  const FILE_KEY = 'np_inventory_file';
  const selectBtn = document.getElementById('select-inventory');

  function setStatus(text, cls) {
    if (cls === 'err') console.error('Inventory:', text);
  }
  function getCachedFile() {
    try { return JSON.parse(localStorage.getItem(FILE_KEY)); } catch (e) { return null; }
  }
  function setCachedFile(f) { try { localStorage.setItem(FILE_KEY, JSON.stringify(f)); } catch (e) {} }

  // wait for the async-loaded Google libraries
  function waitFor(test, ms = 8000) {
    return new Promise((resolve, reject) => {
      const t0 = Date.now();
      (function tick() {
        if (test()) return resolve();
        if (Date.now() - t0 > ms) return reject(new Error('Google libraries failed to load'));
        setTimeout(tick, 100);
      })();
    });
  }

  const HINT_KEY  = 'np_google_hint';
  const TOKEN_KEY = 'np_google_token';
  function getHint() { try { return localStorage.getItem(HINT_KEY) || ''; } catch { return ''; } }
  function setHint(h) { try { if (h) localStorage.setItem(HINT_KEY, h); } catch {} }
  function getCachedToken() {
    try {
      const t = JSON.parse(localStorage.getItem(TOKEN_KEY));
      // 5-min safety buffer so we don't use a token right before it expires
      return (t && t.token && t.exp > Date.now() + 5 * 60 * 1000) ? t.token : null;
    } catch { return null; }
  }
  function setCachedToken(token) {
    try {
      // Google access tokens last 1 hour; cache for 55 min
      localStorage.setItem(TOKEN_KEY, JSON.stringify({ token, exp: Date.now() + 55 * 60 * 1000 }));
    } catch {}
  }

  let tokenClient = null;
  // silent=true: return cached token if available; skip popup entirely
  // silent=false: full OAuth flow (may show account picker)
  // hint: pre-selects the last-used Google account so the user doesn't have to pick every time
  function getToken(silent = false) {
    // Silent path: return cached token or fail immediately — no popup ever
    if (silent) {
      const cached = getCachedToken();
      return cached ? Promise.resolve(cached) : Promise.reject(new Error('No token'));
    }
    // Interactive path: full OAuth flow (requires user gesture)
    return new Promise((resolve, reject) => {
      const hint = getHint();
      if (!tokenClient || tokenClient._hint !== hint) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE.clientId, scope: GOOGLE.scopes, callback: () => {},
          ...(hint ? { hint } : {}),
        });
        tokenClient._hint = hint;
      }
      tokenClient.callback = async (resp) => {
        if (resp && resp.access_token) {
          setCachedToken(resp.access_token);
          if (!hint) {
            fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: 'Bearer ' + resp.access_token },
            }).then(r => r.ok ? r.json() : null).then(u => { if (u && u.email) setHint(u.email); }).catch(() => {});
          }
          resolve(resp.access_token);
        } else {
          reject(new Error(resp && resp.error || 'No token'));
        }
      };
      tokenClient.error_callback = (err) => reject(new Error(err && err.type || 'OAuth error'));
      // prompt:'' lets GIS use a background iframe when possible; shows picker only if needed
      tokenClient.requestAccessToken({ prompt: '' });
    });
  }

  function pickFile(token) {
    return new Promise((resolve, reject) => {
      gapi.load('picker', { callback: () => {
        try {
          const view = new google.picker.DocsView(google.picker.ViewId.SPREADSHEETS)
            .setSelectFolderEnabled(false).setMode(google.picker.DocsViewMode.LIST);
          const picker = new google.picker.PickerBuilder()
            .setOAuthToken(token)
            .setDeveloperKey(GOOGLE.apiKey)
            .addView(view)
            .setTitle('Choose your Inventory spreadsheet')
            .setCallback((data) => {
              if (data.action === google.picker.Action.PICKED) {
                const d = data.docs[0]; resolve({ id: d.id, name: d.name });
              } else if (data.action === google.picker.Action.CANCEL) { resolve(null); }
            })
            .build();
          picker.setVisible(true);
        } catch (e) { reject(e); }
      } });
    });
  }

  async function sheetsGet(token, path) {
    const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + path, {
      headers: { Authorization: 'Bearer ' + token },
    });
    if (!r.ok) throw new Error('Sheets API ' + r.status + (r.status === 403 ? ' (sheet not shared / scope denied)' : ''));
    return r.json();
  }

  async function postToTurso(row) {
    const r = await fetch('/api/inventory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(row),
    });
    if (!r.ok) throw new Error('POST /api/inventory ' + r.status);
    return r.json();
  }

  async function patchTurso(id, body) {
    const r = await fetch('/api/inventory?id=' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error('PATCH /api/inventory?id=' + id + ' ' + r.status);
    return r.json();
  }

  async function writeShipment({ orderId, cards, newStage, oldStage }) {
    if (!newStage) return;
    const today = new Date().toISOString().slice(0, 10);
    try {
      if (newStage === 'received') {
        const r = await fetch('/api/inventory?order_id=' + encodeURIComponent(orderId));
        const existing = r.ok ? await r.json() : [];
        const orderedRows = existing.filter((row) => (row.type || '').toLowerCase() === 'ordered');
        if (orderedRows.length) {
          await Promise.all(orderedRows.map((row) => patchTurso(row.id, { type: 'Received' })));
        } else {
          const eligible = cards.filter((c) => c.name && c.qty > 0);
          await Promise.all(eligible.map((c) => postToTurso({
            item: c.name, amount: (c.bottleSize || 0) * (c.qty || 0),
            type: 'Received', logged_on: today, order_id: orderId,
          })));
        }
      } else if (oldStage == null) {
        const eligible = cards.filter((c) => c.name && c.qty > 0);
        await Promise.all(eligible.map((c) => postToTurso({
          item: c.name, amount: (c.bottleSize || 0) * (c.qty || 0),
          type: 'Ordered', logged_on: today, order_id: orderId,
        })));
      }
      console.log('[Inventory] Turso write done orderId=' + orderId + ' newStage=' + newStage);
    } catch (e) {
      console.error('[Inventory] Turso write failed:', e.message);
    }
  }

  // header row = an "Item" cell plus an inventory column
  function findHeader(rows) {
    return rows.findIndex((r) => {
      if (!r) return false;
      const low = r.map((c) => String(c == null ? '' : c).trim().toLowerCase());
      return low.indexOf('item') >= 0 && (low.indexOf('daily dose') >= 0 || low.indexOf('run out') >= 0 || low.indexOf('amount') >= 0);
    });
  }

  // Used only for the one-time migration from the old "Inventory" sheet tab
  async function readOldInventoryTab(token, fileId) {
    const meta = await sheetsGet(token, fileId + '?fields=sheets.properties(title)');
    const props = (meta.sheets || []).map((s) => s.properties);
    const found = props.find((p) => p.title.trim().toLowerCase() === 'inventory')
               || props.find((p) => /inventory/i.test(p.title));
    if (!found) throw new Error('No "Inventory" tab found. Tabs: ' + props.map((p) => p.title).join(', '));
    const vals = await sheetsGet(token, fileId + '/values/' + encodeURIComponent(found.title) + '?majorDimension=ROWS');
    const rows = vals.values || [];
    const hi = findHeader(rows);
    if (hi < 0) throw new Error('Inventory tab has no recognizable header row');
    return { title: found.title, rows, hi };
  }

  // Items tab: static metadata (name, bottle size, dose, suppliers)
  function findItemHeader(rows) {
    return rows.findIndex((r) => {
      if (!r) return false;
      const low = r.map((c) => String(c == null ? '' : c).trim().toLowerCase());
      return low.indexOf('item') >= 0
        && (low.indexOf('bottle size') >= 0 || low.indexOf('daily dose') >= 0
          || low.indexOf('annual sale') >= 0 || low.indexOf('anyday') >= 0);
    });
  }

  async function readItemSheet(token, fileId) {
    const meta = await sheetsGet(token, fileId + '?fields=sheets.properties(title)');
    const props = (meta.sheets || []).map((s) => s.properties);
    const found = props.find((p) => p.title.trim().toLowerCase() === 'items')
               || props.find((p) => /^items$/i.test(p.title));
    if (!found) throw new Error('No "Items" tab found. Tabs: ' + props.map((p) => p.title).join(', '));
    const vals = await sheetsGet(token, fileId + '/values/' + encodeURIComponent(found.title) + '?majorDimension=ROWS');
    const rows = vals.values || [];
    const hi = findItemHeader(rows);
    if (hi < 0) throw new Error('The "Items" tab has no recognizable header row');
    return { rows, hi };
  }

  function buildItemMap(rows, hi) {
    const norm = (s) => String(s == null ? '' : s).trim();
    const header = rows[hi].map((c) => norm(c).toLowerCase());
    const ci = (n) => header.indexOf(n.toLowerCase());
    const idx = {
      item: ci('item'), bottle: ci('bottle size'), dose: ci('daily dose'),
      annual: ci('annual sale'), offcycle: ci('off-cycle sale'), anyday: ci('anyday'),
    };
    const map = {};
    for (let i = hi + 1; i < rows.length; i++) {
      const r = rows[i] || [];
      const name = norm(r[idx.item]);
      if (!name || name.toLowerCase() === 'summary') continue;
      const key = name.toLowerCase();
      map[key] = {
        name,
        bottleSize: idx.bottle >= 0 ? (Number(norm(r[idx.bottle])) || 0) : 0,
        dose: idx.dose >= 0 ? (Number(norm(r[idx.dose])) || 0) : 0,
        annualSale: idx.annual >= 0 ? norm(r[idx.annual]) : '',
        offCycleSale: idx.offcycle >= 0 ? norm(r[idx.offcycle]) : '',
        anyday: idx.anyday >= 0 ? norm(r[idx.anyday]) : '',
      };
    }
    return map;
  }

  function computeOnHand(invLogRows) {
    const isAdditive = (t) => { const l = (t || '').toLowerCase(); return l === 'ordered' || l === 'received'; };
    const groups = {};
    for (const r of invLogRows) {
      const key = (r.item || '').trim().toLowerCase();
      if (!key) continue;
      if (!groups[key]) groups[key] = { name: r.item, recs: [] };
      groups[key].recs.push({
        id: Number(r.id) || 0,
        type: r.type || 'Reset', amount: Number(r.amount) || 0,
        loggedDate: r.logged_on ? new Date(r.logged_on + 'T00:00:00') : null,
      });
    }
    const amountsMap = {};
    for (const [key, { recs }] of Object.entries(groups)) {
      const reconciles = recs.filter((r) => r.loggedDate && !isAdditive(r.type))
                             .sort((a, b) => b.loggedDate - a.loggedDate || b.id - a.id);
      if (!reconciles.length) continue;
      const rec = reconciles[0];
      const adjSum = recs.filter((r) => (r.type || '').toLowerCase() === 'received' && r.id > rec.id)
                         .reduce((s, r) => s + r.amount, 0);
      const d = rec.loggedDate;
      amountsMap[key] = {
        amount: rec.amount + adjSum,
        loggedOn: d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'),
      };
    }
    return amountsMap;
  }

  function mergeItemAndAmounts(itemMap, amountsMap) {
    const merged = {};
    for (const [key, item] of Object.entries(itemMap)) {
      const amt = amountsMap[key] || {};
      merged[key] = {
        name: item.name, bottleSize: item.bottleSize, dose: item.dose,
        amount: amt.amount || 0, loggedOn: amt.loggedOn || null,
        froms: [item.annualSale, item.offCycleSale, item.anyday].filter(Boolean),
        annualSale: item.annualSale, offCycleSale: item.offCycleSale, anyday: item.anyday,
      };
    }
    return merged;
  }

  function parseSheetDate(s) {
    s = String(s == null ? '' : s).trim();
    const p = s.split('/');
    if (p.length < 2) return null;
    const mo = parseInt(p[0], 10), d = parseInt(p[1], 10);
    if (isNaN(mo) || isNaN(d)) return null;
    let y = p[2] != null ? parseInt(p[2], 10) : NaN;
    if (isNaN(y)) y = new Date().getFullYear();
    else if (y < 100) y += 2000;
    return new Date(y, mo - 1, d);
  }

  function toISO(s) {
    const d = parseSheetDate(s);
    if (!d) return null;
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // Builds { orderId: { itemKey: amountBeforeThisOrder } } from Turso inventory_log rows.
  // Passed to applyInventory so locked shipment cards can show their pre-order run-out.
  function buildPreOrderMapFromLog(invLogRows) {
    const isAdditive = (t) => { const l = (t || '').toLowerCase(); return l === 'ordered' || l === 'received'; };
    const recs = invLogRows
      .map((r) => ({
        itemKey: (r.item || '').trim().toLowerCase(),
        type: r.type || 'Reset',
        loggedDate: r.logged_on ? new Date(r.logged_on + 'T00:00:00') : null,
        amount: Number(r.amount) || 0,
        orderId: r.order_id || null,
      }))
      .filter((r) => r.itemKey);
    const orderIds = [...new Set(recs.filter((r) => r.orderId && isAdditive(r.type)).map((r) => r.orderId))];
    const preOrderMap = {};
    orderIds.forEach((orderId) => {
      const orderRecs = recs.filter((r) => r.orderId === orderId && isAdditive(r.type));
      if (!orderRecs.length) return;
      const orderDate = orderRecs[0].loggedDate;
      if (!orderDate) return;
      preOrderMap[orderId] = {};
      [...new Set(orderRecs.map((r) => r.itemKey))].forEach((itemKey) => {
        const itemRecs = recs.filter((r) => r.itemKey === itemKey);
        const resets = itemRecs
          .filter((r) => !isAdditive(r.type) && r.loggedDate && r.loggedDate <= orderDate)
          .sort((a, b) => b.loggedDate - a.loggedDate);
        if (!resets.length) return;
        const base = resets[0];
        const adj = itemRecs
          .filter((r) => (r.type || '').toLowerCase() === 'received' && r.id > base.id
                      && r.loggedDate && r.loggedDate < orderDate)
          .reduce((s, r) => s + r.amount, 0);
        preOrderMap[orderId][itemKey] = base.amount + adj;
      });
    });
    return preOrderMap;
  }

  async function migrateFromSheet() {
    const file = getCachedFile();
    if (!file) throw new Error('Select a spreadsheet first (Settings → Select Inventory Sheet)');
    let token = getCachedToken();
    if (!token) token = await getToken(false);
    const { rows, hi } = await readOldInventoryTab(token, file.id);
    const norm = (s) => String(s == null ? '' : s).trim();
    const header = rows[hi].map((c) => norm(c).toLowerCase());
    const ci = (n) => header.indexOf(n.toLowerCase());
    const idx = { item: ci('item'), amount: ci('amount'), type: ci('type'), logged: ci('logged on'), orderid: ci('order id') };
    const dataRows = [];
    for (let i = hi + 1; i < rows.length; i++) {
      const r = rows[i] || [];
      const name = norm(r[idx.item]);
      if (!name || name.toLowerCase() === 'summary') continue;
      const loggedDate = idx.logged >= 0 ? parseSheetDate(norm(r[idx.logged])) : null;
      if (!loggedDate) continue;
      const d = loggedDate;
      const logged_on = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      dataRows.push({
        item: name,
        amount: Number(norm(r[idx.amount])) || 0,
        type: (idx.type >= 0 ? norm(r[idx.type]) : '') || 'Reset',
        logged_on,
        order_id: idx.orderid >= 0 ? (norm(r[idx.orderid]) || null) : null,
      });
    }
    let imported = 0;
    for (const row of dataRows) {
      const res = await postToTurso(row);
      if (res && res.ok) imported++;
    }
    return { total: dataRows.length, imported };
  }

  // silent=true: called automatically on load — no popups, fails quietly
  // forcePick=true: always show the Drive Picker
  async function run(forcePick, silent = false) {
    if (!window.SupplementBoard || !window.SupplementBoard.applyInventory) {
      if (!silent) setStatus('Open the board first', 'err');
      return;
    }
    if (!silent) setStatus('Connecting…');
    try {
      await waitFor(() => window.google && google.accounts && google.accounts.oauth2 && window.gapi);
      const token = await getToken(silent);
      let file = getCachedFile();
      if (forcePick || !file) {
        if (silent) return; // never show Picker automatically
        file = await pickFile(token);
        if (!file) { refreshLabels(); return; }
        setCachedFile(file);
      }
      if (!silent) setStatus('Reading “' + file.name + '”…');
      const { rows, hi } = await readItemSheet(token, file.id);
      const itemMap = buildItemMap(rows, hi);

      let invLogRows = [];
      try { const r = await fetch('/api/inventory'); if (r.ok) invLogRows = await r.json(); } catch {}

      const amountsMap = computeOnHand(invLogRows);
      const invMap = mergeItemAndAmounts(itemMap, amountsMap);
      const preOrderMap = buildPreOrderMapFromLog(invLogRows);
      const matched = window.SupplementBoard.applyInventory(invMap, preOrderMap);
      window._INV_ITEM_MAP = itemMap;
      window._INV_LOG_ROWS = invLogRows;
      setStatus('Items: ' + file.name + ' · ' + matched + ' matched', 'ok');
      refreshLabels();
    } catch (e) {
      const silentErrors = ['interaction_required', 'consent_required', 'access_denied',
                            'immediate_failed', 'popup_closed', 'popup_failed_to_open'];
      const isSilentable = silentErrors.some(s => e.message.includes(s))
        || e.message === 'No token'
        || /Sheets API [45]\d\d/.test(e.message); // 4xx/5xx from Sheets = stale token, need manual re-auth
      if (silent && isSilentable) {
        return; // needs UI interaction — user can click Refresh Inventory manually
      }
      console.error('Inventory connect failed:', e);
      if (!silent) setStatus('Connect failed: ' + e.message, 'err');
    }
  }

  function refreshLabels() {}

  if (selectBtn) selectBtn.addEventListener('click', () => run(true));

  const refreshInvBtn = document.getElementById('refresh-inv-btn');
  if (refreshInvBtn) refreshInvBtn.addEventListener('click', () => run(false));

  // auto-refresh Items silently on board load — no popups, no error display
  document.addEventListener('boardReady', () => {
    if (getCachedFile()) run(false, true).then(() => {
      document.dispatchEvent(new CustomEvent('inventoryDataReady'));
    }).catch(() => {});
  });

  // Exposed so the board's set-stage handler and Inventory tab can use these
  window.InventoryWriter = { writeShipment, migrateFromSheet, run };
})();
</script>

<script>
/* ── Inventory tab ── */
(function () {
  const body  = document.getElementById('inv-body');
  const refreshBtn = document.getElementById('inv-refresh-btn');

  function isoToday() {
    return new Date().toISOString().slice(0, 10);
  }

  function computeOnHand(invLogRows) {
    const isAdditive = (t) => { const l = (t || '').toLowerCase(); return l === 'ordered' || l === 'received'; };
    const groups = {};
    for (const r of invLogRows) {
      const key = (r.item || '').trim().toLowerCase();
      if (!key) continue;
      if (!groups[key]) groups[key] = { name: r.item, recs: [] };
      groups[key].recs.push({
        id: Number(r.id) || 0,
        type: r.type || 'Reset', amount: Number(r.amount) || 0,
        loggedDate: r.logged_on ? new Date(r.logged_on + 'T00:00:00') : null,
      });
    }
    const result = {};
    for (const [key, { name, recs }] of Object.entries(groups)) {
      const reconciles = recs.filter((r) => r.loggedDate && !isAdditive(r.type))
                             .sort((a, b) => b.loggedDate - a.loggedDate || b.id - a.id);
      if (!reconciles.length) continue;
      const rec = reconciles[0];
      const adjSum = recs.filter((r) => (r.type || '').toLowerCase() === 'received' && r.id > rec.id)
                         .reduce((s, r) => s + r.amount, 0);
      result[key] = { name, amount: rec.amount + adjSum, loggedOn: rec.loggedDate.toISOString().slice(0, 10) };
    }
    return result;
  }

  function estimateRunOut(amount, dose, loggedOn) {
    if (!amount || !dose || !loggedOn) return null;
    const base    = new Date(loggedOn + 'T00:00:00');
    const today   = new Date(isoToday() + 'T00:00:00');
    const elapsed = Math.floor((today - base) / 86400000);
    const remaining = amount / dose - elapsed;
    if (remaining <= 0) return { text: 'EMPTY', cls: 'inv-empty', date: null };
    const runOut = new Date(today);
    runOut.setDate(runOut.getDate() + Math.floor(remaining));
    const label = SB.fmtDateShort(runOut) + ' (' + Math.floor(remaining) + 'd)';
    return { text: label, cls: remaining < 30 ? 'inv-soon' : '', date: runOut };
  }

  function countCoveredMonths(runOut) {
    if (!runOut) return 0;
    const today = new Date(isoToday() + 'T00:00:00');
    let count = 0;
    let m = new Date(today.getFullYear(), today.getMonth() + 1, 1);
    for (let i = 0; i < 12; i++) {
      const threshold = new Date(m.getFullYear(), m.getMonth(), 8);
      if (runOut >= threshold) { count++; m = new Date(m.getFullYear(), m.getMonth() + 1, 1); }
      else break;
    }
    return count;
  }

  function barsHtml(fullCount, partialFraction) {
    const n = Math.min(Math.floor(fullCount), 6);
    if (n <= 0 && !(partialFraction > 0.05)) return '';
    let h = '<span class="inv-bars">';
    for (let i = 0; i < n; i++) h += '<span class="inv-bar"></span>';
    if (partialFraction > 0.05 && n < 6)
      h += '<span class="inv-bar" style="width:' + Math.max(1, Math.round(partialFraction * 10)) + 'px"></span>';
    return h + '</span>';
  }

  let _rendering = false;
  async function renderInventory() {
    if (!body || _rendering) return;
    _rendering = true;
    // Show loading only on first load (table is empty); otherwise keep existing rows visible
    const isEmpty = !body.querySelector('tr[data-key]');
    if (isEmpty) body.innerHTML = '<tr><td colspan="10" class="loading">Loading…</td></tr>';
    let invLogRows = [];
    try {
      const r = await fetch('/api/inventory');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      invLogRows = await r.json();
    } catch (e) {
      body.innerHTML = '<tr><td colspan="12" class="loading" style="color:#d6504a">Failed to load: ' + e.message + '</td></tr>';
      _rendering = false;
      return;
    }
    window._INV_LOG_ROWS = invLogRows;
    const onHand  = computeOnHand(invLogRows);
    const itemMap = window._INV_ITEM_MAP || {};
    const allKeys = [...new Set([...Object.keys(itemMap), ...Object.keys(onHand)])].sort();

    if (!allKeys.length) {
      body.innerHTML = '<tr><td colspan="10" class="loading">No data yet — use "Import from Sheet" or refresh the board to load items.</td></tr>';
      _rendering = false;
      return;
    }

    body.innerHTML = '';
    _rendering = false;
    allKeys.forEach((key) => {
      const meta   = itemMap[key] || {};
      const amt    = onHand[key]  || {};
      const amount = amt.amount   || 0;
      const bs     = meta.bottleSize || 0;
      const dose   = meta.dose    || 0;
      // Project the Reset amount forward to today so On Hand and Est. Run-Out are consistent
      const elapsed = (amt.loggedOn && dose > 0)
        ? Math.max(0, Math.floor((new Date(isoToday() + 'T00:00:00') - new Date(amt.loggedOn + 'T00:00:00')) / 86400000))
        : 0;
      const currentAmount = dose > 0 ? Math.max(0, amount - dose * elapsed) : amount;
      const bottleFloat = bs > 0 ? currentAmount / bs : 0;
      const bottles = bs > 0 ? bottleFloat.toFixed(1) : '—';
      const bottleBars = bs > 0 ? barsHtml(Math.floor(bottleFloat), bottleFloat % 1) : '';
      const ro     = estimateRunOut(amount, dose, amt.loggedOn);
      const roMonths = ro && ro.date ? countCoveredMonths(ro.date) : 0;
      const roBars = ro ? barsHtml(roMonths, 0) : '';
      const name   = meta.name || amt.name || key;

      const tr = document.createElement('tr');
      tr.dataset.key = key;
      tr.innerHTML =
        '<td class="inv-name">'     + name + '</td>' +
        '<td class="inv-runout'     + (ro ? (' ' + ro.cls) : ' inv-no-data') + '">' + (ro ? ro.text : '—') + roBars + '</td>' +
        '<td class="inv-bottles" data-amount="' + currentAmount + '" data-key="' + key + '" title="Click to edit bottles">' + bottles + bottleBars + '</td>' +
        '<td class="inv-onhand" data-amount="' + currentAmount + '" data-key="' + key + '" title="Click to edit caps">' + Math.round(currentAmount) + '</td>' +
        '<td class="inv-num">'      + (bs         || '—') + '</td>' +
        '<td class="inv-num">'      + (dose       || '—') + '</td>' +
        '<td class="inv-num">'      + (bs > 0 && dose > 0 ? (Math.round(bs / dose * 10) / 10) + 'd' : '—') + '</td>' +
        '<td class="inv-num">'      + (amt.loggedOn ? ((d => (d.getMonth()+1)+'/'+d.getDate())(new Date(amt.loggedOn+'T00:00:00'))) : '—') + '</td>' +
        '<td class="inv-supplier">' + (meta.annualSale   || '—') + '</td>' +
        '<td class="inv-supplier">' + (meta.offCycleSale || '—') + '</td>' +
        '<td class="inv-supplier">' + (meta.anyday       || '—') + '</td>' +
        '<td><button class="inv-del-btn" data-key="' + key + '" data-name="' + name.replace(/"/g, '&quot;') + '" title="Delete all inventory rows for this item">✕</button></td>';
      body.appendChild(tr);
    });

    attachEditHandlers(itemMap);
    applyFilters();
  }

  function attachEditHandlers(itemMap) {
    if (!body) return;
    body.querySelectorAll('.inv-onhand').forEach((cell) => {
      cell.onclick = () => startEdit(cell, itemMap, 'caps');
    });
    body.querySelectorAll('.inv-bottles').forEach((cell) => {
      cell.onclick = () => startEdit(cell, itemMap, 'bottles');
    });
  }

  function refreshRow(key, newCaps, loggedOn, itemMap) {
    const tr = body.querySelector(`tr[data-key="${key}"]`);
    if (!tr) return;
    const meta = itemMap[key] || {};
    const bs   = meta.bottleSize || 0;
    const dose = meta.dose || 0;
    const bottleFloat = bs > 0 ? newCaps / bs : 0;
    const bottles     = bs > 0 ? bottleFloat.toFixed(1) : '—';
    const bottleBars  = bs > 0 ? barsHtml(Math.floor(bottleFloat), bottleFloat % 1) : '';
    const ro          = estimateRunOut(newCaps, dose, loggedOn);
    const roMonths    = ro && ro.date ? countCoveredMonths(ro.date) : 0;
    const roBars      = ro ? barsHtml(roMonths, 0) : '';

    const capsCell     = tr.querySelector('.inv-onhand');
    const bottlesCell  = tr.querySelector('.inv-bottles');
    const runoutCell   = tr.querySelector('td:nth-child(2)');
    const resetCell    = tr.querySelector('td:nth-child(8)');

    if (capsCell)    { capsCell.dataset.amount = newCaps;    capsCell.textContent = Math.round(newCaps); }
    if (bottlesCell) { bottlesCell.dataset.amount = newCaps; bottlesCell.innerHTML = bottles + bottleBars; }
    if (runoutCell)  {
      runoutCell.className = 'inv-runout' + (ro ? (' ' + ro.cls) : ' inv-no-data');
      runoutCell.innerHTML = (ro ? ro.text : '—') + roBars;
    }
    if (resetCell && loggedOn) {
      const d = new Date(loggedOn + 'T00:00:00');
      resetCell.textContent = (d.getMonth() + 1) + '/' + d.getDate();
    }
    // Re-wire onclick (innerHTML reset detaches nothing; textContent on capsCell is fine)
    if (bottlesCell) bottlesCell.onclick = () => startEdit(bottlesCell, itemMap, 'bottles');
  }

  function evalExpr(s) {
    const clean = String(s).replace(/[^0-9+\-*/().\s]/g, '').trim();
    if (!clean) return NaN;
    try { return Number(Function('"use strict"; return (' + clean + ')')()) } catch { return NaN; }
  }

  function startEdit(cell, itemMap, mode) {
    if (cell.querySelector('input')) return;
    const key  = cell.dataset.key;
    const bs   = (itemMap[key] || {}).bottleSize || 0;
    const caps = Number(cell.dataset.amount) || 0;
    const val  = mode === 'bottles' && bs > 0 ? (caps / bs).toFixed(2) : Math.round(caps);
    const unit = mode === 'bottles' ? 'bottles' : 'caps';

    cell.textContent = '';
    const inp = document.createElement('input');
    inp.type = 'text'; inp.inputMode = 'decimal';
    inp.value = val; inp.className = 'inv-edit-input';
    inp.placeholder = unit;
    cell.appendChild(inp);
    inp.focus(); inp.select();

    const today = isoToday();
    let committed = false;
    const save = async () => {
      if (committed) return; committed = true;
      const parsed = evalExpr(inp.value);
      if (isNaN(parsed) || parsed < 0) { renderInventory(); return; }
      const newCaps  = mode === 'bottles' && bs > 0 ? parsed * bs : parsed;
      const itemName = (itemMap[key] || {}).name || key;
      // Optimistic in-place update — no stutter
      refreshRow(key, newCaps, today, itemMap);
      try {
        await fetch('/api/inventory', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item: itemName, amount: newCaps, type: 'Reset', logged_on: today }),
        });
      } catch (e) {
        console.error('Inventory save failed:', e);
        renderInventory(); // full reload on error to restore true state
      }
    };

    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter')  { e.preventDefault(); save(); }
      if (e.key === 'Escape') { committed = true; renderInventory(); }
    });
    inp.addEventListener('blur', () => setTimeout(save, 80));
  }

  const FILTER_COLS = [
    { id: 'inv-filter-item',     colIdx: 0 },
    { id: 'inv-filter-annual',   colIdx: 8 },
    { id: 'inv-filter-offcycle', colIdx: 9 },
    { id: 'inv-filter-anyday',   colIdx: 10 },
  ].map(f => ({ el: document.getElementById(f.id), colIdx: f.colIdx })).filter(f => f.el);

  let soonOnly = false;
  const soonBtn = document.getElementById('inv-soon-btn');
  if (soonBtn) soonBtn.addEventListener('click', () => {
    soonOnly = !soonOnly;
    soonBtn.classList.toggle('active', soonOnly);
    applyFilters();
  });

  function applyFilters() {
    const active = FILTER_COLS.map(f => ({ q: f.el.value.trim().toLowerCase(), colIdx: f.colIdx }));
    body.querySelectorAll('tr').forEach((tr) => {
      const cells = tr.querySelectorAll('td');
      if (!cells.length) return;
      const passesText = active.every(({ q, colIdx }) =>
        !q || (cells[colIdx] && cells[colIdx].textContent.toLowerCase().includes(q))
      );
      const passesSoon = !soonOnly || (cells[1] && (cells[1].classList.contains('inv-soon') || cells[1].classList.contains('inv-empty')));
      tr.style.display = passesText && passesSoon ? '' : 'none';
    });
  }

  FILTER_COLS.forEach(f => f.el.addEventListener('input', applyFilters));

  if (refreshBtn) refreshBtn.addEventListener('click', async () => {
    refreshBtn.disabled = true;
    try {
      if (window.InventoryWriter && window.InventoryWriter.run) {
        await window.InventoryWriter.run(false);
      }
      await renderInventory();
    } finally {
      refreshBtn.disabled = false;
    }
  });

  if (body) body.addEventListener('click', async (e) => {
    const btn = e.target.closest('.inv-del-btn');
    if (!btn) return;
    const name = btn.dataset.name;
    if (!confirm('Delete all inventory records for "' + name + '"?\nThis cannot be undone.')) return;
    btn.disabled = true;
    try {
      const r = await fetch('/api/inventory?' + new URLSearchParams({ item: name }), { method: 'DELETE' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      btn.closest('tr').remove();
    } catch (e) {
      alert('Delete failed: ' + e.message);
      btn.disabled = false;
    }
  });

  // Render when the Inventory tab is activated (click or programmatic restore)
  document.addEventListener('inventoryActivated', () => renderInventory());

  // Re-render after boardReady finishes run() so _INV_ITEM_MAP is populated
  document.addEventListener('inventoryDataReady', () => {
    if (document.getElementById('tab-inventory')?.classList.contains('active')) {
      renderInventory();
    }
  });
})();
</script>
